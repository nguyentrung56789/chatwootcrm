    .confirm-assign-actions button {
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    #confirmAssignCancelBtn {
      background: #e5e7eb;
      color: #111827;
    }

    #confirmAssignOkBtn {
      background: #2563eb;
      color: #ffffff;
    }

    #confirmAssignOkBtn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .notice-box {
      position: fixed;
      right: 18px;
      bottom: 82px;
      z-index: 5001;
      width: 360px;
      max-width: calc(100vw - 36px);
      min-height: 70px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      padding: 12px;
      color: #111827;
      font-size: 13px;
    }

    .login-popup {
      position: fixed;
      inset: 0;
      background: rgba(7, 16, 37, 0.72);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-modal {
      width: min(380px, 92vw);
      background: #0f1830;
      color: #e6edff;
      border-radius: 16px;
      padding: 26px 22px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .login-modal h2 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.2;
    }

    .login-modal input,
    .login-modal button {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      font-size: 15px;
    }

    .login-modal input {
      margin: 6px 0;
      border: 1px solid #233043;
      background: #071526;
      color: #e6edff;
      outline: none;
    }

    .login-modal input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 2px rgba(45, 212, 191, 0.15);
    }

    #popupLoginBtn {
      margin-top: 10px;
      border: 0;
      background: #2dd4bf;
      color: #042023;
      font-weight: 700;
      cursor: pointer;
    }

    #popupLoginBtn:hover {
      background: #5eead4;
    }

    #popupLoginBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-message {
      min-height: 18px;
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 14px;
    }

    .login-note {
      margin-top: 8px;
      color: #9aa7c7;
      font-size: 12px;
    }

    @media (max-width: 720px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      #searchBtn {
        width: 100%;
      }

      .customer-table {
        min-width: 620px;
      }

      .footer-actions {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      #userInfo {
        max-width: 100%;
      }

      .floating-save-bar {
        left: 12px;
        right: 12px;
        bottom: 12px;
        min-width: auto;
      }
    }

    @media (max-width: 420px) {
      .app {
        padding: 4px;
      }

      .content {
        padding: 6px;
        border-radius: 6px;
        height: calc(100vh - 8px);
      }

      .toolbar input,
      #staffDropdownBtn,
      #searchBtn,
      #refreshBtn {
        height: 30px;
        font-size: 12px;
      }
