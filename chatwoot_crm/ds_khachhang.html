<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Danh sách khách hàng</title>

  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>
  <script src="./js/auth_token.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: 100%;
      height: 100vh;
      padding: 6px;
      background: #f3f4f6;
      overflow: hidden;
    }

    .content {
      width: 100%;
      height: calc(100vh - 12px);
      background: #ffffff;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.55fr) auto;
      gap: 6px;
      margin-bottom: 8px;
      align-items: center;
      position: relative;
      z-index: 30;
      background: #ffffff;
      flex: 0 0 auto;
    }

    .toolbar input {
      width: 100%;
      height: 34px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      background: #ffffff;
      color: #111827;
    }

    .toolbar input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    #searchBtn {
      height: 34px;
      min-width: 78px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      padding: 0 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    #searchBtn:hover {
      background: #1d4ed8;
    }

    #searchBtn.loading {
      opacity: 0.65;
      pointer-events: none;
    }

    .staff-dropdown {
      position: relative;
      width: 100%;
    }

    #staffDropdownBtn {
      width: 100%;
      height: 34px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      background: #ffffff;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #staffDropdownBtn:hover {
      border-color: #2563eb;
    }

    .staff-dropdown-menu {
      position: absolute;
      top: 38px;
      left: 0;
      width: 100%;
      min-width: 170px;
      max-height: 230px;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      padding: 6px;
      z-index: 1000;
    }

    .staff-dropdown-menu label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      border-radius: 6px;
    }

    .staff-dropdown-menu label:hover {
      background: #f3f4f6;
    }

    .staff-dropdown-menu input {
      width: auto;
      height: auto;
      margin: 0;
    }

    .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border-top: 1px solid #f3f4f6;
    }

    .customer-table {
      width: max-content;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
      margin-top: 0;
    }

    .customer-table th,
    .customer-table td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .customer-table th {
      background: #f9fafb;
      font-weight: 700;
      color: #111827;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .customer-table tr:hover td {
      background: #f9fafb;
    }

    .customer-table th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .customer-table th.sortable:hover {
      background: #eef2ff;
    }

    .sort-icon {
      margin-left: 4px;
      font-size: 11px;
      color: #2563eb;
    }

    .customer-table button {
      border: none;
      background: #2563eb;
      color: #ffffff;
      padding: 5px 9px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .customer-table button:hover {
      background: #1d4ed8;
    }

    .customer-table button.assign-btn {
      background: #16a34a;
    }

    .customer-table button.assign-btn:hover {
      background: #15803d;
    }

    .customer-table tbody {
      transition: opacity 0.12s ease;
    }

    .customer-table tbody.loading {
      opacity: 0.45;
      pointer-events: none;
    }

    .customer-table th.resizable {
      position: sticky;
      top: 0;
    }

    .col-resizer {
      position: absolute;
      top: 0;
      right: 0;
      width: 7px;
      height: 100%;
      cursor: col-resize;
      user-select: none;
      touch-action: none;
      z-index: 30;
    }

    .col-resizer::after {
      content: "";
      position: absolute;
      top: 20%;
      bottom: 20%;
      left: 3px;
      width: 1px;
      background: transparent;
    }

    .col-resizer:hover::after,
    .col-resizer.active::after {
      background: #2563eb;
    }

    body.resizing-column {
      cursor: col-resize;
      user-select: none;
    }

    .staff-cell-select {
      width: 100%;
      height: 30px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #ffffff;
      color: #111827;
      font-size: 13px;
      padding: 0 6px;
    }

    .staff-cell-select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .staff-cell-select.changed {
      border-color: #f97316;
      background: #fff7ed;
    }

    .footer-actions {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #6b7280;
      flex-wrap: wrap;
      background: #ffffff;
      padding-top: 6px;
      padding-bottom: 2px;
      flex: 0 0 auto;
    }

    .page-actions,
    .user-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    #pageSizeSelect {
      height: 28px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      border-radius: 6px;
      padding: 0 8px;
      font-size: 12px;
      color: #111827;
    }

    .page-actions button {
      min-width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #374151;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .page-actions button:hover {
      background: #f3f4f6;
    }

    .page-actions button:disabled {
      color: #cbd5e1;
      cursor: not-allowed;
      background: transparent;
    }

    #pageInput {
      width: 48px;
      height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      text-align: center;
      font-size: 12px;
      outline: none;
    }

    #pageInput:focus {
      border-color: #2563eb;
    }

    #pageInfo {
      color: #374151;
      font-size: 12px;
      white-space: nowrap;
      min-width: 165px;
    }

    #userInfo {
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #logoutBtn {
      border: none;
      background: #ef4444;
      color: #ffffff;
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    #logoutBtn:hover {
      background: #dc2626;
    }

    .floating-save-bar {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5000;
      min-width: 320px;
      max-width: calc(100vw - 36px);
      background: #111827;
      color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .floating-save-bar b {
      display: block;
      font-size: 13px;
    }

    #saveMessage {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: #cbd5e1;
    }

    .floating-save-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .floating-save-actions button {
      border: none;
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    #saveStaffBtn {
      background: #22c55e;
      color: #ffffff;
    }

    #saveStaffBtn:hover {
      background: #16a34a;
    }

    #assignCustomerCodeBtn {
      background: #2563eb;
      color: #ffffff;
    }

    #assignCustomerCodeBtn:hover {
      background: #1d4ed8;
    }

    .notice-box {
      position: fixed;
      right: 18px;
      bottom: 82px;
      z-index: 5001;
      width: 360px;
      max-width: calc(100vw - 36px);
      min-height: 70px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      padding: 12px;
      color: #111827;
      font-size: 13px;
    }

    .login-popup {
      position: fixed;
      inset: 0;
      background: rgba(7, 16, 37, 0.72);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-modal {
      width: min(380px, 92vw);
      background: #0f1830;
      color: #e6edff;
      border-radius: 16px;
      padding: 26px 22px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .login-modal h2 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.2;
    }

    .login-modal input,
    .login-modal button {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      font-size: 15px;
    }

    .login-modal input {
      margin: 6px 0;
      border: 1px solid #233043;
      background: #071526;
      color: #e6edff;
      outline: none;
    }

    .login-modal input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.15);
    }

    #popupLoginBtn {
      margin-top: 10px;
      border: 0;
      background: #2dd4bf;
      color: #042023;
      font-weight: 700;
      cursor: pointer;
    }

    #popupLoginBtn:hover {
      background: #5eead4;
    }

    #popupLoginBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-message {
      min-height: 18px;
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 14px;
    }

    .login-note {
      margin-top: 8px;
      color: #9aa7c7;
      font-size: 12px;
    }

    @media (max-width: 720px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      #searchBtn {
        width: 100%;
      }

      .customer-table {
        min-width: 620px;
      }

      .footer-actions {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      #userInfo {
        max-width: 100%;
      }

      .floating-save-bar {
        left: 12px;
        right: 12px;
        bottom: 12px;
        min-width: auto;
      }
    }

    @media (max-width: 420px) {
      .app {
        padding: 4px;
      }

      .content {
        padding: 6px;
        border-radius: 6px;
        height: calc(100vh - 8px);
      }

      .toolbar input,
      #staffDropdownBtn,
      #searchBtn {
        height: 30px;
        font-size: 12px;
      }

      .customer-table {
        font-size: 12px;
        min-width: 560px;
      }

      .customer-table th,
      .customer-table td {
        padding: 6px;
      }

      .login-modal {
        padding: 22px 18px;
      }

      .login-modal h2 {
        font-size: 22px;
      }

      .floating-save-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .floating-save-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>

<body>
  <div id="loginPopup" class="login-popup hidden">
    <div class="login-modal">
      <h2>🔐 Đăng nhập</h2>

      <input id="popupMaNvInput" type="text" placeholder="Mã nhân viên" autocomplete="username" />
      <input id="popupMatKhauInput" type="password" placeholder="Mật khẩu" autocomplete="current-password" />

      <button id="popupLoginBtn">Đăng nhập</button>

      <div class="login-message" id="popupLoginMessage"></div>
      <div class="login-note" id="popupCfgNote">Đang khởi tạo cấu hình...</div>
    </div>
  </div>

  <div class="app">
    <main class="content">
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Tìm mã KH, tên KH, số điện thoại..." />

        <div class="staff-dropdown">
          <button id="staffDropdownBtn" type="button">Tất cả nhân viên</button>

          <div id="staffDropdownMenu" class="staff-dropdown-menu hidden">
            <label>
              <input type="checkbox" class="staff-option" value="all" checked />
              Tất cả nhân viên
            </label>
          </div>
        </div>

        <button id="searchBtn">Tìm kiếm</button>
      </div>

      <div class="table-wrap">
        <table class="customer-table">
          <colgroup>
            <col data-col="ma_kh" style="width: 130px;">
            <col data-col="ten_kh" style="width: 240px;">
            <col data-col="sdt" style="width: 150px;">
            <col data-col="cong_no" style="width: 130px;">
            <col data-col="ma_nv" style="width: 160px;">
            <col data-col="action" style="width: 90px;">
          </colgroup>

          <thead>
            <tr>
              <th class="sortable resizable" data-sort="ma_kh" data-col-index="0">
                Mã KH <span class="sort-icon"></span>
                <span class="col-resizer"></span>
              </th>

              <th class="sortable resizable" data-sort="ten_kh" data-col-index="1">
                Tên khách hàng <span class="sort-icon"></span>
                <span class="col-resizer"></span>
              </th>

              <th class="sortable resizable" data-sort="sdt" data-col-index="2">
                Số điện thoại <span class="sort-icon"></span>
                <span class="col-resizer"></span>
              </th>

              <th class="sortable resizable" data-sort="cong_no" data-col-index="3">
                Công nợ <span class="sort-icon"></span>
                <span class="col-resizer"></span>
              </th>

              <th class="sortable resizable" data-sort="ma_nv" data-col-index="4">
                Nhân viên <span class="sort-icon"></span>
                <span class="col-resizer"></span>
              </th>

              <th class="resizable" data-col-index="5">
                Thao tác
                <span class="col-resizer"></span>
              </th>
            </tr>
          </thead>

          <tbody id="customerBody">
            <tr>
              <td colspan="6">Vui lòng đăng nhập để xem dữ liệu.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="footer-actions">
        <div class="page-actions">
          <span>Hiển thị</span>

          <select id="pageSizeSelect">
            <option value="20">20 dòng</option>
            <option value="50">50 dòng</option>
            <option value="100" selected>100 dòng</option>
            <option value="200">200 dòng</option>
          </select>

          <button id="firstPageBtn" type="button" title="Trang đầu">|‹</button>
          <button id="prevPageBtn" type="button" title="Trang trước">‹</button>

          <input id="pageInput" type="number" min="1" value="1" />

          <button id="nextPageBtn" type="button" title="Trang sau">›</button>
          <button id="lastPageBtn" type="button" title="Trang cuối">›|</button>

          <span id="pageInfo">0 - 0 trong 0 khách hàng</span>
        </div>

        <div class="user-actions">
          <span id="userInfo">Chưa đăng nhập</span>
          <button id="logoutBtn">Đăng xuất</button>
        </div>
      </div>

      <div id="floatingSaveBar" class="floating-save-bar hidden">
        <div>
          <b id="changedCountText">0 thay đổi</b>
          <span id="saveMessage"></span>
        </div>

        <div class="floating-save-actions">
          <button id="assignCustomerCodeBtn" type="button">Gán mã khách hàng</button>
          <button id="saveStaffBtn" type="button">Lưu</button>
        </div>
      </div>

      <div id="noticeBox" class="notice-box hidden"></div>
    </main>
  </div>

  <script>
    const LOGIN_STORAGE_KEY = "chatwoot_crm_user";
    const TABLE_NHAN_VIEN = "kv_nhan_vien";
    const TABLE_KHACH_HANG = "kv_khachhang";
    const UPDATE_STAFF_WEBHOOK_URL = "https://n8n.clawbot.io.vn/webhook/capnhat-chatwoot";

    let currentUser = getLoginUser();
    let sortField = "";
    let sortDirection = "asc";
    let supabaseClient = null;
    let customers = [];

    let currentPage = 1;
    let pageSize = 100;
    let totalRows = 0;
    let isLoadingCustomers = false;
    let staffRows = [];
    let pendingStaffChanges = {};

    const loginPopup = document.getElementById("loginPopup");
    const popupMaNvInput = document.getElementById("popupMaNvInput");
    const popupMatKhauInput = document.getElementById("popupMatKhauInput");
    const popupLoginBtn = document.getElementById("popupLoginBtn");
    const popupLoginMessage = document.getElementById("popupLoginMessage");
    const popupCfgNote = document.getElementById("popupCfgNote");

    const userInfo = document.getElementById("userInfo");
    const logoutBtn = document.getElementById("logoutBtn");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const customerBody = document.getElementById("customerBody");

    const firstPageBtn = document.getElementById("firstPageBtn");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const lastPageBtn = document.getElementById("lastPageBtn");
    const pageInput = document.getElementById("pageInput");
    const pageSizeSelect = document.getElementById("pageSizeSelect");
    const pageInfo = document.getElementById("pageInfo");

    const staffDropdownBtn = document.getElementById("staffDropdownBtn");
    const staffDropdownMenu = document.getElementById("staffDropdownMenu");

    const floatingSaveBar = document.getElementById("floatingSaveBar");
    const changedCountText = document.getElementById("changedCountText");
    const saveMessage = document.getElementById("saveMessage");
    const saveStaffBtn = document.getElementById("saveStaffBtn");
    const assignCustomerCodeBtn = document.getElementById("assignCustomerCodeBtn");
    const noticeBox = document.getElementById("noticeBox");

    function getStaffOptions() {
      return document.querySelectorAll(".staff-option");
    }

    initSupabase().then(function () {
      initPage();
      enableColumnResize();
    });

    async function initSupabase() {
      try {
        popupCfgNote.textContent = "Đang lấy cấu hình Supabase...";

        let supabaseUrl = "";
        let supabaseAnon = "";

        try {
          const resp = await fetch("/api/getConfig", {
            headers: {
              "x-internal-key": window.getInternalKey ? window.getInternalKey() : ""
            }
          });

          if (resp.ok) {
            const cfg = await resp.json();
            supabaseUrl = cfg.url || "";
            supabaseAnon = cfg.anon || cfg.key || "";
          }
        } catch (error) {
          console.warn("Không gọi được /api/getConfig trực tiếp:", error);
        }

        if ((!supabaseUrl || !supabaseAnon) && window.configReady) {
          await window.configReady;

          if (typeof window.getConfig === "function") {
            const urlValue = window.getConfig("url");
            const anonValue = window.getConfig("anon");

            if (typeof urlValue === "string") {
              supabaseUrl = supabaseUrl || urlValue;
            }

            if (typeof anonValue === "string") {
              supabaseAnon = supabaseAnon || anonValue;
            }
          }
        }

        if (!supabaseUrl || !supabaseAnon) {
          popupCfgNote.textContent = "Thiếu cấu hình Supabase";
          popupLoginMessage.textContent = "Chưa lấy được Supabase URL hoặc anon key.";
          return;
        }

        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnon);

        popupCfgNote.textContent = "Sẵn sàng đăng nhập";
        popupLoginMessage.textContent = "";
      } catch (error) {
        console.error("Lỗi initSupabase:", error);
        popupCfgNote.textContent = "Lỗi cấu hình Supabase";
        popupLoginMessage.textContent = error.message || "Không lấy được cấu hình.";
      }
    }

    async function loadStaffFromSupabase() {
      if (!supabaseClient) {
        return;
      }

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, ten_nv, hoat_dong")
        .eq("hoat_dong", true)
        .order("ten_nv", { ascending: true });

      if (error) {
        console.error("Lỗi tải nhân viên:", error);
        return;
      }

      staffRows = (data || []).map(function (item) {
        return {
          ma_nv: item.ma_nv || "",
          ten_nv: item.ten_nv || item.ma_nv || ""
        };
      });

      renderStaffDropdown();

      if (customers.length > 0) {
        renderCustomers();
      }
    }

    function renderStaffDropdown() {
      staffDropdownMenu.innerHTML = `
        <label>
          <input type="checkbox" class="staff-option" value="all" checked />
          Tất cả nhân viên
        </label>
      `;

      staffRows.forEach(function (staff) {
        if (!staff.ma_nv) {
          return;
        }

        const label = document.createElement("label");

        label.innerHTML = `
          <input
            type="checkbox"
            class="staff-option"
            value="${escapeHtml(staff.ma_nv)}"
            data-name="${escapeHtml(staff.ten_nv)}"
          />
          ${escapeHtml(staff.ten_nv)}
        `;

        staffDropdownMenu.appendChild(label);
      });

      bindStaffOptionEvents();
      updateStaffButtonText();
    }

    function bindStaffOptionEvents() {
      getStaffOptions().forEach(function (option) {
        option.addEventListener("change", function () {
          handleStaffChange(option);
          updateStaffButtonText();
          renderCustomers();
        });
      });
    }

    function getStaffNameByCode(maNv) {
      const found = staffRows.find(function (staff) {
        return String(staff.ma_nv || "").toLowerCase() === String(maNv || "").toLowerCase();
      });

      return found ? found.ten_nv : maNv;
    }

    function renderStaffSelect(maKh, currentMaNv) {
      const oldMaNv = String(currentMaNv || "");
      const pending = pendingStaffChanges[maKh];
      const selectedValue = pending ? pending.new_ma_nv : oldMaNv;

      let options = `<option value="">-- Chưa gán --</option>`;

      staffRows.forEach(function (staff) {
        const selected =
          String(staff.ma_nv || "").toLowerCase() === String(selectedValue || "").toLowerCase()
            ? "selected"
            : "";

        options += `
          <option value="${escapeHtml(staff.ma_nv)}" ${selected}>
            ${escapeHtml(staff.ten_nv)}
          </option>
        `;
      });

      const changedClass = pending ? "changed" : "";

      return `
        <select
          class="staff-cell-select ${changedClass}"
          data-ma-kh="${escapeHtml(maKh || "")}"
          data-old-ma-nv="${escapeHtml(oldMaNv)}"
          onchange="onStaffCellChanged(this)"
        >
          ${options}
        </select>
      `;
    }

    async function onStaffCellChanged(selectEl) {
      const maKh = selectEl.dataset.maKh || "";
      const oldMaNv = selectEl.dataset.oldMaNv || "";
      const newMaNv = selectEl.value || "";

      if (!maKh) {
        showNotice("Dòng này thiếu mã khách hàng.", true);
        return;
      }

      if (String(oldMaNv || "") === String(newMaNv || "")) {
        return;
      }

      if (!supabaseClient) {
        selectEl.value = oldMaNv;
        showNotice("Supabase chưa sẵn sàng.", true);
        return;
      }

      selectEl.disabled = true;
      selectEl.classList.add("changed");

      try {
        const { error } = await supabaseClient
          .from(TABLE_KHACH_HANG)
          .update({
            ma_nv: newMaNv || null
          })
          .eq("ma_kh", maKh);

        if (error) {
          throw error;
        }

        await sendCustomerWebhook("capnhat_nv", maKh, newMaNv);

        selectEl.dataset.oldMaNv = newMaNv;
        selectEl.classList.remove("changed");

        const found = customers.find(function (item) {
          return String(item.ma_kh || "") === String(maKh || "");
        });

        if (found) {
          found.ma_nv = newMaNv;
        }

        showNotice(`Đã cập nhật nhân viên cho ${maKh}`);
      } catch (error) {
        console.error("Lỗi cập nhật nhân viên:", error);
        selectEl.value = oldMaNv;
        selectEl.classList.remove("changed");
        showNotice("Lỗi cập nhật nhân viên: " + (error.message || JSON.stringify(error)), true);
      } finally {
        selectEl.disabled = false;
      }
    }

    function updateFloatingSaveBar() {
      const count = Object.keys(pendingStaffChanges).length;

      if (count <= 0) {
        floatingSaveBar.classList.add("hidden");
        saveMessage.textContent = "";
        return;
      }

      floatingSaveBar.classList.remove("hidden");
      changedCountText.textContent = `${count} thay đổi`;
    }

    function setCustomerLoading(isLoading) {
      isLoadingCustomers = isLoading;

      if (isLoading) {
        customerBody.classList.add("loading");
        searchBtn.classList.add("loading");

        firstPageBtn.disabled = true;
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        lastPageBtn.disabled = true;
        pageSizeSelect.disabled = true;
        pageInput.disabled = true;

        if (!customers || customers.length === 0) {
          customerBody.innerHTML = `
            <tr>
              <td colspan="6">Đang tải danh sách khách hàng...</td>
            </tr>
          `;
        }
      } else {
        customerBody.classList.remove("loading");
        searchBtn.classList.remove("loading");

        pageSizeSelect.disabled = false;
        pageInput.disabled = false;

        updatePagination();
      }
    }

    async function loadCustomersFromSupabase(page = 1) {
      if (isLoadingCustomers) {
        return;
      }

      if (!supabaseClient) {
        customerBody.innerHTML = `
          <tr>
            <td colspan="6">Supabase chưa sẵn sàng.</td>
          </tr>
        `;
        return;
      }

      currentPage = page;

      const from = (currentPage - 1) * pageSize;
      const to = from + pageSize - 1;
      const keyword = searchInput.value.trim();

      setCustomerLoading(true);

      let query = supabaseClient
        .from(TABLE_KHACH_HANG)
        .select("ma_kh, ten_kh, dien_thoai, congno, ma_nv", { count: "exact" })
        .order("ma_kh", { ascending: true })
        .range(from, to);

      if (keyword) {
        const safeKeyword = keyword.replaceAll("%", "\\%").replaceAll(",", " ");
        query = query.or(
          `ma_kh.ilike.%${safeKeyword}%,ten_kh.ilike.%${safeKeyword}%,dien_thoai.ilike.%${safeKeyword}%`
        );
      }

      const { data, error, count } = await query;

      if (error) {
        if (String(error.message || "").includes("ma_nv")) {
          setCustomerLoading(false);
          return loadCustomersWithoutStaff(page);
        }

        customerBody.innerHTML = `
          <tr>
            <td colspan="6">
              Lỗi tải dữ liệu: ${escapeHtml(error.message || JSON.stringify(error))}
            </td>
          </tr>
        `;

        setCustomerLoading(false);
        return;
      }

      totalRows = count || 0;

      customers = (data || []).map(function (item) {
        return {
          ma_kh: item.ma_kh || "",
          ten_kh: item.ten_kh || "",
          sdt: item.dien_thoai || "",
          cong_no: item.congno || 0,
          ma_nv: item.ma_nv || ""
        };
      });

      renderCustomers();
      setCustomerLoading(false);
    }

    async function loadCustomersWithoutStaff(page = 1) {
      if (isLoadingCustomers || !supabaseClient) {
        return;
      }

      currentPage = page;

      const from = (currentPage - 1) * pageSize;
      const to = from + pageSize - 1;
      const keyword = searchInput.value.trim();

      setCustomerLoading(true);

      let query = supabaseClient
        .from(TABLE_KHACH_HANG)
        .select("ma_kh, ten_kh, dien_thoai, congno", { count: "exact" })
        .order("ma_kh", { ascending: true })
        .range(from, to);

      if (keyword) {
        const safeKeyword = keyword.replaceAll("%", "\\%").replaceAll(",", " ");
        query = query.or(
          `ma_kh.ilike.%${safeKeyword}%,ten_kh.ilike.%${safeKeyword}%,dien_thoai.ilike.%${safeKeyword}%`
        );
      }

      const { data, error, count } = await query;

      if (error) {
        customerBody.innerHTML = `
          <tr>
            <td colspan="6">
              Lỗi tải dữ liệu: ${escapeHtml(error.message || JSON.stringify(error))}
            </td>
          </tr>
        `;

        setCustomerLoading(false);
        return;
      }

      totalRows = count || 0;

      customers = (data || []).map(function (item) {
        return {
          ma_kh: item.ma_kh || "",
          ten_kh: item.ten_kh || "",
          sdt: item.dien_thoai || "",
          cong_no: item.congno || 0,
          ma_nv: ""
        };
      });

      renderCustomers();
      setCustomerLoading(false);
    }

    async function saveStaffChanges() {
      const changes = Object.values(pendingStaffChanges);

      if (changes.length === 0) {
        return;
      }

      if (!supabaseClient) {
        saveMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      saveStaffBtn.disabled = true;
      saveStaffBtn.textContent = "Đang lưu...";
      saveMessage.textContent = "Đang cập nhật mã nhân viên...";

      try {
        for (const change of changes) {
          const { error } = await supabaseClient
            .from(TABLE_KHACH_HANG)
            .update({
              ma_nv: change.new_ma_nv || null
            })
            .eq("ma_kh", change.ma_kh);

          if (error) {
            throw error;
          }
        }

        pendingStaffChanges = {};
        saveMessage.textContent = "Đã lưu xong.";

        await loadCustomersFromSupabase(currentPage);

        setTimeout(function () {
          floatingSaveBar.classList.add("hidden");
          saveMessage.textContent = "";
        }, 800);
      } catch (error) {
        console.error("Lỗi lưu mã nhân viên:", error);
        saveMessage.textContent = "Lỗi lưu: " + (error.message || JSON.stringify(error));
      } finally {
        saveStaffBtn.disabled = false;
        saveStaffBtn.textContent = "Lưu";
      }
    }

    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));

      const fromRow = totalRows === 0 ? 0 : ((currentPage - 1) * pageSize) + 1;
      const toRow = Math.min(currentPage * pageSize, totalRows);

      pageInput.value = currentPage;
      pageInput.max = totalPages;

      pageInfo.textContent = `${fromRow} - ${toRow} trong ${totalRows} khách hàng`;

      firstPageBtn.disabled = currentPage <= 1;
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
      lastPageBtn.disabled = currentPage >= totalPages;
    }

    function getLoginUser() {
      const raw = localStorage.getItem(LOGIN_STORAGE_KEY);

      if (!raw) {
        return null;
      }

      try {
        return JSON.parse(raw);
      } catch (error) {
        localStorage.removeItem(LOGIN_STORAGE_KEY);
        return null;
      }
    }

    async function initPage() {
      currentUser = getLoginUser();

      if (!currentUser) {
        userInfo.textContent = "Chưa đăng nhập";
        pageInfo.textContent = "0 - 0 trong 0 khách hàng";

        customerBody.innerHTML = `
          <tr>
            <td colspan="6">Vui lòng đăng nhập để xem dữ liệu.</td>
          </tr>
        `;

        openLoginPopup();
        return;
      }

      closeLoginPopup();
      showUserInfo();
      await loadStaffFromSupabase();
      await loadCustomersFromSupabase(1);
    }

    function openLoginPopup() {
      loginPopup.classList.remove("hidden");

      setTimeout(function () {
        popupMaNvInput.focus();
      }, 100);
    }

    function closeLoginPopup() {
      loginPopup.classList.add("hidden");
    }

    function showUserInfo() {
      userInfo.textContent = `${currentUser.ten_nv || currentUser.ma_nv} - ${currentUser.ma_nv}`;
    }

    popupLoginBtn.addEventListener("click", loginFromPopup);

    popupMatKhauInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        loginFromPopup();
      }
    });

    logoutBtn.addEventListener("click", function () {
      localStorage.removeItem(LOGIN_STORAGE_KEY);
      currentUser = null;
      customers = [];
      totalRows = 0;
      currentPage = 1;
      pendingStaffChanges = {};

      userInfo.textContent = "Chưa đăng nhập";
      pageInfo.textContent = "0 - 0 trong 0 khách hàng";
      floatingSaveBar.classList.add("hidden");
      noticeBox.classList.add("hidden");

      customerBody.innerHTML = `
        <tr>
          <td colspan="6">Vui lòng đăng nhập để xem dữ liệu.</td>
        </tr>
      `;

      openLoginPopup();
    });

    async function loginFromPopup() {
      const maNv = popupMaNvInput.value.trim();
      const matKhau = popupMatKhauInput.value.trim();

      popupLoginMessage.textContent = "";

      if (!maNv || !matKhau) {
        popupLoginMessage.textContent = "Vui lòng nhập mã nhân viên và mật khẩu.";
        return;
      }

      if (!supabaseClient) {
        popupLoginMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      popupLoginBtn.disabled = true;
      popupLoginBtn.textContent = "Đang đăng nhập...";

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, mat_khau, ten_nv, dien_thoai, hoat_dong, admin")
        .or(`ma_nv.eq.${maNv},dien_thoai.eq.${maNv}`)
        .eq("mat_khau", matKhau)
        .maybeSingle();

      popupLoginBtn.disabled = false;
      popupLoginBtn.textContent = "Đăng nhập";

      if (error) {
        console.error("Lỗi đăng nhập:", error);
        popupLoginMessage.textContent = "Lỗi kiểm tra đăng nhập.";
        return;
      }

      if (!data) {
        popupLoginMessage.textContent = "Sai mã nhân viên hoặc mật khẩu.";
        return;
      }

      if (data.hoat_dong === false) {
        popupLoginMessage.textContent = "Tài khoản đã bị khóa.";
        return;
      }

      currentUser = {
        ma_nv: data.ma_nv,
        ten_nv: data.ten_nv,
        admin: data.admin === true,
        login_at: new Date().toISOString()
      };

      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(currentUser));

      popupMaNvInput.value = "";
      popupMatKhauInput.value = "";
      popupLoginMessage.textContent = "";

      closeLoginPopup();
      showUserInfo();
      await loadStaffFromSupabase();
      await loadCustomersFromSupabase(1);
    }

    searchBtn.addEventListener("click", function () {
      loadCustomersFromSupabase(1);
    });

    searchInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        loadCustomersFromSupabase(1);
      }
    });

    saveStaffBtn.addEventListener("click", saveStaffChanges);

    assignCustomerCodeBtn.addEventListener("click", function () {
      noticeBox.classList.remove("hidden");
      noticeBox.innerHTML = "";
    });

    firstPageBtn.addEventListener("click", function () {
      loadCustomersFromSupabase(1);
    });

    prevPageBtn.addEventListener("click", function () {
      if (currentPage > 1) {
        loadCustomersFromSupabase(currentPage - 1);
      }
    });

    nextPageBtn.addEventListener("click", function () {
      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));

      if (currentPage < totalPages) {
        loadCustomersFromSupabase(currentPage + 1);
      }
    });

    lastPageBtn.addEventListener("click", function () {
      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
      loadCustomersFromSupabase(totalPages);
    });

    pageInput.addEventListener("keydown", function (event) {
      if (event.key !== "Enter") {
        return;
      }

      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
      let page = Number(pageInput.value || 1);

      if (page < 1) page = 1;
      if (page > totalPages) page = totalPages;

      loadCustomersFromSupabase(page);
    });

    pageSizeSelect.addEventListener("change", function () {
      pageSize = Number(pageSizeSelect.value || 100);
      loadCustomersFromSupabase(1);
    });

    staffDropdownBtn.addEventListener("click", function () {
      staffDropdownMenu.classList.toggle("hidden");
    });

    document.addEventListener("click", function (event) {
      const isClickInside =
        staffDropdownBtn.contains(event.target) ||
        staffDropdownMenu.contains(event.target);

      if (!isClickInside) {
        staffDropdownMenu.classList.add("hidden");
      }
    });

    document.querySelectorAll(".sortable").forEach(function (th) {
      th.addEventListener("click", function () {
        const field = th.dataset.sort;

        if (sortField === field) {
          sortDirection = sortDirection === "asc" ? "desc" : "asc";
        } else {
          sortField = field;
          sortDirection = "asc";
        }

        updateSortIcons();
        renderCustomers();
      });
    });

    function handleStaffChange(changedOption) {
      const staffOptions = getStaffOptions();
      const allOption = document.querySelector('.staff-option[value="all"]');

      const normalOptions = Array.from(staffOptions).filter(function (option) {
        return option.value !== "all";
      });

      if (changedOption.value === "all" && changedOption.checked) {
        normalOptions.forEach(function (option) {
          option.checked = false;
        });
        return;
      }

      if (changedOption.value !== "all" && changedOption.checked) {
        allOption.checked = false;
      }

      const hasAnyNormalChecked = normalOptions.some(function (option) {
        return option.checked;
      });

      if (!hasAnyNormalChecked) {
        allOption.checked = true;
      }
    }

    function getSelectedStaffList() {
      const selected = Array.from(getStaffOptions())
        .filter(function (option) {
          return option.checked;
        })
        .map(function (option) {
          return option.value.toLowerCase();
        });

      if (selected.length === 0 || selected.includes("all")) {
        return [];
      }

      return selected;
    }

    function updateStaffButtonText() {
      const selectedOptions = Array.from(getStaffOptions())
        .filter(function (option) {
          return option.checked;
        });

      const selectedValues = selectedOptions.map(function (option) {
        return option.value;
      });

      if (selectedValues.length === 0 || selectedValues.includes("all")) {
        staffDropdownBtn.textContent = "Tất cả nhân viên";
        return;
      }

      const selectedNames = selectedOptions.map(function (option) {
        return option.dataset.name || getStaffNameByCode(option.value);
      });

      staffDropdownBtn.textContent = selectedNames.join(", ");
    }

    function renderCustomers() {
      if (!currentUser) {
        return;
      }

      const staffList = getSelectedStaffList();
      let list = customers;

      const dataHasStaffField = list.some(function (item) {
        return String(item.ma_nv || "").trim() !== "";
      });

      if (!currentUser.admin && dataHasStaffField) {
        list = list.filter(function (item) {
          return String(item.ma_nv || "").toLowerCase() === String(currentUser.ma_nv || "").toLowerCase();
        });
      }

      const filtered = list.filter(function (item) {
        const maNv = String(item.ma_nv || "").toLowerCase();

        const matchStaff =
          !dataHasStaffField ||
          staffList.length === 0 ||
          staffList.some(function (staff) {
            return maNv === staff;
          });

        return matchStaff;
      });

      if (sortField) {
        filtered.sort(function (a, b) {
          let valueA = a[sortField];
          let valueB = b[sortField];

          if (sortField === "cong_no") {
            valueA = Number(valueA || 0);
            valueB = Number(valueB || 0);
          } else {
            valueA = String(valueA || "").toLowerCase();
            valueB = String(valueB || "").toLowerCase();
          }

          if (valueA < valueB) {
            return sortDirection === "asc" ? -1 : 1;
          }

          if (valueA > valueB) {
            return sortDirection === "asc" ? 1 : -1;
          }

          return 0;
        });
      }

      if (filtered.length === 0) {
        customerBody.innerHTML = `
          <tr>
            <td colspan="6">Không có dữ liệu.</td>
          </tr>
        `;
        return;
      }

      customerBody.innerHTML = filtered.map(function (item) {
        return `
          <tr>
            <td title="${escapeHtml(item.ma_kh || "")}">${escapeHtml(item.ma_kh || "")}</td>
            <td title="${escapeHtml(item.ten_kh || "")}">${escapeHtml(item.ten_kh || "")}</td>
            <td title="${escapeHtml(item.sdt || "")}">${escapeHtml(item.sdt || "")}</td>
            <td title="${formatMoney(item.cong_no)}">${formatMoney(item.cong_no)}</td>
            <td title="${escapeHtml(item.ma_nv || "")}">
              ${renderStaffSelect(item.ma_kh || "", item.ma_nv || "")}
            </td>
            <td>
              <button class="assign-btn" onclick="assignCustomerCode('${escapeJs(item.ma_kh || "")}', '${escapeJs(item.ma_nv || "")}')">
                Gán KH
              </button>
            </td>
          </tr>
        `;
      }).join("");
    }

    function updateSortIcons() {
      document.querySelectorAll(".sortable").forEach(function (th) {
        const icon = th.querySelector(".sort-icon");
        const field = th.dataset.sort;

        if (!icon) {
          return;
        }

        if (field === sortField) {
          icon.textContent = sortDirection === "asc" ? "▲" : "▼";
        } else {
          icon.textContent = "";
        }
      });
    }

    function formatMoney(value) {
      const number = Number(value || 0);
      return number.toLocaleString("vi-VN");
    }

    async function sendCustomerWebhook(action, maKh, maNv) {
      if (!UPDATE_STAFF_WEBHOOK_URL) {
        return null;
      }

      const payload = {
        action: action,
        ma_kh: maKh,
        ma_nv: maNv || null
      };

      const resp = await fetch(UPDATE_STAFF_WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!resp.ok) {
        const text = await resp.text();
        throw new Error("Webhook lỗi: " + text);
      }

      return resp;
    }

    async function assignCustomerCode(maKh, maNv) {
      if (!maKh) {
        showNotice("Dòng này thiếu mã khách hàng.", true);
        return;
      }

      try {
        await sendCustomerWebhook("gan_makh", maKh, maNv);
        showNotice(`Đã gửi webhook gán mã KH: ${maKh}`);
      } catch (error) {
        console.error("Lỗi gửi webhook gán mã KH:", error);
        showNotice("Lỗi gửi webhook gán mã KH: " + (error.message || JSON.stringify(error)), true);
      }
    }

    function showNotice(message, isError) {
      noticeBox.classList.remove("hidden");
      noticeBox.style.borderColor = isError ? "#fca5a5" : "#bbf7d0";
      noticeBox.style.background = isError ? "#fef2f2" : "#f0fdf4";
      noticeBox.style.color = isError ? "#991b1b" : "#166534";
      noticeBox.innerHTML = escapeHtml(message || "");

      setTimeout(function () {
        noticeBox.classList.add("hidden");
        noticeBox.innerHTML = "";
        noticeBox.removeAttribute("style");
      }, 1800);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }

    function enableColumnResize() {
      const table = document.querySelector(".customer-table");

      if (!table) {
        return;
      }

      const storageKey = "chatwoot_crm_customer_table_widths";
      const colList = Array.from(table.querySelectorAll("col"));
      const thList = Array.from(table.querySelectorAll("th.resizable"));
      const defaultWidths = [130, 240, 150, 130, 160, 90];

      function getColWidth(index) {
        const col = colList[index];

        if (!col) {
          return defaultWidths[index] || 100;
        }

        const styleWidth = parseInt(col.style.width, 10);

        if (!Number.isNaN(styleWidth) && styleWidth > 0) {
          return styleWidth;
        }

        return defaultWidths[index] || 100;
      }

      function setColWidth(index, width) {
        const col = colList[index];

        if (!col) {
          return;
        }

        const safeWidth = Math.max(70, Math.round(width));
        col.style.width = safeWidth + "px";
      }

      function applyTableWidth() {
        const totalWidth = colList.reduce(function (sum, col, index) {
          return sum + getColWidth(index);
        }, 0);

        table.style.width = totalWidth + "px";
        table.style.minWidth = totalWidth + "px";
      }

      try {
        const savedWidths = JSON.parse(localStorage.getItem(storageKey) || "{}");

        colList.forEach(function (col, index) {
          const width = Number(savedWidths[index]);

          if (width && width >= 70) {
            setColWidth(index, width);
          } else {
            setColWidth(index, defaultWidths[index] || 100);
          }
        });
      } catch (error) {
        colList.forEach(function (col, index) {
          setColWidth(index, defaultWidths[index] || 100);
        });
      }

      applyTableWidth();

      thList.forEach(function (th) {
        const resizer = th.querySelector(".col-resizer");

        if (!resizer) {
          return;
        }

        const colIndex = Number(th.dataset.colIndex || 0);

        let startX = 0;
        let startWidth = 0;

        resizer.addEventListener("click", function (event) {
          event.preventDefault();
          event.stopPropagation();
        });

        resizer.addEventListener("mousedown", function (event) {
          startResize(event.pageX, event);
        });

        resizer.addEventListener("touchstart", function (event) {
          if (!event.touches || !event.touches[0]) {
            return;
          }

          startResize(event.touches[0].pageX, event);
        }, { passive: false });

        function startResize(pageX, event) {
          event.preventDefault();
          event.stopPropagation();

          startX = pageX;
          startWidth = getColWidth(colIndex);

          resizer.classList.add("active");
          document.body.classList.add("resizing-column");

          document.addEventListener("mousemove", resizeWithMouse);
          document.addEventListener("mouseup", stopResize);

          document.addEventListener("touchmove", resizeWithTouch, { passive: false });
          document.addEventListener("touchend", stopResize);
        }

        function resizeWithMouse(event) {
          resizeColumn(event.pageX);
        }

        function resizeWithTouch(event) {
          if (!event.touches || !event.touches[0]) {
            return;
          }

          event.preventDefault();
          resizeColumn(event.touches[0].pageX);
        }

        function resizeColumn(pageX) {
          const newWidth = startWidth + (pageX - startX);

          if (newWidth < 70) {
            return;
          }

          setColWidth(colIndex, newWidth);
          applyTableWidth();
        }

        function stopResize() {
          resizer.classList.remove("active");
          document.body.classList.remove("resizing-column");

          document.removeEventListener("mousemove", resizeWithMouse);
          document.removeEventListener("mouseup", stopResize);

          document.removeEventListener("touchmove", resizeWithTouch);
          document.removeEventListener("touchend", stopResize);

          saveColumnWidths();
        }
      });

      function saveColumnWidths() {
        const widths = {};

        colList.forEach(function (col, index) {
          widths[index] = getColWidth(index);
        });

        localStorage.setItem(storageKey, JSON.stringify(widths));
      }
    }
  </script>
</body>
</html>
