<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sách khách hàng</title>
  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>
  <script src="./js/auth_token.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f3f4f6; color: #111827; width: 100%; height: 100%; overflow: hidden; }
    .hidden { display: none !important; }
    .app { width: 100%; height: 100vh; padding: 6px; background: #f3f4f6; overflow: hidden; }
    .content { width: 100%; height: calc(100vh - 12px); background: #ffffff; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar { display: grid; grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.55fr) auto auto; gap: 6px; margin-bottom: 8px; align-items: center; position: relative; z-index: 30; background: #ffffff; flex: 0 0 auto; }
    .toolbar input { width: 100%; height: 34px; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 13px; outline: none; background: #ffffff; color: #111827; }
    .toolbar input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12); }
    #searchBtn, #refreshBtn, #columnToggleBtn { height: 34px; border: none; color: #ffffff; padding: 0 12px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
    #searchBtn { min-width: 78px; background: #2563eb; }
    #searchBtn:hover { background: #1d4ed8; }
    #searchBtn.loading { opacity: 0.65; pointer-events: none; }
    #refreshBtn { min-width: 92px; background: #10b981; }
    #refreshBtn:hover { background: #059669; }
    #refreshBtn.loading, #refreshBtn:disabled { opacity: 0.65; pointer-events: none; cursor: not-allowed; }
    #columnToggleBtn { min-width: 82px; background: #374151; }
    #columnToggleBtn:hover { background: #1f2937; }
    .column-dropdown { position: relative; }
    .column-dropdown-menu { position: absolute; top: 38px; right: 0; width: 220px; max-height: 300px; overflow-y: auto; background: #ffffff; border: 1px solid #d1d5db; border-radius: 10px; box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16); padding: 8px; z-index: 1200; }
    .column-dropdown-menu label { display: flex; align-items: center; gap: 8px; padding: 7px 6px; border-radius: 7px; cursor: pointer; font-size: 13px; color: #111827; }
    .column-dropdown-menu label:hover { background: #f3f4f6; }
    .column-dropdown-menu input { width: auto; height: auto; margin: 0; }
    .customer-table col.col-hidden, .customer-table th.col-hidden, .customer-table td.col-hidden { display: none !important; }
    .staff-dropdown { position: relative; width: 100%; }
    #staffDropdownBtn { width: 100%; height: 34px; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 7px; background: #ffffff; text-align: left; cursor: pointer; font-size: 13px; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #staffDropdownBtn:hover { border-color: #2563eb; }
    .staff-dropdown-menu { position: absolute; top: 38px; left: 0; width: 100%; min-width: 170px; max-height: 230px; overflow-y: auto; background: #ffffff; border: 1px solid #d1d5db; border-radius: 8px; box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12); padding: 6px; z-index: 1000; }
    .staff-dropdown-menu label { display: flex; align-items: center; gap: 6px; padding: 6px; cursor: pointer; font-size: 13px; color: #111827; border-radius: 6px; }
    .staff-dropdown-menu label:hover { background: #f3f4f6; }
    .staff-dropdown-menu input { width: auto; height: auto; margin: 0; }
    .table-wrap { flex: 1 1 auto; min-height: 0; overflow: auto; border-top: 1px solid #f3f4f6; }
    .customer-table { width: max-content; min-width: 720px; border-collapse: collapse; font-size: 13px; table-layout: fixed; margin-top: 0; }
    .customer-table th, .customer-table td { padding: 8px; border-bottom: 1px solid #e5e7eb; text-align: left; white-space: nowrap; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; }
    .customer-table th { background: #f9fafb; font-weight: 700; color: #111827; position: sticky; top: 0; z-index: 20; }
    .customer-table tr:hover td { background: #f9fafb; }
    .customer-table th.sortable { cursor: pointer; user-select: none; }
    .customer-table th.sortable:hover { background: #eef2ff; }
    .sort-icon { margin-left: 4px; font-size: 11px; color: #2563eb; }
    .customer-table button { border: none; background: #2563eb; color: #ffffff; padding: 5px 9px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .customer-table button:hover { background: #1d4ed8; }
    .customer-table tbody { transition: opacity 0.12s ease; }
    .customer-table tbody.loading { opacity: 0.45; pointer-events: none; }
    .customer-table th.resizable { position: sticky; top: 0; }
    .col-resizer { position: absolute; top: 0; right: 0; width: 7px; height: 100%; cursor: col-resize; user-select: none; touch-action: none; z-index: 30; }
    .col-resizer::after { content: ""; position: absolute; top: 20%; bottom: 20%; left: 3px; width: 1px; background: transparent; }
    .col-resizer:hover::after, .col-resizer.active::after { background: #2563eb; }
    body.resizing-column { cursor: col-resize; user-select: none; }
    .staff-cell-select { width: 100%; height: 34px; border: 1px solid #d1d5db; border-radius: 6px; background: #ffffff; color: #111827; font-size: 13px; padding: 0 6px; cursor: pointer; }
    .staff-cell-select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 2px rgba(37, 99, 235, 0.12); }
    .staff-cell-select.changed { border-color: #f97316; background: #fff7ed; }
    .footer-actions { margin-top: 6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 11px; color: #6b7280; flex-wrap: wrap; background: #ffffff; padding-top: 6px; padding-bottom: 2px; flex: 0 0 auto; }
    .page-actions, .user-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    #pageSizeSelect { height: 28px; border: 1px solid #d1d5db; background: #ffffff; border-radius: 6px; padding: 0 8px; font-size: 12px; color: #111827; }
    .page-actions button { min-width: 28px; height: 28px; border: none; background: transparent; color: #374151; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .page-actions button:hover { background: #f3f4f6; }
    .page-actions button:disabled { color: #cbd5e1; cursor: not-allowed; background: transparent; }
    #pageInput { width: 48px; height: 28px; border: 1px solid #d1d5db; border-radius: 8px; text-align: center; font-size: 12px; outline: none; }
    #pageInput:focus { border-color: #2563eb; }
    #pageInfo { color: #374151; font-size: 12px; white-space: nowrap; min-width: 165px; }
    #userInfo { max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #logoutBtn { border: none; background: #ef4444; color: #ffffff; padding: 5px 8px; border-radius: 5px; font-size: 11px; cursor: pointer; white-space: nowrap; }
    #logoutBtn:hover { background: #dc2626; }
    .notice-box { position: fixed; right: 18px; bottom: 82px; z-index: 5001; width: 360px; max-width: calc(100vw - 36px); min-height: 70px; background: #ffffff; border: 1px solid #d1d5db; border-radius: 12px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18); padding: 12px; color: #111827; font-size: 13px; }
    .login-popup { position: fixed; inset: 0; background: rgba(7, 16, 37, 0.72); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .login-modal { width: min(380px, 92vw); background: #0f1830; color: #e6edff; border-radius: 16px; padding: 26px 22px; box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35); text-align: center; }
    .login-modal h2 { margin: 0 0 16px; font-size: 24px; line-height: 1.2; }
    .login-modal input, .login-modal button { width: 100%; padding: 11px 12px; border-radius: 10px; font-size: 15px; }
    .login-modal input { margin: 6px 0; border: 1px solid #233043; background: #071526; color: #e6edff; outline: none; }
    .login-modal input:focus { border-color: #2dd4bf; box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.15); }
    #popupLoginBtn { margin-top: 10px; border: 0; background: #2dd4bf; color: #042023; font-weight: 700; cursor: pointer; }
    #popupLoginBtn:hover { background: #5eead4; }
    #popupLoginBtn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-message { min-height: 18px; margin-top: 10px; color: #ff6b6b; font-size: 14px; }
    .login-note { margin-top: 8px; color: #9aa7c7; font-size: 12px; }
  </style>
</head>
<body>
  <div id="loginPopup" class="login-popup hidden">
    <div class="login-modal">
      <h2>🔐 Đăng nhập</h2>
      <input id="popupMaNvInput" type="text" placeholder="Mã nhân viên" autocomplete="username" />
      <input id="popupMatKhauInput" type="password" placeholder="Mật khẩu" autocomplete="current-password" />
      <button id="popupLoginBtn">Đăng nhập</button>
      <div class="login-message" id="popupLoginMessage"></div>
      <div class="login-note" id="popupCfgNote">Đang khởi tạo cấu hình...</div>
    </div>
  </div>
  <div class="app">
    <main class="content">
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Tìm mã KH, tên KH, số điện thoại..." />
        <div class="staff-dropdown">
          <button id="staffDropdownBtn" type="button">Tất cả nhân viên</button>
          <div id="staffDropdownMenu" class="staff-dropdown-menu hidden">
            <label><input type="checkbox" class="staff-option" value="all" checked />Tất cả nhân viên</label>
          </div>
        </div>
        <button id="searchBtn">Tìm kiếm</button>
        <button id="refreshBtn" type="button">↻ Làm mới</button>
        <div class="column-dropdown">
          <button id="columnToggleBtn" type="button">⚙ Cột</button>
          <div id="columnToggleMenu" class="column-dropdown-menu hidden"></div>
        </div>
      </div>
      <div class="table-wrap">
        <table class="customer-table">
          <colgroup>
            <col data-col="ma_kh" style="width: 130px;">
            <col data-col="ten_kh" style="width: 240px;">
            <col data-col="sdt" style="width: 150px;">
            <col data-col="cong_no" style="width: 130px;">
            <col data-col="ma_nv" style="width: 160px;">
            <col data-col="ngay_chat_cuoi" style="width: 160px;">
            <col data-col="conversation_id" style="width: 130px;">
            <col data-col="action" style="width: 190px;">
          </colgroup>
          <thead>
            <tr>
              <th class="sortable" data-col="ma_kh" data-sort="ma_kh">Mã KH <span class="sort-icon"></span></th>
              <th class="sortable" data-col="ten_kh" data-sort="ten_kh">Tên khách hàng <span class="sort-icon"></span></th>
              <th class="sortable" data-col="sdt" data-sort="sdt">Số điện thoại <span class="sort-icon"></span></th>
              <th class="sortable" data-col="cong_no" data-sort="cong_no">Công nợ <span class="sort-icon"></span></th>
              <th class="sortable" data-col="ma_nv" data-sort="ma_nv">Nhân viên <span class="sort-icon"></span></th>
              <th class="sortable" data-col="ngay_chat_cuoi" data-sort="ngay_chat_cuoi">Ngày <span class="sort-icon"></span></th>
              <th class="sortable" data-col="conversation_id" data-sort="conversation_id">ID hộp thoại <span class="sort-icon"></span></th>
              <th data-col="action">Thao tác</th>
            </tr>
          </thead>
          <tbody id="customerBody">
            <tr><td colspan="8">Vui lòng đăng nhập để xem dữ liệu.</td></tr>
          </tbody>
        </table>
      </div>
      <div class="footer-actions">
        <div class="page-actions">
          <span>Hiển thị</span>
          <select id="pageSizeSelect">
            <option value="20">20 dòng</option>
            <option value="50">50 dòng</option>
            <option value="100" selected>100 dòng</option>
            <option value="200">200 dòng</option>
          </select>
          <button id="firstPageBtn" type="button" title="Trang đầu">|‹</button>
          <button id="prevPageBtn" type="button" title="Trang trước">‹</button>
          <input id="pageInput" type="number" min="1" value="1" />
          <button id="nextPageBtn" type="button" title="Trang sau">›</button>
          <button id="lastPageBtn" type="button" title="Trang cuối">›|</button>
          <span id="pageInfo">0 - 0 trong 0 khách hàng</span>
        </div>
        <div class="user-actions">
          <span id="userInfo">Chưa đăng nhập</span>
          <button id="logoutBtn">Đăng xuất</button>
        </div>
      </div>
      <div id="noticeBox" class="notice-box hidden"></div>
    </main>
  </div>
  <script>
    const LOGIN_STORAGE_KEY = "chatwoot_crm_user";
    function getConfiguredTableName(configName, fallbackTable) {
      try {
        if (typeof window.getConfig === "function") {
          const cfg = window.getConfig(configName);
          if (cfg && typeof cfg === "object" && cfg.table) return cfg.table;
        }
      } catch (e) { console.warn("Không lấy được cấu hình bảng:", configName, e); }
      return fallbackTable;
    }
    const TABLE_NHAN_VIEN = getConfiguredTableName("index", "kv_nhan_vien");
    const TABLE_KHACH_HANG = getConfiguredTableName("kh", "sql_khachhang_nhanvien");
    const TABLE_KHACH_HANG_NHANVIEN = getConfiguredTableName("kh", "kv_khachhang_nhanvien");
    
    let currentUser = getLoginUser();
    const COLUMN_VISIBILITY_STORAGE_KEY = "ds_khachhang_hidden_columns";
    const CUSTOMER_TABLE_COLUMNS = [
      { key: "ma_kh", label: "Mã KH", required: true },
      { key: "ten_kh", label: "Tên khách hàng", required: true },
      { key: "sdt", label: "Số điện thoại" },
      { key: "cong_no", label: "Công nợ" },
      { key: "ma_nv", label: "Nhân viên" },
      { key: "ngay_chat_cuoi", label: "Ngày" },
      { key: "conversation_id", label: "ID hộp thoại" },
      { key: "action", label: "Thao tác", required: true }
    ];
    let hiddenColumns = [];
    let sortField = "";
    let sortDirection = "asc";
    let supabaseClient = null;
    let SUPABASE_REST_URL = "";
    let SUPABASE_REST_ANON = "";
    let customers = [];
    let currentPage = 1;
    let pageSize = 100;
    let totalRows = 0;
    let isLoadingCustomers = false;
    let staffRows = [];
    let currentAbortController = null;
    let searchDebounceTimer = null;

    const loginPopup = document.getElementById("loginPopup");
    const popupMaNvInput = document.getElementById("popupMaNvInput");
    const popupMatKhauInput = document.getElementById("popupMatKhauInput");
    const popupLoginBtn = document.getElementById("popupLoginBtn");
    const popupLoginMessage = document.getElementById("popupLoginMessage");
    const popupCfgNote = document.getElementById("popupCfgNote");
    const userInfo = document.getElementById("userInfo");
    const logoutBtn = document.getElementById("logoutBtn");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const columnToggleBtn = document.getElementById("columnToggleBtn");
    const columnToggleMenu = document.getElementById("columnToggleMenu");
    const customerBody = document.getElementById("customerBody");
    const firstPageBtn = document.getElementById("firstPageBtn");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const lastPageBtn = document.getElementById("lastPageBtn");
    const pageInput = document.getElementById("pageInput");
    const pageSizeSelect = document.getElementById("pageSizeSelect");
    const pageInfo = document.getElementById("pageInfo");
    const staffDropdownBtn = document.getElementById("staffDropdownBtn");
    const staffDropdownMenu = document.getElementById("staffDropdownMenu");
    const noticeBox = document.getElementById("noticeBox");

    function getLoginUser() {
      const raw = localStorage.getItem(LOGIN_STORAGE_KEY);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch (e) { localStorage.removeItem(LOGIN_STORAGE_KEY); return null; }
    }
    function normalizeKiotStaffId(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "number") {
        if (!Number.isFinite(value)) return "";
        if (Number.isInteger(value)) return String(value);
        return String(value).trim().replace(/\.0$/, "");
      }
      return String(value || "").trim().replace(/\.0$/, "");
    }
    function normalizeNullableMaNv(value) {
      const raw = String(value || "").trim();
      return raw ? raw : null;
    }
    function escapeHtml(value) { return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function escapeJs(value) { return String(value).replaceAll("\\", "\\\\").replaceAll("'", "\\'"); }

    async function initSupabase() {
      try {
        popupCfgNote.textContent = "Đang lấy cấu hình Supabase...";
        let supabaseUrl = "", supabaseAnon = "";
        try {
          const resp = await fetch("/api/getConfig", { headers: { "x-internal-key": window.getInternalKey ? window.getInternalKey() : "" } });
          if (resp.ok) {
            const cfg = await resp.json();
            supabaseUrl = cfg.url || "";
            supabaseAnon = cfg.anon || cfg.key || "";
          }
        } catch (e) { console.warn("Không gọi được /api/getConfig:", e); }
        if ((!supabaseUrl || !supabaseAnon) && window.configReady) {
          await window.configReady;
          if (typeof window.getConfig === "function") {
            supabaseUrl = supabaseUrl || window.getConfig("url");
            supabaseAnon = supabaseAnon || window.getConfig("anon");
          }
        }
        if (!supabaseUrl || !supabaseAnon) {
          popupCfgNote.textContent = "Thiếu cấu hình Supabase";
          popupLoginMessage.textContent = "Chưa lấy được Supabase URL hoặc anon key.";
          return;
        }
        SUPABASE_REST_URL = supabaseUrl;
        SUPABASE_REST_ANON = supabaseAnon;
        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnon);
        popupCfgNote.textContent = "Sẵn sàng đăng nhập";
        popupLoginMessage.textContent = "";
      } catch (error) {
        console.error("Lỗi initSupabase:", error);
        popupCfgNote.textContent = "Lỗi cấu hình Supabase";
        popupLoginMessage.textContent = error.message || "Không lấy được cấu hình.";
      }
    }

    async function initPage() {
      currentUser = getLoginUser();
      if (!currentUser) {
        userInfo.textContent = "Chưa đăng nhập";
        pageInfo.textContent = "0 - 0 trong 0 khách hàng";
        customerBody.innerHTML = `<tr><td colspan="8">Vui lòng đăng nhập để xem dữ liệu.</td></tr>`;
        openLoginPopup();
        return;
      }
      closeLoginPopup();
      showUserInfo();
      await loadStaffFromSupabase();
      await loadCustomersFromSupabase(1);
    }

    function openLoginPopup() { loginPopup.classList.remove("hidden"); setTimeout(() => popupMaNvInput.focus(), 100); }
    function closeLoginPopup() { loginPopup.classList.add("hidden"); }
    function showUserInfo() { userInfo.textContent = `${currentUser.ten_nv || currentUser.ma_nv} - ${currentUser.ma_nv}`; }

    popupLoginBtn.addEventListener("click", loginFromPopup);
    popupMatKhauInput.addEventListener("keydown", (e) => { if (e.key === "Enter") loginFromPopup(); });
    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(LOGIN_STORAGE_KEY);
      currentUser = null; customers = []; totalRows = 0; currentPage = 1;
      userInfo.textContent = "Chưa đăng nhập";
      pageInfo.textContent = "0 - 0 trong 0 khách hàng";
      customerBody.innerHTML = `<tr><td colspan="8">Vui lòng đăng nhập để xem dữ liệu.</td></tr>`;
      openLoginPopup();
    });

    async function loginFromPopup() {
      const maNv = popupMaNvInput.value.trim();
      const matKhau = popupMatKhauInput.value.trim();
      popupLoginMessage.textContent = "";
      if (!maNv || !matKhau) { popupLoginMessage.textContent = "Vui lòng nhập mã nhân viên và mật khẩu."; return; }
      if (!supabaseClient) { popupLoginMessage.textContent = "Supabase chưa sẵn sàng."; return; }
      popupLoginBtn.disabled = true; popupLoginBtn.textContent = "Đang đăng nhập...";
      const { data, error } = await supabaseClient.from(TABLE_NHAN_VIEN).select("ma_nv, mat_khau, ten_nv, dien_thoai, hoat_dong, admin").or(`ma_nv.eq.${maNv},dien_thoai.eq.${maNv}`).eq("mat_khau", matKhau).maybeSingle();
      popupLoginBtn.disabled = false; popupLoginBtn.textContent = "Đăng nhập";
      if (error) { console.error("Lỗi đăng nhập:", error); popupLoginMessage.textContent = "Lỗi kiểm tra đăng nhập."; return; }
      if (!data) { popupLoginMessage.textContent = "Sai mã nhân viên hoặc mật khẩu."; return; }
      if (data.hoat_dong === false) { popupLoginMessage.textContent = "Tài khoản đã bị khóa."; return; }
      currentUser = { ma_nv: data.ma_nv, ten_nv: data.ten_nv, admin: data.admin === true, login_at: new Date().toISOString() };
      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(currentUser));
      popupMaNvInput.value = ""; popupMatKhauInput.value = ""; popupLoginMessage.textContent = "";
      closeLoginPopup(); showUserInfo(); await loadStaffFromSupabase(); await loadCustomersFromSupabase(1);
    }

    function showNotice(message, type = "ok", timeoutMs = 10000) {
      noticeBox.classList.remove("hidden");
      noticeBox.innerHTML = escapeHtml(message);
      noticeBox.style.whiteSpace = "pre-wrap"; noticeBox.style.lineHeight = "1.45"; noticeBox.style.maxHeight = "45vh"; noticeBox.style.overflowY = "auto"; noticeBox.style.width = "520px"; noticeBox.style.fontSize = "13px";
      if (type === "error") { noticeBox.style.borderColor = "#fecaca"; noticeBox.style.background = "#fef2f2"; noticeBox.style.color = "#991b1b"; } 
      else { noticeBox.style.borderColor = "#bbf7d0"; noticeBox.style.background = "#f0fdf4"; noticeBox.style.color = "#166534"; }
      if (timeoutMs > 0) setTimeout(() => { noticeBox.classList.add("hidden"); noticeBox.innerHTML = ""; }, timeoutMs);
    }

    function getCustomerByMaKh(maKh) { return customers.find((item) => String(item.ma_kh || "") === String(maKh || "")) || null; }
    function getStaffByAnyCode(value) {
      const code = normalizeKiotStaffId(value).toLowerCase();
      if (!code) return null;
      return staffRows.find((staff) => normalizeKiotStaffId(staff.id_nv).toLowerCase() === code || String(staff.ma_nv || "").trim().toLowerCase() === code) || null;
    }
    function getCustomerStaffIds(maKh) {
      const customer = getCustomerByMaKh(maKh); if (!customer) return [];
      const savedCode = normalizeKiotStaffId(customer.ma_nv || customer.id_nv); if (!savedCode) return [];
      const staff = getStaffByAnyCode(savedCode); return [staff ? normalizeKiotStaffId(staff.id_nv) : savedCode];
    }

    async function loadStaffFromSupabase() {
      if (!supabaseClient) return;
      const { data, error } = await supabaseClient.from(TABLE_NHAN_VIEN).select("ma_nv, id_nv, ten_nv").not("id_nv", "is", null).not("ma_nv", "is", null).order("ten_nv", { ascending: true });

    function renderStaffDropdown() {
      staffDropdownMenu.innerHTML = `<label><input type="checkbox" class="staff-option" value="all" checked />Tất cả nhân viên</label>`;
      staffRows.forEach((staff) => {
        if (!staff.id_nv) return;
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" class="staff-option" value="${escapeHtml(staff.id_nv)}" data-ma-nv="${escapeHtml(staff.ma_nv || "")}" data-id-nv="${escapeHtml(staff.id_nv || "")}" data-name="${escapeHtml(staff.ten_nv)}" />${escapeHtml(staff.ten_nv)}`;

    function bindStaffOptionEvents() { document.querySelectorAll(".staff-option").forEach((option) => { option.addEventListener("change", () => { handleStaffChange(option); updateStaffButtonText(); loadCustomersFromSupabase(1); }); }); }
    function handleStaffChange(changedOption) {
      const staffOptions = document.querySelectorAll(".staff-option");
      const allOption = document.querySelector('.staff-option[value="all"]');
      const normalOptions = Array.from(staffOptions).filter((opt) => opt.value !== "all");
      if (changedOption.value === "all" && changedOption.checked) { normalOptions.forEach((opt) => opt.checked = false); return; }
      if (changedOption.value !== "all" && changedOption.checked) allOption.checked = false;
      const hasAnyNormalChecked = normalOptions.some((opt) => opt.checked);
      if (!hasAnyNormalChecked) allOption.checked = true;

    function getSelectedStaffList() {
      const selected = Array.from(document.querySelectorAll(".staff-option")).filter((opt) => opt.checked).map((opt) => opt.value.toLowerCase());

    function updateStaffButtonText() {
      const selectedOptions = Array.from(document.querySelectorAll(".staff-option")).filter((opt) => opt.checked);

    function getStaffNameByCode(maNv) {
      const code = String(maNv || "").trim().toLowerCase();

    }

    function renderStaffSelect(maKh) {

    function updateCustomerStaffEditorUI(maKh) {
