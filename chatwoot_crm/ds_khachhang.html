<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Danh sách khách hàng</title>

  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>
  <script src="./js/auth_token.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: 100%;
      height: 100vh;
      padding: 6px;
      background: #f3f4f6;
      overflow: hidden;
    }

    .content {
      width: 100%;
      height: calc(100vh - 12px);
      background: #ffffff;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.55fr) auto auto auto;
      gap: 6px;
      margin-bottom: 8px;
      align-items: center;
      position: relative;
      z-index: 30;
      background: #ffffff;
      flex: 0 0 auto;
    }

    .toolbar input {
      width: 100%;
      height: 34px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      background: #ffffff;
      color: #111827;
    }

    .toolbar input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    #searchBtn {
      height: 34px;
      min-width: 78px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      padding: 0 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    #searchBtn:hover {
      background: #1d4ed8;
    }

    #searchBtn.loading {
      opacity: 0.65;
      pointer-events: none;
    }

    #refreshBtn {
      height: 34px;
      min-width: 92px;
      border: none;
      background: #10b981;
      color: #ffffff;
      padding: 0 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    #refreshBtn:hover {
      background: #059669;
    }

    #refreshBtn.loading,
    #refreshBtn:disabled {
      opacity: 0.65;
      pointer-events: none;
      cursor: not-allowed;
    }

    .column-dropdown {
      position: relative;
    }

    #columnToggleBtn {
      height: 34px;
      min-width: 82px;
      border: none;
      background: #374151;
      color: #ffffff;
      padding: 0 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    #columnToggleBtn:hover {
      background: #1f2937;
    }

    .column-dropdown-menu {
      position: absolute;
      top: 38px;
      right: 0;
      width: 220px;
      max-height: 300px;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
      padding: 8px;
      z-index: 1200;
    }

    .column-dropdown-menu label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 6px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
    }

    .column-dropdown-menu label:hover {
      background: #f3f4f6;
    }

    .column-dropdown-menu input {
      width: auto;
      height: auto;
      margin: 0;
    }

    .customer-table col.col-hidden,
    .customer-table th.col-hidden,
    .customer-table td.col-hidden {
      display: none !important;
    }

    .staff-dropdown {
      position: relative;
      width: 100%;
    }

    #staffDropdownBtn {
      width: 100%;
      height: 34px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      background: #ffffff;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #staffDropdownBtn:hover {
      border-color: #2563eb;
    }

    .staff-dropdown-menu {
      position: absolute;
      top: 38px;
      left: 0;
      width: 100%;
      min-width: 170px;
      max-height: 230px;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      padding: 6px;
      z-index: 1000;
    }

    .staff-dropdown-menu label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      border-radius: 6px;
    }

    .staff-dropdown-menu label:hover {
      background: #f3f4f6;
    }

    .staff-dropdown-menu input {
      width: auto;
      height: auto;
      margin: 0;
    }

    .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border-top: 1px solid #f3f4f6;
    }

    .customer-table {
      width: max-content;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
      margin-top: 0;
    }

    .customer-table th,
    .customer-table td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .customer-table th {
      background: #f9fafb;
      font-weight: 700;
      color: #111827;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .customer-table tr:hover td {
      background: #f9fafb;
    }

    .customer-table th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .customer-table th.sortable:hover {
      background: #eef2ff;
    }

    .sort-icon {
      margin-left: 4px;
      font-size: 11px;
      color: #2563eb;
    }

    .customer-table button {
      border: none;
      background: #2563eb;
      color: #ffffff;
      padding: 5px 9px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .customer-table button:hover {
      background: #1d4ed8;
    }

    .customer-table tbody {
      transition: opacity 0.12s ease;
    }

    .customer-table tbody.loading {
      opacity: 0.45;
      pointer-events: none;
    }

    .customer-table th.resizable {
      position: sticky;
      top: 0;
    }

    .col-resizer {
      position: absolute;
      top: 0;
      right: 0;
      width: 7px;
      height: 100%;
      cursor: col-resize;
      user-select: none;
      touch-action: none;
      z-index: 30;
    }

    .col-resizer::after {
      content: "";
      position: absolute;
      top: 20%;
      bottom: 20%;
      left: 3px;
      width: 1px;
      background: transparent;
    }

    .col-resizer:hover::after,
    .col-resizer.active::after {
      background: #2563eb;
    }

    body.resizing-column {
      cursor: col-resize;
      user-select: none;
    }

    .staff-cell-select {
      width: 100%;
      height: 34px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #ffffff;
      color: #111827;
      font-size: 13px;
      padding: 0 6px;
      cursor: pointer;
    }

    .staff-cell-select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .staff-cell-select.changed {
      border-color: #f97316;
      background: #fff7ed;
    }

    .staff-chip-editor {
      min-height: 38px;
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 4px 7px;
      cursor: pointer;
      overflow: visible;
    }

    .staff-chip-editor:hover,
    .staff-chip-editor.active {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .staff-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 145px;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 8px;
      background: #eef0f3;
      color: #111827;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }

    .staff-chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .staff-chip-remove {
      border: none;
      background: transparent;
      color: #4b5563;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 1px;
      font-weight: 800;
    }

    .staff-chip-remove:hover {
      color: #dc2626;
    }

    .staff-chip-placeholder {
      color: #6b7280;
      font-size: 13px;
      padding: 4px 2px;
    }

    .staff-chip-picker {
      position: fixed;
      z-index: 6500;
      width: 300px;
      max-width: calc(100vw - 24px);
      max-height: 320px;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.2);
      padding: 8px;
    }

    .staff-chip-picker-title {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      margin: 2px 4px 8px;
    }

    .staff-chip-picker label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 7px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
    }

    .staff-chip-picker label:hover {
      background: #f3f4f6;
    }

    .staff-chip-picker input {
      width: auto;
      height: auto;
      margin: 0;
    }


    .staff-chip-option {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      background: transparent;
      text-align: left;
      font-family: inherit;
    }

    .staff-chip-option:hover {
      background: #f3f4f6;
    }

    .staff-chip-option-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }

    .staff-chip-empty-option {
      padding: 10px;
      color: #6b7280;
      font-size: 13px;
    }

    .footer-actions {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #6b7280;
      flex-wrap: wrap;
      background: #ffffff;
      padding-top: 6px;
      padding-bottom: 2px;
      flex: 0 0 auto;
    }

    .page-actions,
    .user-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    #pageSizeSelect {
      height: 28px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      border-radius: 6px;
      padding: 0 8px;
      font-size: 12px;
      color: #111827;
    }

    .page-actions button {
      min-width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #374151;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .page-actions button:hover {
      background: #f3f4f6;
    }

    .page-actions button:disabled {
      color: #cbd5e1;
      cursor: not-allowed;
      background: transparent;
    }

    #pageInput {
      width: 48px;
      height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      text-align: center;
      font-size: 12px;
      outline: none;
    }

    #pageInput:focus {
      border-color: #2563eb;
    }

    #pageInfo {
      color: #374151;
      font-size: 12px;
      white-space: nowrap;
      min-width: 165px;
    }

    #userInfo {
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #logoutBtn {
      border: none;
      background: #ef4444;
      color: #ffffff;
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    #logoutBtn:hover {
      background: #dc2626;
    }

    .floating-save-bar {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5000;
      min-width: 320px;
      max-width: calc(100vw - 36px);
      background: #111827;
      color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .floating-save-bar b {
      display: block;
      font-size: 13px;
    }

    #saveMessage {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: #cbd5e1;
    }

    .floating-save-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .floating-save-actions button {
      border: none;
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    #saveStaffBtn {
      background: #22c55e;
      color: #ffffff;
    }

    #saveStaffBtn:hover {
      background: #16a34a;
    }

    #assignCustomerCodeBtn {
      background: #2563eb;
      color: #ffffff;
    }

    #assignCustomerCodeBtn:hover {
      background: #1d4ed8;
    }


    .row-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .customer-table button.assign-btn {
      background: #2563eb;
    }

    .customer-table button.assign-btn:hover {
      background: #1d4ed8;
    }

    .customer-table button.assign-btn.has-staff-dropdown::after {
      content: " ▾";
      font-size: 12px;
      font-weight: 900;
    }

    .zalo-chat-popover.assign-staff-dropdown {
      width: 260px;
      padding: 8px;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-chat-title,
    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-chooser-title {
      display: none;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-chooser {
      margin-bottom: 0;
      padding: 0;
      border: none;
      background: transparent;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-btn {
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-btn::after {
      content: "Chọn";
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-btn.selected::after {
      content: "✓";
      color: #ffffff;
    }

    .customer-table button.zalo-chat-btn {
      background: #16a34a;
    }

    .customer-table button.zalo-chat-btn:hover {
      background: #15803d;
    }

    .customer-table button:disabled,
    .customer-table button.zalo-chat-btn:disabled,
    .customer-table button.assign-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.15);
    }

    .customer-table button.zalo-chat-btn:disabled:hover {
      background: #16a34a;
    }

    .zalo-chat-popover {
      position: fixed;
      z-index: 6000;
      width: 320px;
      max-width: calc(100vw - 24px);
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.2);
      padding: 10px;
    }

    .zalo-chat-title {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .zalo-sender-info {
      margin-bottom: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      font-size: 13px;
      font-weight: 700;
    }

    .zalo-sender-chooser {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }

    .zalo-sender-chooser-title {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
    }

    .zalo-sender-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .zalo-sender-btn {
      border: 1px solid #d1d5db;
      border-radius: 9px;
      padding: 8px 10px;
      background: #ffffff;
      color: #111827;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .zalo-sender-btn:hover {
      border-color: #16a34a;
      background: #f0fdf4;
    }

    .zalo-sender-btn.selected {
      border-color: #16a34a;
      background: #16a34a;
      color: #ffffff;
      box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.16);
    }

    .zalo-chat-popover textarea {
      width: 100%;
      min-height: 82px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      outline: none;
    }

    .zalo-chat-popover textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .zalo-attach-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .zalo-attach-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 8px;
      background: #eef2ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #c7d2fe;
      user-select: none;
    }

    .zalo-attach-btn:hover {
      background: #e0e7ff;
    }

    #zaloAttachmentName {
      font-size: 12px;
      color: #374151;
      max-width: 210px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #zaloAttachmentPreview {
      margin-top: 8px;
    }

    #zaloAttachmentPreview img,
    #zaloAttachmentPreview video {
      max-width: 180px;
      max-height: 130px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      display: block;
      background: #000000;
    }

    .zalo-file-preview {
      font-size: 12px;
      color: #374151;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #f9fafb;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .zalo-file-remove {
      border: none;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 7px;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .zalo-file-remove:hover {
      background: #fecaca;
    }

    .zalo-chat-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .zalo-chat-actions button {
      border: none;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .zalo-chat-send {
      background: #16a34a;
      color: #ffffff;
    }

    .zalo-chat-close {
      background: #e5e7eb;
      color: #111827;
    }


    .confirm-assign-modal {
      position: fixed;
      inset: 0;
      z-index: 7000;
      background: rgba(15, 23, 42, 0.48);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .confirm-assign-box {
      width: min(440px, 92vw);
      background: #ffffff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      padding: 18px;
      color: #111827;
    }

    .confirm-assign-title {
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .confirm-assign-message {
      font-size: 14px;
      line-height: 1.55;
      color: #374151;
    }

    .confirm-assign-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .confirm-assign-actions button {
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    function getQueryParam(name) {
      const value = new URLSearchParams(window.location.search).get(name);
      if (!value || String(value).includes("{{")) {
        return null;
      }
      return value;
    }

    function tryParseJson(value) {
      if (typeof value !== "string") {
        return value;
      }

      let current = value;

      for (let i = 0; i < 4; i++) {
        if (typeof current !== "string") {
          return current;
        }

        const trimmed = current.trim();

        if (!trimmed || (!trimmed.startsWith("{") && !trimmed.startsWith("["))) {
          return current;
        }

        try {
          current = JSON.parse(trimmed);
        } catch (error) {
          return value;
        }
      }

      return current;
    }

    function getRawText(value) {
      if (typeof value === "string") {
        return value;
      }

      try {
        return JSON.stringify(value || {});
      } catch (error) {
        return "";
      }
    }

    function extractFirstMatch(text, regex) {
      const match = String(text || "").match(regex);
      return match && match[1] ? String(match[1]) : null;
    }

    function extractIdsFromRawChatwootMessage(rawData) {
      const raw = getRawText(rawData);

      if (!raw || (raw.indexOf("appContext") === -1 && raw.indexOf("conversation_id") === -1)) {
        return null;
      }

      chatwootContextRaw = raw;
      window.__CHATWOOT_APP_CONTEXT_RAW__ = raw;

      const conversationId =
        extractFirstMatch(raw, /["']conversation_id["']\s*:\s*["']?(\d+)["']?/i) ||
        extractFirstMatch(raw, /conversation_id=(\d+)/i);

      // Trong context Chatwoot của anh, contact nằm ở conversation.sender.id.
      // Regex này cố tình tìm sender.id, tránh lấy nhầm id message.
      const senderBlock = raw.match(/["']sender["']\s*:\s*\{[\s\S]{0,2000}?\}/i);
      const contactId = senderBlock
        ? extractFirstMatch(senderBlock[0], /["']id["']\s*:\s*["']?(\d+)["']?/i)
        : null;

      if (conversationId) {
        chatwootFallbackConversationId = String(conversationId);
        window.__CHATWOOT_CONVERSATION_ID__ = String(conversationId);
      }

      if (contactId) {
        chatwootFallbackContactId = String(contactId);
        window.__CONTACT_ID__ = String(contactId);
      }

      if (conversationId || contactId) {
        console.log("✅ BẮT ID TỪ RAW CHATWOOT MESSAGE:", {
          conversation_id: conversationId || null,
          contact_id: contactId || null
        });
      }

      return {
        conversation_id: conversationId || null,
        contact_id: contactId || null
      };
    }

    function extractChatwootContextFromMessage(rawData) {
      extractIdsFromRawChatwootMessage(rawData);

      const payload = tryParseJson(rawData);

      if (!payload || typeof payload !== "object") {
        return null;
      }

      if (payload.event === "appContext") {
        return payload.data || null;
      }

      if (payload.data && payload.data.event === "appContext") {
        return payload.data.data || null;
      }

      if (payload.conversation && typeof payload.conversation === "object") {
        return payload;
      }

      if (payload.data && payload.data.conversation && typeof payload.data.conversation === "object") {
        return payload.data;
      }

      return null;
    }

    function resolveWaitingChatwootContext() {
      const resolvers = chatwootContextReadyResolvers;
      chatwootContextReadyResolvers = [];

      resolvers.forEach(function (resolve) {
        resolve(chatwootContext);
      });
    }

    function handleChatwootMessage(event) {
      const context = extractChatwootContextFromMessage(event.data);

      if (!context) {
        // Nếu không parse được context nhưng regex đã lấy được conversation_id, vẫn cho các nút chạy.
        if (getCurrentConversationId()) {
          resolveWaitingChatwootContext();
        }
        return;
      }

      chatwootContext = context;
      window.__CHATWOOT_APP_CONTEXT__ = context;

      const conversationId = getCurrentConversationId();
      const contactId = getCurrentContactId();

      console.log("✅ CHATWOOT APP CONTEXT ĐÃ NHẬN:", {
        conversation_id: conversationId,
        contact_id: contactId,
        conversation_field: context && context.conversation ? context.conversation : null,
        context: context
      });

      resolveWaitingChatwootContext();
    }

    function requestChatwootContext() {
      try {
        window.parent.postMessage(CHATWOOT_FETCH_INFO_EVENT, "*");
      } catch (error) {
        console.warn("Không gửi được yêu cầu lấy Chatwoot context:", error);
      }
    }

    function waitForChatwootContext(timeoutMs = 1500) {
      if (getCurrentConversationId()) {
        return Promise.resolve(chatwootContext);
      }

      requestChatwootContext();

      return new Promise(function (resolve) {
        const timeout = setTimeout(function () {
          chatwootContextReadyResolvers = chatwootContextReadyResolvers.filter(function (item) {
            return item !== done;
          });
          resolve(chatwootContext);
        }, timeoutMs);

        function done(context) {
          clearTimeout(timeout);
          resolve(context);
        }

        chatwootContextReadyResolvers.push(done);

        setTimeout(requestChatwootContext, 250);
        setTimeout(requestChatwootContext, 700);
        setTimeout(requestChatwootContext, 1400);
        setTimeout(requestChatwootContext, 2400);
      });
    }

    function getCurrentConversationId() {
      const queryId = getQueryParam("conversation_id");
      if (queryId) {
        return String(queryId);
      }

      const ctx = chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null;
      const c = ctx && ctx.conversation ? ctx.conversation : null;

      // Chatwoot Dashboard App bản anh đang dùng trả ID hội thoại ở conversation.conversation_id.
      // Không dùng conversation.id làm ưu tiên vì trường đó có thể là ID message.
      if (c && c.conversation_id) {
        return String(c.conversation_id);
      }

      if (ctx && ctx.conversation_id) {
        return String(ctx.conversation_id);
      }

      if (ctx && ctx.message && ctx.message.conversation_id) {
        return String(ctx.message.conversation_id);
      }

      if (chatwootFallbackConversationId) {
        return String(chatwootFallbackConversationId);
      }

      if (window.__CHATWOOT_CONVERSATION_ID__) {
        return String(window.__CHATWOOT_CONVERSATION_ID__);
      }

      if (chatwootContextRaw) {
        const rawId = extractFirstMatch(chatwootContextRaw, /["']conversation_id["']\s*:\s*["']?(\d+)["']?/i);
        if (rawId) return String(rawId);
      }

      return null;
    }

    function getCurrentContactId() {
      const queryId = getQueryParam("contact_id");
      if (queryId) {
        return String(queryId);
      }

      const ctx = chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null;
      const c = ctx && ctx.conversation ? ctx.conversation : null;

      const contactId =
        (ctx && ctx.contact && ctx.contact.id) ||
        (c && c.sender && c.sender.id) ||
        (c && c.contact && c.contact.id) ||
        (c && c.meta && c.meta.sender && c.meta.sender.id) ||
        chatwootFallbackContactId ||
        window.__CONTACT_ID__ ||
        null;

      return contactId ? String(contactId) : null;
    }

    function readMaKhFromObject(obj) {
      if (!obj || typeof obj !== "object") {
        return null;
      }

      const candidates = [
        obj.ma_kh,
        obj.makh,
        obj.customer_code,
        obj.custom_attributes && obj.custom_attributes.ma_kh,
        obj.custom_attributes && obj.custom_attributes.makh,
        obj.additional_attributes && obj.additional_attributes.ma_kh,
        obj.additional_attributes && obj.additional_attributes.makh
      ];

      for (const value of candidates) {
        const text = String(value || "").trim();
        if (text) {
          return text;
        }
      }

      return null;
    }

    function getCurrentAssignedMaKh() {
      const queryMaKh = getQueryParam("current_ma_kh") || getQueryParam("assigned_ma_kh");
      if (queryMaKh) {
        return String(queryMaKh).trim();
      }

      const ctx = chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null;
      const c = ctx && ctx.conversation ? ctx.conversation : null;

      const candidates = [
        ctx && ctx.contact,
        ctx && ctx.sender,
        c && c.sender,
        c && c.contact,
        c && c.meta && c.meta.sender,
        c && c.meta && c.meta.contact,
        ctx
      ];

      for (const item of candidates) {
        const maKh = readMaKhFromObject(item);
        if (maKh) {
          return maKh;
        }
      }

      if (chatwootContextRaw) {
        const rawMaKh =
          extractFirstMatch(chatwootContextRaw, /["']ma_kh["']\s*:\s*["']([^"']+)["']/i) ||
          extractFirstMatch(chatwootContextRaw, /["']makh["']\s*:\s*["']([^"']+)["']/i);

        if (rawMaKh) {
          return String(rawMaKh).trim();
        }
      }

      return null;
    }

    async function buildWebhookPayload(action, maKh, maNv, extra) {
      const data = extra || {};

      const contextConversationId = data.conversation_id || data.chatwoot_conversation_id
        ? String(data.conversation_id || data.chatwoot_conversation_id)
        : null;

      if (!contextConversationId) {
        await waitForChatwootContext();
      }

      const conversationId = contextConversationId || getCurrentConversationId();
      const contactId = data.contact_id || getCurrentContactId();

      return {
        action: action,
        ma_kh: maKh,
        ma_nv: normalizeNullableMaNv(maNv),
        conversation_id: conversationId ? String(conversationId) : null,
        chatwoot_conversation_id: conversationId ? String(conversationId) : null,
        contact_id: contactId ? String(contactId) : null,
        source: data.source || "",
        ...data
      };
    }

    async function sendCustomerWebhook(action, maKh, maNv, extra, options) {
      const opts = options || {};
      const payload = await buildWebhookPayload(action, maKh, maNv, extra || {});

      if (opts.requireConversation && !payload.conversation_id) {
        console.error("Thiếu conversation_id khi gửi webhook:", {
          payload: payload,
          chatwootContext: chatwootContext,
          iframe_url: window.location.href,
          referrer: document.referrer
        });

        throw new Error("Chưa lấy được ID hội thoại từ Chatwoot appContext.");
      }

      const webhookUrl = opts.webhookUrl || UPDATE_STAFF_WEBHOOK_URL;
      console.log("SEND WEBHOOK PAYLOAD:", payload, "URL:", webhookUrl);

      const resp = await fetch(webhookUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const text = await resp.text();
      let result = {};

      try {
        result = text ? JSON.parse(text) : {};
      } catch (error) {
        result = { raw: text };
      }

      if (!resp.ok) {
        throw new Error(result.message || text || "Webhook lỗi");
      }

      return {
        payload: payload,
        result: result
      };
    }

    function getWebhookDisplayMessage(result, fallbackMessage) {
      if (result && result.message) {
        return result.message;
      }

      const raw = result && result.raw ? String(result.raw).trim() : "";

      if (!raw || raw === "Workflow was started") {
        return fallbackMessage;
      }

      return raw;
    }

        .from(TABLE_KHACH_HANG)

        .limit(100);

    function resetZaloAttachment() {
      if (zaloAttachmentPreviewUrl) {
        URL.revokeObjectURL(zaloAttachmentPreviewUrl);
        zaloAttachmentPreviewUrl = "";
      }

      if (zaloAttachmentInput) {
        zaloAttachmentInput.value = "";
      }

      if (zaloAttachmentName) {
        zaloAttachmentName.textContent = "";
      }

      if (zaloAttachmentPreview) {
        zaloAttachmentPreview.innerHTML = "";
      }

      if (zaloAttachmentRemoveBtn) {
        zaloAttachmentRemoveBtn.classList.add("hidden");
      }
    }

    function handleZaloAttachmentChanged() {
      const file = zaloAttachmentInput && zaloAttachmentInput.files
        ? zaloAttachmentInput.files[0]
        : null;

      if (!file) {
        resetZaloAttachment();
        return;
      }

      const maxSizeMb = 50;
      const maxBytes = maxSizeMb * 1024 * 1024;

      if (file.size > maxBytes) {
        showNotice("File quá lớn. Tạm giới hạn " + maxSizeMb + "MB.", "error", 3000);
        resetZaloAttachment();
        return;
      }

      if (zaloAttachmentName) {
        zaloAttachmentName.textContent = file.name;
      }

      if (zaloAttachmentRemoveBtn) {
        zaloAttachmentRemoveBtn.classList.remove("hidden");
      }

      if (zaloAttachmentPreviewUrl) {
        URL.revokeObjectURL(zaloAttachmentPreviewUrl);
      }

      zaloAttachmentPreviewUrl = URL.createObjectURL(file);

      if (file.type.startsWith("image/")) {
        zaloAttachmentPreview.innerHTML = `
          <img src="${zaloAttachmentPreviewUrl}" alt="Ảnh đã chọn">
        `;
        return;
      }

      if (file.type.startsWith("video/")) {
        zaloAttachmentPreview.innerHTML = `
          <video src="${zaloAttachmentPreviewUrl}" controls></video>
        `;
        return;
      }

      zaloAttachmentPreview.innerHTML = `
        <div class="zalo-file-preview">
          📎 ${escapeHtml(file.name)}
        </div>
      `;
    }

      zaloSenderChooser.classList.add("hidden");

    async function sendZaloChatMessage() {
      if (!currentZaloChatRow) {
        return;
      }

      if (!currentZaloChatRow.selected_id_nv) {
        showNotice("Khách này chưa có nhân viên phụ trách.", "error", 2200);
        return;
      }

      const message = zaloChatText.value.trim();
      const file = zaloAttachmentInput && zaloAttachmentInput.files
        ? zaloAttachmentInput.files[0]
        : null;

      if (!message && !file) {
        showNotice("Chưa nhập nội dung hoặc chọn file.", "error", 1800);
        return;
      }

      zaloChatSendBtn.disabled = true;
      zaloChatSendBtn.textContent = "Đang gửi...";

      try {
        const formData = new FormData();

        formData.append("action", "zalo_chat");
        formData.append("source", "zalo_chat_button");
        formData.append("ma_kh", currentZaloChatRow.ma_kh || "");
        formData.append("ten_kh", currentZaloChatRow.ten_kh || "");
        formData.append("sdt", currentZaloChatRow.sdt || "");
        formData.append("conversation_id", currentZaloChatRow.conversation_id || "");
        formData.append("chatwoot_conversation_id", currentZaloChatRow.conversation_id || "");
        formData.append("row_conversation_id", currentZaloChatRow.row_conversation_id || "");
        formData.append("contact_id", currentZaloChatRow.contact_id || "");
        formData.append("message", message || "");

        // Bản đơn nhân viên: chỉ gửi 1 nhân viên phụ trách.
        formData.append("id_nv", currentZaloChatRow.id_nv || currentZaloChatRow.selected_id_nv || "");
        formData.append("ma_nv", currentZaloChatRow.ma_nv || currentZaloChatRow.selected_ma_nv || "");
        formData.append("ten_nv", currentZaloChatRow.ten_nv || currentZaloChatRow.selected_ten_nv || "");
        formData.append("selected_id_nv", currentZaloChatRow.selected_id_nv || "");
        formData.append("selected_ma_nv", currentZaloChatRow.selected_ma_nv || "");
        formData.append("selected_ten_nv", currentZaloChatRow.selected_ten_nv || "");

        if (file) {
          formData.append("attachment", file, file.name);
          formData.append("attachment_name", file.name);
          formData.append("attachment_type", file.type || "");
          formData.append("attachment_size", String(file.size || 0));

          if (file.type.startsWith("image/")) {
            formData.append("attachment_kind", "image");
          } else if (file.type.startsWith("video/")) {
            formData.append("attachment_kind", "video");
          } else {
            formData.append("attachment_kind", "file");
          }
        } else {
          formData.append("attachment_kind", "text");
        }

        const resp = await fetch(ZALO_CHAT_WEBHOOK_URL, {
          method: "POST",
          body: formData
        });

        const text = await resp.text();
        let result = {};

        try {
          result = text ? JSON.parse(text) : {};
        } catch (error) {
          result = { raw: text };
        }

        if (!resp.ok) {
          throw new Error(result.message || text || "Webhook lỗi");
        }

        console.log("ĐÃ GỬI WEBHOOK ZALO CHAT:", {
          ma_kh: currentZaloChatRow.ma_kh,
          conversation_id: currentZaloChatRow.conversation_id,
          id_nv: currentZaloChatRow.selected_id_nv,
          ten_nv: currentZaloChatRow.selected_ten_nv
        });

        showNotice(getWebhookDisplayMessage(result, "Đã gửi Zalo chat cho " + currentZaloChatRow.ma_kh));
        closeZaloChat();
      } catch (error) {
        console.error("Lỗi gửi Zalo chat:", error);
        showNotice("Lỗi gửi Zalo chat: " + (error.message || JSON.stringify(error)), "error", 3500);
      } finally {
        zaloChatSendBtn.disabled = false;
        zaloChatSendBtn.textContent = "Gửi";
      }
    }


    async function initSupabase() {
      try {
        popupCfgNote.textContent = "Đang lấy cấu hình Supabase...";

        let supabaseUrl = "";
        let supabaseAnon = "";

        try {
          const resp = await fetch("/api/getConfig", {
            headers: {
              "x-internal-key": window.getInternalKey ? window.getInternalKey() : ""
            }
          });

          if (resp.ok) {
            const cfg = await resp.json();
            supabaseUrl = cfg.url || "";
            supabaseAnon = cfg.anon || cfg.key || "";
          }
        } catch (error) {
          console.warn("Không gọi được /api/getConfig trực tiếp:", error);
        }

        if ((!supabaseUrl || !supabaseAnon) && window.configReady) {
          await window.configReady;

          if (typeof window.getConfig === "function") {
            const urlValue = window.getConfig("url");
            const anonValue = window.getConfig("anon");

            if (typeof urlValue === "string") {
              supabaseUrl = supabaseUrl || urlValue;
            }

            if (typeof anonValue === "string") {
              supabaseAnon = supabaseAnon || anonValue;
            }
          }
        }

        if (!supabaseUrl || !supabaseAnon) {
          popupCfgNote.textContent = "Thiếu cấu hình Supabase";
          popupLoginMessage.textContent = "Chưa lấy được Supabase URL hoặc anon key.";
          return;
        }

        SUPABASE_REST_URL = supabaseUrl;
        SUPABASE_REST_ANON = supabaseAnon;

        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnon);

        popupCfgNote.textContent = "Sẵn sàng đăng nhập";
        popupLoginMessage.textContent = "";
      } catch (error) {
        console.error("Lỗi initSupabase:", error);
        popupCfgNote.textContent = "Lỗi cấu hình Supabase";
        popupLoginMessage.textContent = error.message || "Không lấy được cấu hình.";
      }
    }


    function normalizeKiotStaffId(value) {
      if (value === null || value === undefined) {
        return "";
      }

      if (typeof value === "number") {
        if (!Number.isFinite(value)) {
          return "";
        }

        if (Number.isInteger(value)) {
          return String(value);
        }

        return String(value).trim().replace(/\.0$/, "");
      }

      return String(value || "").trim().replace(/\.0$/, "");
    }

    async function loadStaffFromSupabase() {
      if (!supabaseClient) {
        return;
      }

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, id_nv, ten_nv")
        .not("id_nv", "is", null)
        .not("ma_nv", "is", null)
        .order("ten_nv", { ascending: true });

      if (error) {
        console.error("Lỗi tải nhân viên:", error);

        if (typeof showNotice === "function") {
          showNotice("Lỗi tải nhân viên: " + (error.message || JSON.stringify(error)), "error", 3500);
        }

        return;
      }

      staffRows = (data || [])
        .map(function (item) {
          const maNv = String(item.ma_nv || "").trim();
          const idNv = normalizeKiotStaffId(item.id_nv);

          return {
            // ma_nv là mã đăng nhập / mã nội bộ để lưu vào kv_khachhang.ma_nv.
            ma_nv: maNv,

            // id_nv là ID nhân viên KiotViet, chỉ dùng để lọc và gửi kèm webhook.
            id_nv: idNv,

            ten_nv: String(item.ten_nv || maNv || idNv || "").trim()
          };
        })
        .filter(function (item) {
          // Chỉ hiện nhân viên đã có cả mã đăng nhập ma_nv và ID KiotViet id_nv.
          return item.ma_nv !== "" && item.id_nv !== "";
        });

      renderStaffDropdown();

      if (customers.length > 0) {
        renderCustomers();
      }
    }

               String(staff.ma_nv || "").trim().toLowerCase() === code;

      if (!savedCode) {

      const staff = getStaffByAnyCode(savedCode);
      return [staff ? normalizeKiotStaffId(staff.id_nv) : savedCode];

    function getCustomerStaffRows(maKh) {
      const customer = getCustomerByMaKh(maKh);

        return [];

    async function saveCustomerStaffAssignment(maKh, selectedIdNv) {
      const maKhText = String(maKh || "").trim();
      const idNv = normalizeKiotStaffId(selectedIdNv);

      if (!maKhText) {
        return;
      }

      if (!supabaseClient) {
        showNotice("Supabase chưa sẵn sàng.", "error", 2500);
        return;
      }

      const found = getCustomerByMaKh(maKhText);
      const staff = idNv ? getStaffByAnyCode(idNv) : null;
      const valueToSave = idNv || null;

      try {
        const { error } = await supabaseClient
          .from(TABLE_KHACH_HANG_NHANVIEN)
          .update({ ma_nv: valueToSave })
          .eq("ma_kh", maKhText);

        if (error) {
          throw error;
        }

        if (found) {
          found.ma_nv = valueToSave;
          found.id_nv = staff ? normalizeKiotStaffId(staff.id_nv) : valueToSave;
          found.ten_nv = staff ? staff.ten_nv : null;
          found.nhan_vien_ids = valueToSave ? [found.id_nv] : [];
        }

        updateCustomerStaffEditorUI(maKhText);
        renderCustomers();

        await sendCustomerWebhook(
          "set_khachhang_nhanvien",
          maKhText,
          valueToSave,
          {
            table: TABLE_KHACH_HANG,
            source: "kv_khachhang_ma_nv_select",
            mode: "single_staff_kv_khachhang_only",
            id_nv: staff ? normalizeKiotStaffId(staff.id_nv) : valueToSave,
            ma_nv: valueToSave,
            selected_id_nv: staff ? normalizeKiotStaffId(staff.id_nv) : valueToSave,
            selected_ma_nv: valueToSave,
            selected_ten_nv: staff ? staff.ten_nv : ""
          },
          { requireConversation: false, webhookUrl: UPDATE_CHATWOOT_WEBHOOK_URL }
        ).catch(function (webhookError) {
          console.warn("Webhook cập nhật nhân viên lỗi:", webhookError);
        });

        showNotice(valueToSave
          ? "Đã cập nhật nhân viên phụ trách cho " + maKhText
          : "Đã bỏ nhân viên phụ trách của " + maKhText,
          "ok",
          1800
        );
      } catch (error) {
        console.error("Lỗi lưu ma_nv vào kv_khachhang:", error);
        showNotice("Lỗi lưu nhân viên: " + (error.message || JSON.stringify(error)), "error", 4500);
        if (found) {
          updateCustomerStaffEditorUI(maKhText);
        }
      }
    }

    async function refreshCustomersSmooth() {
      customerProductCache = {};
      openedProductMaKh = "";

      if (isLoadingCustomers) {
        return;
      }

      if (!supabaseClient) {
        showNotice("Supabase chưa sẵn sàng.", "error", 2500);
        return;
      }

      if (refreshBtn) {
        refreshBtn.disabled = true;
        refreshBtn.classList.add("loading");
        refreshBtn.textContent = "Đang làm mới...";
      }

      try {
        await loadCustomersFromSupabase(currentPage);
        showNotice("Đã làm mới dữ liệu.");
      } catch (error) {
        console.error("Lỗi làm mới:", error);
        showNotice("Lỗi làm mới: " + (error.message || JSON.stringify(error)), "error", 3500);
      } finally {
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove("loading");
          refreshBtn.textContent = "↻ Làm mới";
        }
      }

    async function loadCustomersFromSupabase(page = 1) {
      if (isLoadingCustomers) {
        return;
      }

      if (!supabaseClient) {
        customerBody.innerHTML = `
          <tr>
            <td colspan="8">Supabase chưa sẵn sàng.</td>
          </tr>
        `;
        return;
      }

      currentPage = page;

      const from = (currentPage - 1) * pageSize;
      const to = from + pageSize - 1;
      const keyword = searchInput.value.trim();
      const selectedStaffDbCodes = getSelectedStaffDbCodes();

      setCustomerLoading(true);

      const dbSortField = getDbSortField();
      const ascending = getDbSortAscending();

      let query = supabaseClient
        .from(TABLE_KHACH_HANG)
        .select("ma_kh, ten_kh, dien_thoai, congno, ma_nv, ngay_chat_cuoi, conversation_id, contact_id", { count: "exact" })
        .order(dbSortField, { ascending: ascending, nullsFirst: false });

      if (keyword) {
        const safeKeyword = keyword.replaceAll("%", "\\%").replaceAll(",", " ");
        query = query.or(
          `ma_kh.ilike.%${safeKeyword}%,ten_kh.ilike.%${safeKeyword}%,dien_thoai.ilike.%${safeKeyword}%`
        );
      }

      if (selectedStaffDbCodes.length > 0) {
        query = query.in("ma_nv", selectedStaffDbCodes);
      }

      query = query.range(from, to);

      const { data, error, count } = await query;

      if (error) {
        if (String(error.message || "").includes("ma_nv")) {
          setCustomerLoading(false);
          return loadCustomersWithoutStaff(page);
        }

        customerBody.innerHTML = `
          <tr>
            <td colspan="8">
              Lỗi tải dữ liệu: ${escapeHtml(error.message || JSON.stringify(error))}
            </td>
          </tr>
        `;

        setCustomerLoading(false);
        return;
      }

      totalRows = count || 0;

      customers = (data || []).map(function (item) {
        return {
          ma_kh: item.ma_kh || "",
          ten_kh: item.ten_kh || "",
          sdt: item.dien_thoai || "",
          cong_no: item.congno || 0,
          ma_nv: normalizeNullableMaNv(item.ma_nv),
          ngay_chat_cuoi: item.ngay_chat_cuoi || null,
          conversation_id: item.conversation_id || null,
          contact_id: item.contact_id || null
        };
      });

      await loadCustomerStaffAssignments(customers.map(function (item) { return item.ma_kh; }));
      renderCustomers();
      setCustomerLoading(false);
    }

    async function saveStaffChanges() {
      const changes = Object.values(pendingStaffChanges);

      if (changes.length === 0) {
        return;
      }

      if (!supabaseClient) {
        saveMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      saveStaffBtn.disabled = true;
      saveStaffBtn.textContent = "Đang lưu...";
      saveMessage.textContent = "Đang cập nhật mã nhân viên...";

      try {
        for (const change of changes) {
          const { error } = await supabaseClient
            .from(TABLE_KHACH_HANG_NHANVIEN)
            .update({
              ma_nv: change.new_ma_nv || null
            })
            .eq("ma_kh", change.ma_kh);

          if (error) {
            throw error;
          }
        }

        pendingStaffChanges = {};
        saveMessage.textContent = "Đã lưu xong.";

        await loadCustomersFromSupabase(currentPage);

        setTimeout(function () {
          floatingSaveBar.classList.add("hidden");
          saveMessage.textContent = "";
        }, 800);
      } catch (error) {
        console.error("Lỗi lưu mã nhân viên:", error);
        saveMessage.textContent = "Lỗi lưu: " + (error.message || JSON.stringify(error));
      } finally {
        saveStaffBtn.disabled = false;
        saveStaffBtn.textContent = "Lưu";
      }
    }

    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));

      const fromRow = totalRows === 0 ? 0 : ((currentPage - 1) * pageSize) + 1;
      const toRow = Math.min(currentPage * pageSize, totalRows);

      pageInput.value = currentPage;
      pageInput.max = totalPages;

      pageInfo.textContent = `${fromRow} - ${toRow} trong ${totalRows} khách hàng`;

      firstPageBtn.disabled = currentPage <= 1;
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
      lastPageBtn.disabled = currentPage >= totalPages;
    }

      const raw = localStorage.getItem(LOGIN_STORAGE_KEY);

      if (!raw) {
        return null;
      }

      try {
        return JSON.parse(raw);
      } catch (error) {
        localStorage.removeItem(LOGIN_STORAGE_KEY);
        return null;
      }

    async function loginFromPopup() {
      const maNv = popupMaNvInput.value.trim();
      const matKhau = popupMatKhauInput.value.trim();

      popupLoginMessage.textContent = "";

      if (!maNv || !matKhau) {
        popupLoginMessage.textContent = "Vui lòng nhập mã nhân viên và mật khẩu.";
        return;
      }

      if (!supabaseClient) {
        popupLoginMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      popupLoginBtn.disabled = true;
      popupLoginBtn.textContent = "Đang đăng nhập...";

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, mat_khau, ten_nv, dien_thoai, hoat_dong, admin")
        .or(`ma_nv.eq.${maNv},dien_thoai.eq.${maNv}`)
        .eq("mat_khau", matKhau)
        .maybeSingle();

      popupLoginBtn.disabled = false;
      popupLoginBtn.textContent = "Đăng nhập";

      if (error) {
        console.error("Lỗi đăng nhập:", error);
        popupLoginMessage.textContent = "Lỗi kiểm tra đăng nhập.";
        return;
      }

      if (!data) {
        popupLoginMessage.textContent = "Sai mã nhân viên hoặc mật khẩu.";
        return;
      }

      if (data.hoat_dong === false) {
        popupLoginMessage.textContent = "Tài khoản đã bị khóa.";
        return;
      }

      currentUser = {
        ma_nv: data.ma_nv,
        ten_nv: data.ten_nv,
        admin: data.admin === true,
        login_at: new Date().toISOString()
      };

      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(currentUser));

      popupMaNvInput.value = "";
      popupMatKhauInput.value = "";
      popupLoginMessage.textContent = "";

      closeLoginPopup();
      showUserInfo();
      await loadStaffFromSupabase();
      await loadCustomersFromSupabase(1);
    }

    function handleStaffChange(changedOption) {
      const staffOptions = getStaffOptions();
      const allOption = document.querySelector('.staff-option[value="all"]');

      const normalOptions = Array.from(staffOptions).filter(function (option) {
        return option.value !== "all";
      });

      if (changedOption.value === "all" && changedOption.checked) {
        normalOptions.forEach(function (option) {
          option.checked = false;
        });
        return;
      }

      if (changedOption.value !== "all" && changedOption.checked) {
        allOption.checked = false;
      }

      const hasAnyNormalChecked = normalOptions.some(function (option) {
        return option.checked;
      });

      if (!hasAnyNormalChecked) {
        allOption.checked = true;
      }
    }

    function getSelectedStaffList() {
      const selected = Array.from(getStaffOptions())
        .filter(function (option) {
          return option.checked;
        })
        .map(function (option) {
          return option.value.toLowerCase();
        });

      if (selected.length === 0 || selected.includes("all")) {
        return [];
      }

      return selected;
    }

    function getSelectedStaffDbCodes() {
      return getSelectedStaffList()
        .map(function (idNv) {
          const staff = getStaffByIdNv(idNv) || getStaffByAnyCode(idNv);

          return [
            staff ? String(staff.ma_nv || "").trim() : "",
            staff ? normalizeKiotStaffId(staff.id_nv) : normalizeKiotStaffId(idNv)
          ];
        })
        .flat()
        .filter(function (value, index, arr) {
          return value && arr.indexOf(value) === index;
        });
    }

    function updateStaffButtonText() {
      const selectedOptions = Array.from(getStaffOptions())
        .filter(function (option) {
          return option.checked;
        });

      const selectedValues = selectedOptions.map(function (option) {
        return option.value;
      });

      if (selectedValues.length === 0 || selectedValues.includes("all")) {
        staffDropdownBtn.textContent = "Tất cả nhân viên";
        return;
      }

      const selectedNames = selectedOptions.map(function (option) {
        return option.dataset.name || getStaffNameByCode(option.value);
      });

      staffDropdownBtn.textContent = selectedNames.join(", ");
    }

      applyColumnVisibility();

      if (openedProductMaKh) {
        const row = document.getElementById(getCustomerProductRowId(openedProductMaKh));
        const mainRow = document.querySelector('.customer-main-row[data-ma-kh="' + cssEscapeValue(openedProductMaKh) + '"]');

        if (row) {
          row.classList.remove("hidden");
          if (mainRow) mainRow.classList.add("expanded");
          renderCustomerProductRows(openedProductMaKh);
        }
      }
    }

    function getCustomerProductRowId(maKh) {
      return "product_row_" + String(maKh || "").replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    async function toggleCustomerProducts(maKh, event) {
      if (
        event &&
        event.target &&
        event.target.closest("button, select, input, textarea, label, .staff-cell-select, .zalo-chat-popover, .confirm-assign-modal")
      ) {
        return;
      }

      const cleanMaKh = String(maKh || "").trim();
      const detailId = getCustomerProductRowId(cleanMaKh);
      const detailRow = document.getElementById(detailId);
      const mainRow = document.querySelector('.customer-main-row[data-ma-kh="' + cssEscapeValue(cleanMaKh) + '"]');

      if (!detailRow) {
        return;
      }

      const isOpening = detailRow.classList.contains("hidden");

      document.querySelectorAll(".customer-product-row").forEach(function (row) {
        row.classList.add("hidden");
      });

      document.querySelectorAll(".customer-main-row").forEach(function (row) {
        row.classList.remove("expanded");
      });

      if (!isOpening) {
        openedProductMaKh = "";
        return;
      }

      openedProductMaKh = cleanMaKh;
      detailRow.classList.remove("hidden");

      if (mainRow) {
        mainRow.classList.add("expanded");
      }

      await loadCustomerProducts(cleanMaKh);
    }

    function closeCustomerProducts(maKh) {
      const cleanMaKh = String(maKh || "").trim();
      const detailId = getCustomerProductRowId(cleanMaKh);
      const detailRow = document.getElementById(detailId);
      const mainRow = document.querySelector('.customer-main-row[data-ma-kh="' + cssEscapeValue(cleanMaKh) + '"]');

      if (detailRow) {
        detailRow.classList.add("hidden");
      }

      if (mainRow) {
        mainRow.classList.remove("expanded");
      }

      if (openedProductMaKh === cleanMaKh) {
        openedProductMaKh = "";
      }
    }

    async function loadCustomerProducts(maKh, forceReload = false) {
      const cleanMaKh = String(maKh || "").trim();
      const detailId = getCustomerProductRowId(cleanMaKh);
      const bodyEl = document.getElementById(detailId + "_body");
      const statusEl = document.getElementById(detailId + "_status");

      if (!cleanMaKh || !bodyEl) {
        return;
      }

      if (!forceReload && customerProductCache[cleanMaKh]) {
        renderCustomerProductRows(cleanMaKh);
        return;
      }

      if (!supabaseClient) {
        bodyEl.innerHTML = `
          <tr>
            <td colspan="3" class="customer-product-empty">Supabase chưa sẵn sàng.</td>
          </tr>
        `;
        return;
      }

      customerProductCache[cleanMaKh] = {
        rows: [],
        sortField: "so_luong",
        sortDirection: "desc"
      };

      bodyEl.innerHTML = `
        <tr>
          <td colspan="3" class="customer-product-empty">Đang tải hàng hóa...</td>
        </tr>
      `;

      if (statusEl) {
        statusEl.textContent = "Đang lọc theo mã KH: " + cleanMaKh;
      }

      try {
        const { data, error } = await supabaseClient
          .from(VIEW_HANG_HOA_THEO_KHACH)
          .select("ma_hang, ten_hang, so_luong")
          .eq("makh", cleanMaKh)
          .order("so_luong", { ascending: false })
          .limit(PRODUCT_DETAIL_MAX_ROWS);

        if (error) {
          throw error;
        }

        customerProductCache[cleanMaKh] = {
          rows: data || [],
          sortField: "so_luong",
          sortDirection: "desc"
        };

        renderCustomerProductRows(cleanMaKh);
      } catch (error) {
        console.error("Lỗi tải hàng hóa theo khách:", error);

        bodyEl.innerHTML = `
          <tr>
            <td colspan="3" class="customer-product-empty">
              Lỗi tải hàng hóa: ${escapeHtml(error.message || JSON.stringify(error))}
            </td>
          </tr>
        `;

        if (statusEl) {
          statusEl.textContent = "Lỗi tải dữ liệu.";
        }
      }
    }

    function filterCustomerProducts(maKh) {
      renderCustomerProductRows(maKh);
    }

    function sortCustomerProducts(maKh, field) {
      const cleanMaKh = String(maKh || "").trim();
      const cache = customerProductCache[cleanMaKh];

      if (!cache) {
        return;
      }

      if (cache.sortField === field) {
        cache.sortDirection = cache.sortDirection === "asc" ? "desc" : "asc";
      } else {
        cache.sortField = field;
        cache.sortDirection = field === "so_luong" ? "desc" : "asc";
      }

      renderCustomerProductRows(cleanMaKh);
    }

    function renderCustomerProductRows(maKh) {
      const cleanMaKh = String(maKh || "").trim();
      const detailId = getCustomerProductRowId(cleanMaKh);
      const bodyEl = document.getElementById(detailId + "_body");
      const searchEl = document.getElementById(detailId + "_search");
      const statusEl = document.getElementById(detailId + "_status");
      const footerEl = document.getElementById(detailId + "_footer");
      const cache = customerProductCache[cleanMaKh];

      if (!bodyEl || !cache) {
        return;
      }

      const keyword = normalizeProductText(searchEl ? searchEl.value : "");

      let rows = (cache.rows || []).filter(function (item) {
        if (!keyword) return true;

        const text = normalizeProductText(
          String(item.ma_hang || "") + " " + String(item.ten_hang || "")
        );

        return text.includes(keyword);
      });

      rows.sort(function (a, b) {
        let va = a[cache.sortField];
        let vb = b[cache.sortField];

        if (cache.sortField === "so_luong") {
          va = Number(va || 0);
          vb = Number(vb || 0);
        } else {
          va = normalizeProductText(va);
          vb = normalizeProductText(vb);
        }

        if (va < vb) return cache.sortDirection === "asc" ? -1 : 1;
        if (va > vb) return cache.sortDirection === "asc" ? 1 : -1;
        return 0;
      });

      updateCustomerProductSortIcons(cleanMaKh);

      if (!cache.rows.length) {
        bodyEl.innerHTML = `
          <tr>
            <td colspan="3" class="customer-product-empty">
              Khách này chưa có hàng hóa trong view ${escapeHtml(VIEW_HANG_HOA_THEO_KHACH)}.
            </td>
          </tr>
        `;

        if (statusEl) statusEl.textContent = "0 mặt hàng.";
        if (footerEl) footerEl.textContent = "";
        return;
      }

      if (!rows.length) {
        bodyEl.innerHTML = `
          <tr>
            <td colspan="3" class="customer-product-empty">
              Không có mặt hàng nào khớp từ khóa lọc.
            </td>
          </tr>
        `;

        if (statusEl) {
          statusEl.textContent = "0 / " + cache.rows.length + " mặt hàng.";
        }

        if (footerEl) {
          footerEl.textContent = "Tổng: " + cache.rows.length + " mặt hàng.";
        }

        return;
      }

      bodyEl.innerHTML = rows.map(function (item) {
        return `
          <tr>
            <td title="${escapeHtml(item.ma_hang || "")}">${escapeHtml(item.ma_hang || "")}</td>
            <td title="${escapeHtml(item.ten_hang || "")}">${escapeHtml(item.ten_hang || "")}</td>
            <td class="right" title="${escapeHtml(formatNumberSafe(item.so_luong))}">
              ${escapeHtml(formatNumberSafe(item.so_luong))}
            </td>
          </tr>
        `;
      }).join("");

      const suffix = keyword
        ? rows.length + " / " + cache.rows.length + " mặt hàng"
        : rows.length + " mặt hàng";

      if (statusEl) {
        statusEl.textContent = suffix + ".";
      }

      if (footerEl) {
        footerEl.textContent = "Đang lọc theo mã KH: " + cleanMaKh;
      }
    }

    function updateCustomerProductSortIcons(maKh) {
      const cleanMaKh = String(maKh || "").trim();
      const detailId = getCustomerProductRowId(cleanMaKh);
      const cache = customerProductCache[cleanMaKh];

      if (!cache) {
        return;
      }

      ["ma_hang", "ten_hang", "so_luong"].forEach(function (field) {
        const icon = document.getElementById(detailId + "_sort_" + field);

        if (!icon) {
          return;
        }

        icon.textContent = cache.sortField === field
          ? (cache.sortDirection === "asc" ? "▲" : "▼")
          : "";
      });
    }

    function normalizeProductText(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function formatDateOnlySafe(value) {
      if (!value) return "";

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";

      return date.toLocaleDateString("vi-VN", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    function formatNumberSafe(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toLocaleString("vi-VN") : "0";
    }


    function updateSortIcons() {
      document.querySelectorAll(".sortable").forEach(function (th) {
        const icon = th.querySelector(".sort-icon");
        const field = th.dataset.sort;

        if (!icon) {
          return;
        }

        if (field === sortField) {
          icon.textContent = sortDirection === "asc" ? "▲" : "▼";
        } else {
          icon.textContent = "";
        }
      });
    }

    function formatMoney(value) {
      const number = Number(value || 0);
      return number.toLocaleString("vi-VN");
    }

    function formatDateTime(value) {
      if (!value) return "";

      const date = new Date(value);
      if (isNaN(date.getTime())) return "";

      return date.toLocaleString("vi-VN", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function viewCustomer(maKh) {
      assignCustomerToChatwoot(maKh);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }

    function getHiddenColumnsFromStorage() {
      try {
        const parsed = JSON.parse(localStorage.getItem(COLUMN_VISIBILITY_STORAGE_KEY) || "[]");
        return Array.isArray(parsed) ? parsed.map(String) : [];
      } catch (error) {
        return [];
      }
    }

    function saveHiddenColumnsToStorage() {
      localStorage.setItem(COLUMN_VISIBILITY_STORAGE_KEY, JSON.stringify(hiddenColumns));
    }

    function isColumnHidden(columnKey) {
      return hiddenColumns.includes(columnKey);
    }

    function recalculateCustomerTableWidth() {
      const table = document.querySelector(".customer-table");

      if (!table) {
        return;
      }

      const colList = Array.from(table.querySelectorAll("col"));
      const totalWidth = colList.reduce(function (sum, col) {
        if (col.classList.contains("col-hidden")) {
          return sum;
        }

        const width = parseInt(col.style.width, 10);
        return sum + (!Number.isNaN(width) && width > 0 ? width : 100);
      }, 0);

      table.style.width = Math.max(totalWidth, 320) + "px";
      table.style.minWidth = Math.max(totalWidth, 320) + "px";
    }

    function applyColumnVisibility() {
      const table = document.querySelector(".customer-table");

      if (!table) {
        return;
      }

      CUSTOMER_TABLE_COLUMNS.forEach(function (column) {
        const shouldHide = isColumnHidden(column.key) && !column.required;
        const cells = table.querySelectorAll('[data-col="' + column.key + '"]');

        cells.forEach(function (cell) {
          cell.classList.toggle("col-hidden", shouldHide);
        });
      });

      recalculateCustomerTableWidth();
    }

    function buildColumnToggleMenu() {
      if (!columnToggleMenu) {
        return;
      }

      columnToggleMenu.innerHTML = CUSTOMER_TABLE_COLUMNS.map(function (column) {
        const checked = !isColumnHidden(column.key);
        const disabled = column.required ? "disabled" : "";
        const note = column.required ? " <span style=\"color:#9ca3af;font-size:11px;\">(cố định)</span>" : "";

        return `
          <label>
            <input
              type="checkbox"
              class="column-toggle-option"
              value="${escapeHtml(column.key)}"
              ${checked ? "checked" : ""}
              ${disabled}
            />
            <span>${escapeHtml(column.label)}${note}</span>
          </label>
        `;
      }).join("");

      columnToggleMenu.querySelectorAll(".column-toggle-option").forEach(function (input) {
        input.addEventListener("change", function () {
          const columnKey = String(input.value || "");
          const column = CUSTOMER_TABLE_COLUMNS.find(function (item) {
            return item.key === columnKey;
          });

          if (!column || column.required) {
            input.checked = true;
            return;
          }

          if (input.checked) {
            hiddenColumns = hiddenColumns.filter(function (item) {
              return item !== columnKey;
            });
          } else if (!hiddenColumns.includes(columnKey)) {
            hiddenColumns.push(columnKey);
          }

          saveHiddenColumnsToStorage();
          applyColumnVisibility();
        });
      });
    }

    function initColumnVisibility() {
      hiddenColumns = getHiddenColumnsFromStorage().filter(function (columnKey) {
        const column = CUSTOMER_TABLE_COLUMNS.find(function (item) {
          return item.key === columnKey;
        });

        return column && !column.required;
      });

      buildColumnToggleMenu();
      applyColumnVisibility();
    }

    function enableColumnResize() {
      const table = document.querySelector(".customer-table");

      if (!table) {
        return;
      }

      const storageKey = "chatwoot_crm_customer_table_widths";
      const colList = Array.from(table.querySelectorAll("col"));
      const thList = Array.from(table.querySelectorAll("th.resizable"));
      const defaultWidths = [130, 240, 150, 130, 160, 160, 130, 190];

      function getColWidth(index) {
        const col = colList[index];

        if (!col) {
          return defaultWidths[index] || 100;
        }

        const styleWidth = parseInt(col.style.width, 10);

        if (!Number.isNaN(styleWidth) && styleWidth > 0) {
          return styleWidth;
        }

        return defaultWidths[index] || 100;
      }

      function setColWidth(index, width) {
        const col = colList[index];

        if (!col) {
          return;
        }

        const safeWidth = Math.max(70, Math.round(width));
        col.style.width = safeWidth + "px";
      }

      function applyTableWidth() {
        recalculateCustomerTableWidth();
      }

      try {
        const savedWidths = JSON.parse(localStorage.getItem(storageKey) || "{}");

        colList.forEach(function (col, index) {
          const width = Number(savedWidths[index]);

          if (width && width >= 70) {
            setColWidth(index, width);
          } else {
            setColWidth(index, defaultWidths[index] || 100);
          }
        });
      } catch (error) {
        colList.forEach(function (col, index) {
          setColWidth(index, defaultWidths[index] || 100);
        });
      }

      applyTableWidth();

      thList.forEach(function (th) {
        const resizer = th.querySelector(".col-resizer");

        if (!resizer) {
          return;
        }

        const colIndex = Number(th.dataset.colIndex || 0);

        let startX = 0;
        let startWidth = 0;

        resizer.addEventListener("click", function (event) {
          event.preventDefault();
          event.stopPropagation();
        });

        resizer.addEventListener("mousedown", function (event) {
          startResize(event.pageX, event);
        });

        resizer.addEventListener("touchstart", function (event) {
          if (!event.touches || !event.touches[0]) {
            return;
          }

          startResize(event.touches[0].pageX, event);
        }, { passive: false });

        function startResize(pageX, event) {
          event.preventDefault();
          event.stopPropagation();

          startX = pageX;
          startWidth = getColWidth(colIndex);

          resizer.classList.add("active");
          document.body.classList.add("resizing-column");

          document.addEventListener("mousemove", resizeWithMouse);
          document.addEventListener("mouseup", stopResize);

          document.addEventListener("touchmove", resizeWithTouch, { passive: false });
          document.addEventListener("touchend", stopResize);
        }

        function resizeWithMouse(event) {
          resizeColumn(event.pageX);
        }

        function resizeWithTouch(event) {
          if (!event.touches || !event.touches[0]) {
            return;
          }

          event.preventDefault();
          resizeColumn(event.touches[0].pageX);
        }

        function resizeColumn(pageX) {
          const newWidth = startWidth + (pageX - startX);

          if (newWidth < 70) {
            return;
          }

          setColWidth(colIndex, newWidth);
          applyTableWidth();
        }

        function stopResize() {
          resizer.classList.remove("active");
          document.body.classList.remove("resizing-column");

          document.removeEventListener("mousemove", resizeWithMouse);
          document.removeEventListener("mouseup", stopResize);

          document.removeEventListener("touchmove", resizeWithTouch);
          document.removeEventListener("touchend", stopResize);

          saveColumnWidths();
        }
      });

      function saveColumnWidths() {
        const widths = {};

        colList.forEach(function (col, index) {
          widths[index] = getColWidth(index);
        });

        localStorage.setItem(storageKey, JSON.stringify(widths));
      }
    }
  </script>
