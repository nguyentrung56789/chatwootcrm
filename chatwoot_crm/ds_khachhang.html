    function getStaffByIdNv(idNv) {
      const code = normalizeKiotStaffId(idNv).toLowerCase();

      return staffRows.find(function (staff) {
        return normalizeKiotStaffId(staff.id_nv).toLowerCase() === code;
      }) || null;
    }

    function getStaffNameByIdNv(idNv) {
      const found = getStaffByIdNv(idNv);
      return found ? found.ten_nv : idNv;
    }

    function getStaffNameByCode(maNv) {
      const code = String(maNv || "").trim().toLowerCase();

      const found = staffRows.find(function (staff) {
        return String(staff.ma_nv || "").trim().toLowerCase() === code;
      });

      return found ? found.ten_nv : maNv;
    }

    function parseStaffIdList(value) {
      if (Array.isArray(value)) {
        return Array.from(new Set(value.map(function (item) {
          return normalizeKiotStaffId(item);
        }).filter(Boolean)));
      }

      const raw = String(value || "").trim();
      if (!raw) {
        return [];
      }

      if (raw.startsWith("[") && raw.endsWith("]")) {
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            return parseStaffIdList(parsed);
          }
        } catch (error) {
          console.warn("Không parse được mảng ma_nv:", error);
        }
      }

      return Array.from(new Set(raw.split(/[;,]/).map(function (item) {
        return normalizeKiotStaffId(item);
      }).filter(Boolean)));
    }

    function getCustomerStaffIds(maKh) {
      const key = String(maKh || "").trim();
      const list = customerStaffMap[key] || [];

      const idsFromMap = list
        .map(function (item) {
          return normalizeKiotStaffId(item.id_nv);
        })
        .filter(function (idNv) {
          return idNv !== "";
        });

      if (idsFromMap.length > 0) {
        return idsFromMap;
      }

      const customer = getCustomerByMaKh(key);
      if (customer) {
        const idsFromNhanVienIds = parseStaffIdList(customer.nhan_vien_ids);
        if (idsFromNhanVienIds.length > 0) {
          return idsFromNhanVienIds;
        }

        // Trường hợp tạm thời n8n đang ghi mảng ID vào kv_khachhang.ma_nv dạng chuỗi JSON.
        const idsFromMaNv = parseStaffIdList(customer.ma_nv);
        if (idsFromMaNv.length > 0) {
          return idsFromMaNv;
        }
      }

      return [];
    }

    function getCustomerStaffRows(maKh) {
      const ids = getCustomerStaffIds(maKh);

      return ids.map(function (idNv) {
        const staff = getStaffByIdNv(idNv);

        return {
          id_nv: idNv,
          ma_nv: staff ? staff.ma_nv : "",
          ten_nv: staff ? staff.ten_nv : idNv
        };
      });
    }

    function readStaffAssignmentCache() {
      try {
        const raw = localStorage.getItem(STAFF_ASSIGNMENT_CACHE_KEY);
        const obj = raw ? JSON.parse(raw) : {};
        return obj && typeof obj === "object" ? obj : {};
      } catch (error) {
        return {};
      }
    }

    function writeStaffAssignmentCache(maKh, idNvList) {
      const maKhText = String(maKh || "").trim();
      if (!maKhText) {
        return;
      }

      const cache = readStaffAssignmentCache();
      const ids = Array.from(new Set((idNvList || [])
        .map(function (idNv) { return normalizeKiotStaffId(idNv); })
        .filter(Boolean)));

      cache[maKhText] = {
        ids: ids,
        updated_at: new Date().toISOString()
      };

      try {
        localStorage.setItem(STAFF_ASSIGNMENT_CACHE_KEY, JSON.stringify(cache));
      } catch (error) {
        console.warn("Không ghi được cache nhân viên phụ trách:", error);
      }
    }

    function applyStaffAssignmentCache(maKhList) {
      const cache = readStaffAssignmentCache();
      const allowed = new Set((maKhList || []).map(function (maKh) {
        return String(maKh || "").trim();
      }).filter(Boolean));

      Object.keys(cache).forEach(function (maKh) {
        if (allowed.size > 0 && !allowed.has(maKh)) {
          return;
        }

        const ids = Array.from(new Set(((cache[maKh] && cache[maKh].ids) || [])
          .map(function (idNv) { return normalizeKiotStaffId(idNv); })
          .filter(Boolean)));

        customerStaffMap[maKh] = ids.map(function (idNv) {
          return { id_nv: idNv, hoat_dong: true };
        });
      });
    }

    async function loadCustomerStaffAssignments(maKhList) {
      customerStaffMap = {};

      if (!Array.isArray(maKhList) || maKhList.length === 0) {
        return;
      }

      const uniqueMaKhList = Array.from(new Set(maKhList.filter(Boolean).map(String)));

      if (uniqueMaKhList.length === 0) {
        return;
      }

      // Giữ lựa chọn vừa bấm trên giao diện trước, tránh bị render lại làm mất chip
      // trong lúc Supabase/webhook còn đang xử lý.
      applyStaffAssignmentCache(uniqueMaKhList);

      if (!supabaseClient) {
        customers.forEach(function (customer) {
          customer.nhan_vien_ids = getCustomerStaffIds(customer.ma_kh);
        });
        return;
      }

      const { data, error } = await supabaseClient
        .from(TABLE_KHACH_HANG_NHANVIEN)
        .select("ma_kh, id_nv, hoat_dong")
        .in("ma_kh", uniqueMaKhList)
        .eq("hoat_dong", true);

      if (error) {
        console.warn("Không tải được bảng nhân viên phụ trách:", error);
        return;
      }

      (data || []).forEach(function (row) {
        const maKh = String(row.ma_kh || "").trim();
        const idNv = normalizeKiotStaffId(row.id_nv);

        if (!maKh || !idNv) {
          return;
        }

        if (!customerStaffMap[maKh]) {
          customerStaffMap[maKh] = [];
        }

        if (!customerStaffMap[maKh].some(function (item) { return normalizeKiotStaffId(item.id_nv) === idNv; })) {
          customerStaffMap[maKh].push({
            id_nv: idNv,
            hoat_dong: row.hoat_dong !== false
          });
        }
      });

      // Cache cục bộ là trạng thái người dùng vừa bấm. Nếu load/re-render xảy ra ngay
      // sau thao tác chọn, cache sẽ giữ chip lại thay vì bị trả về rỗng.
      applyStaffAssignmentCache(uniqueMaKhList);

      customers.forEach(function (customer) {
        customer.nhan_vien_ids = getCustomerStaffIds(customer.ma_kh);
      });
    }

    function renderStaffChipContent(maKh) {
      const rows = getCustomerStaffRows(maKh);

      if (rows.length === 0) {
        return `<span class="staff-chip-placeholder">+ Chọn nhân viên</span>`;
      }

      return rows.map(function (staff) {
        return `
          <span class="staff-chip" title="${escapeHtml(staff.ten_nv || staff.id_nv)}">
            <span class="staff-chip-name">${escapeHtml(staff.ten_nv || staff.id_nv)}</span>
            <button
              type="button"
              class="staff-chip-remove"
              title="Bỏ nhân viên"
              onclick="removeCustomerStaff('${escapeJs(maKh)}', '${escapeJs(staff.id_nv)}', event)"
            >×</button>
          </span>
        `;
      }).join("");
    }

    function updateCustomerStaffEditorUI(maKh) {
      const maKhText = String(maKh || "").trim();
      document.querySelectorAll(`.staff-chip-editor[data-ma-kh="${cssEscapeValue(maKhText)}"]`).forEach(function (editor) {
        editor.innerHTML = renderStaffChipContent(maKhText);
      });
    }

    function cssEscapeValue(value) {
      if (window.CSS && typeof window.CSS.escape === "function") {
        return window.CSS.escape(String(value || ""));
      }

      return String(value || "").replaceAll("\\", "\\\\").replaceAll('"', '\"');
    }

    function renderStaffChips(maKh) {
      const content = renderStaffChipContent(maKh);

      return `
        <div
          class="staff-chip-editor"
          data-ma-kh="${escapeHtml(maKh || "")}"          
          onclick="openCustomerStaffPicker('${escapeJs(maKh)}', this, event)"
        >
          ${content}
        </div>
      `;
    }

    function closeCustomerStaffPicker() {
      const oldPicker = document.getElementById("staffChipPicker");
      if (oldPicker) {
        oldPicker.remove();
      }

      document.querySelectorAll(".staff-chip-editor.active").forEach(function (el) {
        el.classList.remove("active");
      });

      activeStaffPicker = null;
    }

    function openCustomerStaffPicker(maKh, anchorEl, event) {
      if (event) {
        event.stopPropagation();
      }

      const currentIds = new Set(getCustomerStaffIds(maKh).map(function (idNv) {
        return normalizeKiotStaffId(idNv);
      }));

      const availableStaff = staffRows.filter(function (staff) {
        const idNv = normalizeKiotStaffId(staff.id_nv);
        return idNv && !currentIds.has(idNv);
      });

      closeCustomerStaffPicker();
      anchorEl.classList.add("active");

      const picker = document.createElement("div");
      picker.id = "staffChipPicker";
      picker.className = "staff-chip-picker";

      picker.innerHTML = `
        <div class="staff-chip-picker-title">Thêm người phụ trách</div>
        ${availableStaff.length === 0
          ? `<div class="staff-chip-empty-option">Đã chọn hết nhân viên.</div>`
          : availableStaff.map(function (staff) {
              const idNv = normalizeKiotStaffId(staff.id_nv);
              return `
                <button
                  type="button"
                  class="staff-chip-option"
                  data-id-nv="${escapeHtml(idNv)}"
                >
                  <span class="staff-chip-option-name">${escapeHtml(staff.ten_nv || idNv)}</span>
                  <span>＋</span>
                </button>
              `;
            }).join("")
        }
      `;

      document.body.appendChild(picker);

      const rect = anchorEl.getBoundingClientRect();
      const left = Math.min(rect.left, window.innerWidth - 312);
      const top = Math.min(rect.bottom + 6, window.innerHeight - 330);
      picker.style.left = Math.max(8, left) + "px";
      picker.style.top = Math.max(8, top) + "px";

      picker.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      picker.querySelectorAll(".staff-chip-option").forEach(function (btn) {
        btn.addEventListener("mousedown", function (e) {
          e.preventDefault();
          e.stopPropagation();
        });

        btn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();

          const idNv = normalizeKiotStaffId(btn.dataset.idNv);
          if (!idNv) {
            return;
          }

          const selectedIds = getCustomerStaffIds(maKh)
            .map(function (currentIdNv) {
              return normalizeKiotStaffId(currentIdNv);
            })
            .filter(Boolean);

          if (!selectedIds.includes(idNv)) {
            selectedIds.push(idNv);
          }

          // Đúng kiểu Kiot: bấm 1 nhân viên là đóng menu ngay,
          // chip hiện ngay trong ô; muốn thêm người nữa thì bấm lại ô nhân viên.
          closeCustomerStaffPicker();

          saveCustomerStaffAssignment(maKh, selectedIds).catch(function (error) {
            console.error("Lỗi lưu người phụ trách:", error);
            showNotice("Lỗi lưu người phụ trách: " + (error.message || JSON.stringify(error)), "error", 4500);
          });
        });
      });

      activeStaffPicker = {
        ma_kh: maKh,
        anchorEl: anchorEl,
        pickerEl: picker
      };
    }

    async function removeCustomerStaff(maKh, idNv, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      const selectedIds = getCustomerStaffIds(maKh).filter(function (currentIdNv) {
        return normalizeKiotStaffId(currentIdNv) !== normalizeKiotStaffId(idNv);
      });

      await saveCustomerStaffAssignment(maKh, selectedIds);
    }

    async function saveCustomerStaffAssignment(maKh, selectedIdNvList) {
      const maKhText = String(maKh || "").trim();
      const idNvList = Array.from(new Set((selectedIdNvList || [])
        .map(function (idNv) { return normalizeKiotStaffId(idNv); })
        .filter(Boolean)));

      if (!maKhText) {
        return;
      }

      const oldList = getCustomerStaffIds(maKhText).map(function (idNv) {
        return normalizeKiotStaffId(idNv);
      }).filter(Boolean);

      const oldSet = new Set(oldList);
      const newSet = new Set(idNvList);

      const idsToAdd = idNvList.filter(function (idNv) {
        return !oldSet.has(idNv);
      });

      const idsToDisable = oldList.filter(function (idNv) {
        return !newSet.has(idNv);
      });

      const found = getCustomerByMaKh(maKhText);

      // TẠM THỜI: chỉ cập nhật giao diện + cache, không lưu kv_khachhang_nhanvien.
      // Mục tiêu hiện tại là bấm chọn nhân viên thì gửi webhook ngay cho n8n.
      customerStaffMap[maKhText] = idNvList.map(function (idNv) {
        return { id_nv: idNv, hoat_dong: true };
      });

      if (found) {
        found.nhan_vien_ids = idNvList;
      }

      updateCustomerStaffEditorUI(maKhText);
      writeStaffAssignmentCache(maKhText, idNvList);

      // Tạm thời chỉ gửi webhook, bỏ toàn bộ thao tác insert/update/delete Supabase.
      try {
        await sendCustomerWebhook(
          "upsert_khachhang_nhanvien",
          maKhText,
          null,
          {
            table: TABLE_KHACH_HANG_NHANVIEN,
            source: "staff_chip_editor",
            mode: "webhook_only",
            skip_supabase: true,

            // Theo yêu cầu tạm thời: trả mảng ID nhân viên KiotViet trong field ma_nv
            // Ví dụ: ma_nv: ["1234546", "345678", "223456"]
            ma_nv: idNvList,

            // Giữ thêm field rõ nghĩa để n8n nào đang bắt id_nv_list vẫn không bị đứt.
            id_nv_list: idNvList,
            id_nv_added: idsToAdd,
            id_nv_removed: idsToDisable
          },
          { requireConversation: false, webhookUrl: UPDATE_CHATWOOT_WEBHOOK_URL }
        );

        console.log("ĐÃ GỬI WEBHOOK NHÂN VIÊN:", {
          ma_kh: maKhText,
          ma_nv: idNvList,
          id_nv_list: idNvList,
          id_nv_added: idsToAdd,
          id_nv_removed: idsToDisable
        });

        showNotice("Đã gửi webhook người phụ trách cho " + maKhText);
      } catch (webhookError) {
        console.warn("Webhook người phụ trách lỗi:", webhookError);
        showNotice("Webhook người phụ trách lỗi: " + (webhookError.message || JSON.stringify(webhookError)), "error", 5000);
      }
    }

      if (count <= 0) {
        floatingSaveBar.classList.add("hidden");
        saveMessage.textContent = "";
        return;

    function setCustomerLoading(isLoading) {
      isLoadingCustomers = isLoading;

      if (isLoading) {
        customerBody.classList.add("loading");
        searchBtn.classList.add("loading");

        firstPageBtn.disabled = true;
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        lastPageBtn.disabled = true;
        pageSizeSelect.disabled = true;
        pageInput.disabled = true;

        if (!customers || customers.length === 0) {
          customerBody.innerHTML = `
            <tr>
              <td colspan="6">Đang tải danh sách khách hàng...</td>
            </tr>
          `;
        }
      } else {

    async function refreshCustomersSmooth() {
      if (isLoadingCustomers) {
        return;
      }

      if (!supabaseClient) {
        showNotice("Supabase chưa sẵn sàng.", "error", 2500);
        return;
      }

      if (refreshBtn) {
        refreshBtn.disabled = true;
        refreshBtn.classList.add("loading");
        refreshBtn.textContent = "Đang làm mới...";
      }

      try {
        await loadCustomersFromSupabase(currentPage);
        showNotice("Đã làm mới dữ liệu.");
      } catch (error) {
        console.error("Lỗi làm mới:", error);
        showNotice("Lỗi làm mới: " + (error.message || JSON.stringify(error)), "error", 3500);
      } finally {
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove("loading");
          refreshBtn.textContent = "↻ Làm mới";
        }
      }
    }

    async function loadCustomersFromSupabase(page = 1) {
      if (isLoadingCustomers) {
        return;
      }

      if (!supabaseClient) {
        customerBody.innerHTML = `
          <tr>
            <td colspan="6">Supabase chưa sẵn sàng.</td>
          </tr>
        `;
        return;
      }

      currentPage = page;

      const from = (currentPage - 1) * pageSize;
      const to = from + pageSize - 1;
      const keyword = searchInput.value.trim();

      setCustomerLoading(true);

      let query = supabaseClient
        .from(TABLE_KHACH_HANG)
        .select("ma_kh, ten_kh, dien_thoai, congno, ma_nv, conversation_id, chatwoot_contact_id", { count: "exact" })
        .order("ma_kh", { ascending: true })
        .range(from, to);

      if (keyword) {
        const safeKeyword = keyword.replaceAll("%", "\\%").replaceAll(",", " ");
        query = query.or(
          `ma_kh.ilike.%${safeKeyword}%,ten_kh.ilike.%${safeKeyword}%,dien_thoai.ilike.%${safeKeyword}%`
        );
      }

      const { data, error, count } = await query;

      if (error) {
        if (String(error.message || "").includes("ma_nv")) {
          setCustomerLoading(false);
          return loadCustomersWithoutStaff(page);
        }

        customerBody.innerHTML = `
          <tr>
            <td colspan="6">
              Lỗi tải dữ liệu: ${escapeHtml(error.message || JSON.stringify(error))}
            </td>
          </tr>
        `;

        setCustomerLoading(false);
        return;
      }

      totalRows = count || 0;

      customers = (data || []).map(function (item) {
        return {
          ma_kh: item.ma_kh || "",
          ten_kh: item.ten_kh || "",
          sdt: item.dien_thoai || "",
          cong_no: item.congno || 0,
          ma_nv: normalizeNullableMaNv(item.ma_nv),
          conversation_id: item.conversation_id || null,
          chatwoot_contact_id: item.chatwoot_contact_id || null
        };
      });

      await loadCustomerStaffAssignments(customers.map(function (item) { return item.ma_kh; }));
      renderCustomers();
      setCustomerLoading(false);
    }

        return;
      }

      currentPage = page;

      const from = (currentPage - 1) * pageSize;
      const to = from + pageSize - 1;

      setCustomerLoading(true);

      let query = supabaseClient
        .from(TABLE_KHACH_HANG)
        .select("ma_kh, ten_kh, dien_thoai, congno, conversation_id, chatwoot_contact_id", { count: "exact" })
        .order("ma_kh", { ascending: true })
        .range(from, to);

      if (keyword) {
        const safeKeyword = keyword.replaceAll("%", "\\%").replaceAll(",", " ");
        query = query.or(
          `ma_kh.ilike.%${safeKeyword}%,ten_kh.ilike.%${safeKeyword}%,dien_thoai.ilike.%${safeKeyword}%`
        );
      }

      const { data, error, count } = await query;

      if (error) {
        customerBody.innerHTML = `
          <tr>
            <td colspan="6">
              Lỗi tải dữ liệu: ${escapeHtml(error.message || JSON.stringify(error))}
            </td>
          </tr>
        `;

        setCustomerLoading(false);
        return;
      }

      totalRows = count || 0;

      customers = (data || []).map(function (item) {
        return {
          ma_kh: item.ma_kh || "",
          ten_kh: item.ten_kh || "",
          sdt: item.dien_thoai || "",
          cong_no: item.congno || 0,
          ma_nv: "",
          conversation_id: item.conversation_id || null,
          chatwoot_contact_id: item.chatwoot_contact_id || null
        };
      });

      await loadCustomerStaffAssignments(customers.map(function (item) { return item.ma_kh; }));
      renderCustomers();
      setCustomerLoading(false);
    }

    async function saveStaffChanges() {
      const changes = Object.values(pendingStaffChanges);

      if (changes.length === 0) {
        return;
      }

      if (!supabaseClient) {
        saveMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      saveStaffBtn.disabled = true;
      saveStaffBtn.textContent = "Đang lưu...";
      saveMessage.textContent = "Đang cập nhật mã nhân viên...";

      try {
        for (const change of changes) {
          const { error } = await supabaseClient
            .from(TABLE_KHACH_HANG)
            .update({
              ma_nv: change.new_ma_nv || null
            })
            .eq("ma_kh", change.ma_kh);

          if (error) {
            throw error;
          }
        }

        pendingStaffChanges = {};
        saveMessage.textContent = "Đã lưu xong.";

        await loadCustomersFromSupabase(currentPage);

        setTimeout(function () {
          floatingSaveBar.classList.add("hidden");
          saveMessage.textContent = "";
        }, 800);
      } catch (error) {
        console.error("Lỗi lưu mã nhân viên:", error);
        saveMessage.textContent = "Lỗi lưu: " + (error.message || JSON.stringify(error));
      } finally {
        saveStaffBtn.disabled = false;
        saveStaffBtn.textContent = "Lưu";
      }
    }

    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));

      const fromRow = totalRows === 0 ? 0 : ((currentPage - 1) * pageSize) + 1;
      const toRow = Math.min(currentPage * pageSize, totalRows);

      pageInput.value = currentPage;
      pageInput.max = totalPages;

      pageInfo.textContent = `${fromRow} - ${toRow} trong ${totalRows} khách hàng`;

      firstPageBtn.disabled = currentPage <= 1;
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
      lastPageBtn.disabled = currentPage >= totalPages;
    }

    function getLoginUser() {
      const raw = localStorage.getItem(LOGIN_STORAGE_KEY);

      if (!raw) {
        return null;
      }

      try {
        return JSON.parse(raw);
      } catch (error) {
        localStorage.removeItem(LOGIN_STORAGE_KEY);
        return null;
      }
    }

    async function loginFromPopup() {
      const maNv = popupMaNvInput.value.trim();
      const matKhau = popupMatKhauInput.value.trim();

      popupLoginMessage.textContent = "";

      if (!maNv || !matKhau) {
        popupLoginMessage.textContent = "Vui lòng nhập mã nhân viên và mật khẩu.";
        return;
      }

      if (!supabaseClient) {
        popupLoginMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      popupLoginBtn.disabled = true;
      popupLoginBtn.textContent = "Đang đăng nhập...";

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, mat_khau, ten_nv, dien_thoai, hoat_dong, admin")
        .or(`ma_nv.eq.${maNv},dien_thoai.eq.${maNv}`)
        .eq("mat_khau", matKhau)
        .maybeSingle();

      popupLoginBtn.disabled = false;
      popupLoginBtn.textContent = "Đăng nhập";

      if (error) {
        console.error("Lỗi đăng nhập:", error);
        popupLoginMessage.textContent = "Lỗi kiểm tra đăng nhập.";
        return;
      }

      if (!data) {
        popupLoginMessage.textContent = "Sai mã nhân viên hoặc mật khẩu.";
        return;
      }

      if (data.hoat_dong === false) {
        popupLoginMessage.textContent = "Tài khoản đã bị khóa.";
        return;
      }

      currentUser = {
        ma_nv: data.ma_nv,
        ten_nv: data.ten_nv,
        admin: data.admin === true,
        login_at: new Date().toISOString()
      };

      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(currentUser));

      popupMaNvInput.value = "";
      popupMatKhauInput.value = "";
      popupLoginMessage.textContent = "";

      closeLoginPopup();
      showUserInfo();
      await loadStaffFromSupabase();
      await loadCustomersFromSupabase(1);
    }

    pageInput.addEventListener("keydown", function (event) {
      if (event.key !== "Enter") {
        return;
      }

      const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
      let page = Number(pageInput.value || 1);

      if (page < 1) page = 1;
      if (page > totalPages) page = totalPages;

      loadCustomersFromSupabase(page);
    });

    pageSizeSelect.addEventListener("change", function () {
      pageSize = Number(pageSizeSelect.value || 100);
      loadCustomersFromSupabase(1);
    });

    staffDropdownBtn.addEventListener("click", function () {
      staffDropdownMenu.classList.toggle("hidden");
    });

    document.addEventListener("pointerdown", function (event) {
      const target = event.target;

      const clickedInsideStaffFilter =
        staffDropdownBtn.contains(target) ||
        staffDropdownMenu.contains(target);

      if (!clickedInsideStaffFilter) {
        staffDropdownMenu.classList.add("hidden");
      }

      const picker = document.getElementById("staffChipPicker");
      const clickedInsideStaffChipPicker =
        (picker && picker.contains(target)) ||
        (target.closest && target.closest(".staff-chip-editor"));

      if (!clickedInsideStaffChipPicker) {
        closeCustomerStaffPicker();
      }

      const isAssignStaffDropdownOpen =
        zaloChatPopover &&
        !zaloChatPopover.classList.contains("hidden") &&
        zaloChatPopover.classList.contains("assign-staff-dropdown");

      const clickedInsideAssignStaffDropdown =
        target.closest && target.closest(".assign-staff-dropdown");

      const clickedAssignButton =
        target.closest && target.closest(".assign-btn");

      if (
        isAssignStaffDropdownOpen &&
        !clickedInsideAssignStaffDropdown &&
        !clickedAssignButton
      ) {
        closeZaloChat();
      }
    }, true);

    document.querySelectorAll(".sortable").forEach(function (th) {
      th.addEventListener("click", function () {
        const field = th.dataset.sort;

        if (sortField === field) {
          sortDirection = sortDirection === "asc" ? "desc" : "asc";
        } else {
          sortField = field;
          sortDirection = "asc";
        }

        updateSortIcons();
        renderCustomers();
      });
    });

    function handleStaffChange(changedOption) {
      const staffOptions = getStaffOptions();
      const allOption = document.querySelector('.staff-option[value="all"]');

      const normalOptions = Array.from(staffOptions).filter(function (option) {
        return option.value !== "all";
      });

      if (changedOption.value === "all" && changedOption.checked) {
        normalOptions.forEach(function (option) {
          option.checked = false;
        });
        return;
      }

      if (changedOption.value !== "all" && changedOption.checked) {
        allOption.checked = false;
      }

      const hasAnyNormalChecked = normalOptions.some(function (option) {
        return option.checked;
      });

      if (!hasAnyNormalChecked) {
        allOption.checked = true;
      }
    }

    function getSelectedStaffList() {
      const selected = Array.from(getStaffOptions())
        .filter(function (option) {
          return option.checked;
        })
        .map(function (option) {
          return option.value.toLowerCase();
        });

      if (selected.length === 0 || selected.includes("all")) {
        return [];
      }

      return selected;
    }

    function updateStaffButtonText() {
      const selectedOptions = Array.from(getStaffOptions())
        .filter(function (option) {
          return option.checked;
        });

      const selectedValues = selectedOptions.map(function (option) {
        return option.value;
      });

      if (selectedValues.length === 0 || selectedValues.includes("all")) {
        staffDropdownBtn.textContent = "Tất cả nhân viên";
        return;
      }

      const selectedNames = selectedOptions.map(function (option) {
        return option.dataset.name || getStaffNameByCode(option.value);
      });

      staffDropdownBtn.textContent = selectedNames.join(", ");
    }

    function renderCustomers() {
      if (!currentUser) {
        return;
      }

      const staffList = getSelectedStaffList();
      let list = customers;

      const filtered = list.filter(function (item) {
        const assignedIds = (item.nhan_vien_ids && item.nhan_vien_ids.length > 0)
          ? item.nhan_vien_ids.map(function (idNv) { return normalizeKiotStaffId(idNv).toLowerCase(); })
          : getCustomerStaffIds(item.ma_kh).map(function (idNv) { return normalizeKiotStaffId(idNv).toLowerCase(); });

        const matchStaff =
          staffList.length === 0 ||
          staffList.some(function (staffIdNv) {
            return assignedIds.includes(normalizeKiotStaffId(staffIdNv).toLowerCase());
          });

        return matchStaff;
      });

      if (sortField) {
        filtered.sort(function (a, b) {
          let valueA = a[sortField];
          let valueB = b[sortField];

          if (sortField === "cong_no") {
            valueA = Number(valueA || 0);
            valueB = Number(valueB || 0);
          } else {
            valueA = String(valueA || "").toLowerCase();
            valueB = String(valueB || "").toLowerCase();
          }

          if (valueA < valueB) {
            return sortDirection === "asc" ? -1 : 1;
          }

          if (valueA > valueB) {
            return sortDirection === "asc" ? 1 : -1;
          }

          return 0;
        });
      }

      if (filtered.length === 0) {
        customerBody.innerHTML = `
          <tr>
            <td colspan="6">Không có dữ liệu.</td>
          </tr>
        `;
        return;
      }

      customerBody.innerHTML = filtered.map(function (item) {
        const rowStaffList = getCustomerStaffRows(item.ma_kh || "");
        const staffTitle = rowStaffList
          .map(function (staff) { return staff.ten_nv || staff.id_nv; })
          .join(", ");
        const assignBtnClass = rowStaffList.length > 1 ? "assign-btn has-staff-dropdown" : "assign-btn";

        return `
          <tr>
            <td title="${escapeHtml(item.ma_kh || "")}">${escapeHtml(item.ma_kh || "")}</td>
            <td title="${escapeHtml(item.ten_kh || "")}">${escapeHtml(item.ten_kh || "")}</td>
            <td title="${escapeHtml(item.sdt || "")}">${escapeHtml(item.sdt || "")}</td>
            <td title="${formatMoney(item.cong_no)}">${formatMoney(item.cong_no)}</td>
            <td title="${escapeHtml(staffTitle)}">
              ${renderStaffChips(item.ma_kh || "")}
            </td>
            <td>
              <div class="row-actions">
                <button class="${assignBtnClass}" onclick="assignCustomerToChatwoot('${escapeJs(item.ma_kh || "")}', this)">
                  Gán KH
                </button>
                ${item.conversation_id ? `
                  <button
                    class="zalo-chat-btn"
                    title="Zalo chat"
                    onclick="openZaloChat('${escapeJs(item.ma_kh || "")}', this)"
                  >
                    Zalo chat
                  </button>
                ` : ""}
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function updateSortIcons() {
      document.querySelectorAll(".sortable").forEach(function (th) {
        const icon = th.querySelector(".sort-icon");
        const field = th.dataset.sort;

        if (!icon) {
          return;
        }

        if (field === sortField) {
          icon.textContent = sortDirection === "asc" ? "▲" : "▼";
        } else {
          icon.textContent = "";
        }
      });
    }

    function formatMoney(value) {
      const number = Number(value || 0);
      return number.toLocaleString("vi-VN");
    }

    function viewCustomer(maKh) {
      assignCustomerToChatwoot(maKh);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }

    function enableColumnResize() {
      const table = document.querySelector(".customer-table");

      if (!table) {
        return;
      }

      const storageKey = "chatwoot_crm_customer_table_widths";
      const colList = Array.from(table.querySelectorAll("col"));
      const thList = Array.from(table.querySelectorAll("th.resizable"));
      const defaultWidths = [130, 240, 150, 130, 160, 190];

      function getColWidth(index) {
        const col = colList[index];

        if (!col) {
          return defaultWidths[index] || 100;
        }

        const styleWidth = parseInt(col.style.width, 10);

        if (!Number.isNaN(styleWidth) && styleWidth > 0) {
          return styleWidth;
        }

        return defaultWidths[index] || 100;
      }

      function setColWidth(index, width) {
        const col = colList[index];

        if (!col) {
          return;
        }

        const safeWidth = Math.max(70, Math.round(width));
        col.style.width = safeWidth + "px";
      }

      function applyTableWidth() {
        const totalWidth = colList.reduce(function (sum, col, index) {
          return sum + getColWidth(index);
        }, 0);

        table.style.width = totalWidth + "px";
        table.style.minWidth = totalWidth + "px";
      }

      try {
        const savedWidths = JSON.parse(localStorage.getItem(storageKey) || "{}");

        colList.forEach(function (col, index) {
          const width = Number(savedWidths[index]);

          if (width && width >= 70) {
            setColWidth(index, width);
          } else {
            setColWidth(index, defaultWidths[index] || 100);
          }
        });
      } catch (error) {
        colList.forEach(function (col, index) {
          setColWidth(index, defaultWidths[index] || 100);
        });
      }

      applyTableWidth();

      thList.forEach(function (th) {
        const resizer = th.querySelector(".col-resizer");

        if (!resizer) {
          return;
        }

        const colIndex = Number(th.dataset.colIndex || 0);

        let startX = 0;
        let startWidth = 0;

        resizer.addEventListener("click", function (event) {
          event.preventDefault();
          event.stopPropagation();
        });

        resizer.addEventListener("mousedown", function (event) {
          startResize(event.pageX, event);
        });

        resizer.addEventListener("touchstart", function (event) {
          if (!event.touches || !event.touches[0]) {
            return;
          }

          startResize(event.touches[0].pageX, event);
        }, { passive: false });

        function startResize(pageX, event) {
          event.preventDefault();
          event.stopPropagation();

          startX = pageX;
          startWidth = getColWidth(colIndex);

          resizer.classList.add("active");
          document.body.classList.add("resizing-column");

          document.addEventListener("mousemove", resizeWithMouse);
          document.addEventListener("mouseup", stopResize);

          document.addEventListener("touchmove", resizeWithTouch, { passive: false });
          document.addEventListener("touchend", stopResize);
        }

        function resizeWithMouse(event) {
          resizeColumn(event.pageX);
        }

        function resizeWithTouch(event) {
          if (!event.touches || !event.touches[0]) {
            return;
          }

          event.preventDefault();
          resizeColumn(event.touches[0].pageX);
        }

        function resizeColumn(pageX) {
          const newWidth = startWidth + (pageX - startX);

          if (newWidth < 70) {
            return;
          }

          setColWidth(colIndex, newWidth);
          applyTableWidth();
        }

        function stopResize() {
          resizer.classList.remove("active");
          document.body.classList.remove("resizing-column");

          document.removeEventListener("mousemove", resizeWithMouse);
          document.removeEventListener("mouseup", stopResize);

          document.removeEventListener("touchmove", resizeWithTouch);
          document.removeEventListener("touchend", stopResize);

          saveColumnWidths();
        }
      });

      function saveColumnWidths() {
        const widths = {};

        colList.forEach(function (col, index) {
          widths[index] = getColWidth(index);
        });

        localStorage.setItem(storageKey, JSON.stringify(widths));
      }
    }
  </script>
</body>
</html>
