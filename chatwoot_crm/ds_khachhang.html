<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sách khách hàng</title>
  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>
  <script src="./js/auth_token.js"></script>
  <style>*{box-sizing:border-box}html,body{margin:0;padding:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827;width:100%;height:100%;overflow:hidden}.hidden{display:none!important}.app{width:100%;height:100vh;padding:6px;background:#f3f4f6;overflow:hidden}.content{width:100%;height:calc(100vh - 12px);background:#fff;padding:8px;border-radius:8px;border:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden}.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) minmax(180px,.55fr) auto auto;gap:6px;margin-bottom:8px;align-items:center;position:relative;z-index:30;background:#fff;flex:0 0 auto}.toolbar input{width:100%;height:34px;padding:6px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;outline:none;background:#fff;color:#111827}.toolbar input:focus{border-color:#2563eb;box-shadow:0 0 2px rgba(37,99,235,.12)}#searchBtn{height:34px;min-width:78px;border:none;background:#2563eb;color:#fff;padding:0 12px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}#searchBtn:hover{background:#1d4ed8}#searchBtn.loading{opacity:.65;pointer-events:none}#refreshBtn{height:34px;min-width:92px;border:none;background:#10b981;color:#fff;padding:0 12px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}#refreshBtn:hover{background:#059669}#refreshBtn.loading,#refreshBtn:disabled{opacity:.65;pointer-events:none;cursor:not-allowed}.column-dropdown{position:relative}#columnToggleBtn{height:34px;min-width:82px;border:none;background:#374151;color:#fff;padding:0 12px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}#columnToggleBtn:hover{background:#1f2937}.column-dropdown-menu{position:absolute;top:38px;right:0;width:220px;max-height:300px;overflow-y:auto;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 10px 26px rgba(0,0,.16);padding:8px;z-index:1200}.column-dropdown-menu label{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:7px;cursor:pointer;font-size:13px;color:#111827}.column-dropdown-menu label:hover{background:#f3f4f6}.column-dropdown-menu input{width:auto;height:auto;margin:0}.customer-table col.col-hidden,.customer-table th.col-hidden,.customer-table td.col-hidden{display:none!important}.staff-dropdown{position:relative;width:100%}#staffDropdownBtn{width:100%;height:34px;padding:6px 10px;border:1px solid #d1d5db;border-radius:7px;background:#fff;text-align:left;cursor:pointer;font-size:13px;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}#staffDropdownBtn:hover{border-color:#2563eb}.staff-dropdown-menu{position:absolute;top:38px;left:0;width:100%;min-width:170px;max-height:230px;overflow-y:auto;background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 8px 22px rgba(0,0,0,.12);padding:6px;z-index:1000}.staff-dropdown-menu label{display:flex;align-items:center;gap:6px;padding:6px;cursor:pointer;font-size:13px;color:#111827;border-radius:6px}.staff-dropdown-menu label:hover{background:#f3f4f6}.staff-dropdown-menu input{width:auto;height:auto;margin:0}.table-wrap{flex:1 1 auto;min-height:0;overflow:auto;border-top:1px solid #f3f4f6}.customer-table{width:max-content;min-width:720px;border-collapse:collapse;font-size:13px;table-layout:fixed;margin-top:0}.customer-table th,.customer-table td{padding:8px;border-bottom:1px solid #e5e7eb;text-align:left;white-space:nowrap;vertical-align:middle;overflow:hidden;text-overflow:ellipsis}.customer-table th{background:#f9fafb;font-weight:700;color:#111827;position:sticky;top:0;z-index:20}.customer-table tr:hover td{background:#f9fafb}.customer-table th.sortable{cursor:pointer;user-select:none}.customer-table th.sortable:hover{background:#eef2ff}.sort-icon{margin-left:4px;font-size:11px;color:#2563eb}.customer-table button{border:none;background:#2563eb;color:#fff;padding:5px 9px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}.customer-table button:hover{background:#1d4ed8}.customer-table tbody{transition:opacity .12s ease}.customer-table tbody.loading{opacity:.45;pointer-events:none}.customer-table th.resizable{position:sticky;top:0}.col-resizer{position:absolute;top:0;right:0;width:7px;height:100%;cursor:col-resize;user-select:none;touch-action:none;z-index:30}.col-resizer::after{content:"";position:absolute;top:20%;bottom:20%;left:3px;width:1px;background:transparent}.col-resizer:hover::after,.col-resizer.active::after{background:#2563eb}body.resizing-column{cursor:col-resize;user-select:none}.staff-cell-select{width:100%;height:34px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#111827;font-size:13px;padding:0 6px;cursor:pointer}.staff-cell-select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 2px rgba(37,99,235,.12)}.footer-actions{margin-top:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11px;color:#6b7280;flex-wrap:wrap;background:#fff;padding-top:6px;padding-bottom:2px;flex:0 0 auto}.page-actions,.user-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}#pageSizeSelect{height:28px;border:1px solid #d1d5db;background:#fff;border-radius:6px;padding:0 8px;font-size:12px;color:#111827}.page-actions button{min-width:28px;height:28px;border:none;background:transparent;color:#374151;border-radius:6px;font-size:14px;cursor:pointer}.page-actions button:hover{background:#f3f4f6}.page-actions button:disabled{color:#cbd5e1;cursor:not-allowed;background:transparent}#pageInput{width:48px;height:28px;border:1px solid #d1d5db;border-radius:8px;text-align:center;font-size:12px;outline:none}#pageInput:focus{border-color:#2563eb}#pageInfo{color:#374151;font-size:12px;white-space:nowrap;min-width:165px}#userInfo{max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}#logoutBtn{border:none;background:#ef4444;color:#fff;padding:5px 8px;border-radius:5px;font-size:11px;cursor:pointer;white-space:nowrap}#logoutBtn:hover{background:#dc2626}.notice-box{position:fixed;right:18px;bottom:82px;z-index:5001;width:360px;max-width:calc(100vw - 36px);min-height:70px;background:#fff;border:1px solid #d1d5db;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.18);padding:12px;color:#111827;font-size:13px}.login-popup{position:fixed;inset:0;background:rgba(7,16,37,.72);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}.login-modal{width:min(380px,92vw);background:#0f1830;color:#e6edff;border-radius:16px;padding:26px 22px;box-shadow:0 14px 34px rgba(0,0,0,.35);text-align:center}.login-modal h2{margin:0 0 16px;font-size:24px;line-height:1.2}.login-modal input,.login-modal button{width:100%;padding:11px 12px;border-radius:10px;font-size:15px}.login-modal input{margin:6px 0;border:1px solid #233043;background:#071526;color:#e6edff;outline:none}.login-modal input:focus{border-color:#2dd4bf;box-shadow:0 2px rgba(45,212,191,.15)}#popupLoginBtn{margin-top:10px;border:0;background:#2dd4bf;color:#042023;font-weight:700;cursor:pointer}#popupLoginBtn:hover{background:#5eead4}#popupLoginBtn:disabled{opacity:.6;cursor:not-allowed}.login-message{min-height:18px;margin-top:10px;color:#ff6b6b;font-size:14px}.login-note{margin-top:8px;color:#9aa7c7;font-size:12px}
  </style>
</head>
<body>
<div id="loginPopup" class="login-popup hidden"><div class="login-modal"><h2>🔐 Đăng nhập</h2><input id="popupMaNvInput" type="text" placeholder="Mã nhân viên"/><input id="popupMatKhauInput" type="password" placeholder="Mật khẩu"/><button id="popupLoginBtn">Đăng nhập</button><div class="login-message" id="popupLoginMessage"></div><div class="login-note" id="popupCfgNote">Đang khởi tạo...</div></div></div>
<div class="app"><main class="content"><div class="toolbar"><input id="searchInput" placeholder="Tìm mã KH, tên KH, SĐT..."/><div class="staff-dropdown"><button id="staffDropdownBtn">Tất cả nhân viên</button><div id="staffDropdownMenu" class="staff-dropdown-menu hidden"><label><input type="checkbox" class="staff-option" value="all" checked/>Tất cả nhân viên</label></div></div><button id="searchBtn">Tìm kiếm</button><button id="refreshBtn">↻ Làm mới</button><div class="column-dropdown"><button id="columnToggleBtn">⚙ Cột</button><div id="columnToggleMenu" class="column-dropdown-menu hidden"></div></div></div><div class="table-wrap"><table class="customer-table"><colgroup><col data-col="ma_kh" style="width:130px"><col data-col="ten_kh" style="width:240px"><col data-col="sdt" style="width:150px"><col data-col="cong_no" style="width:130px"><col data-col="ma_nv" style="width:160px"><col data-col="ngay_chat_cuoi" style="width:160px"><col data-col="conversation_id" style="width:130px"><col data-col="action" style="width:190px"></colgroup><thead><tr><th class="sortable resizable" data-col="ma_kh" data-sort="ma_kh">Mã KH <span class="sort-icon"></span><span class="col-resizer"></span></th><th class="sortable resizable" data-col="ten_kh" data-sort="ten_kh">Tên khách hàng <span class="sort-icon"></span><span class="col-resizer"></span></th><th class="sortable resizable" data-col="sdt" data-sort="sdt">Số điện thoại <span class="sort-icon"></span><span class="col-resizer"></span></th><th class="sortable resizable" data-col="cong_no" data-sort="cong_no">Công nợ <span class="sort-icon"></span><span class="col-resizer"></span></th><th class="sortable resizable" data-col="ma_nv" data-sort="ma_nv">Nhân viên <span class="sort-icon"></span><span class="col-resizer"></span></th><th class="sortable resizable" data-col="ngay_chat_cuoi" data-sort="ngay_chat_cuoi">Ngày <span class="sort-icon"></span><span class="col-resizer"></span></th><th class="sortable resizable" data-col="conversation_id" data-sort="conversation_id">ID hộp thoại <span class="sort-icon"></span><span class="col-resizer"></span></th><th class="resizable" data-col="action">Thao tác<span class="col-resizer"></span></th></tr></thead><tbody id="customerBody"><tr><td colspan="8">Vui lòng đăng nhập để xem dữ liệu.</td></tr></tbody></table></div><div class="footer-actions"><div class="page-actions"><span>Hiển thị</span><select id="pageSizeSelect"><option value="20">20</option><option value="50">50</option><option value="100" selected>100</option><option value="200">200</option></select><button id="firstPageBtn">|‹</button><button id="prevPageBtn">‹</button><input id="pageInput" type="number" min="1" value="1"/><button id="nextPageBtn">›</button><button id="lastPageBtn">›|</button><span id="pageInfo">0 - 0 trong 0</span></div><div class="user-actions"><span id="userInfo">Chưa đăng nhập</span><button id="logoutBtn">Đăng xuất</button></div></div><div id="noticeBox" class="notice-box hidden"></div></main></div>
<script>
const LOGIN_STORAGE_KEY="chatwoot_crm_user";
const TABLE_NHAN_VIEN="kv_nhan_vien";
const TABLE_KHACH_HANG_VIEW="sql_khachhang_nhanvien"; // đọc
const TABLE_KHACH_HANG_UPDATE="kv_khachhang_nhanvien"; // 1. GHI VÀO ĐÂY
let currentUser=getLoginUser();let sortField="";let sortDirection="asc";let supabaseClient=null;let customers=[];let currentPage=1;let pageSize=100;let totalRows=0;let isLoadingCustomers=false;let staffRows=[];
const loginPopup=document.getElementById("loginPopup");const popupMaNvInput=document.getElementById("popupMaNvInput");const popupMatKhauInput=document.getElementById("popupMatKhauInput");const popupLoginBtn=document.getElementById("popupLoginBtn");const popupLoginMessage=document.getElementById("popupLoginMessage");const popupCfgNote=document.getElementById("popupCfgNote");const userInfo=document.getElementById("userInfo");const logoutBtn=document.getElementById("logoutBtn");const searchInput=document.getElementById("searchInput");const searchBtn=document.getElementById("searchBtn");const refreshBtn=document.getElementById("refreshBtn");const customerBody=document.getElementById("customerBody");const firstPageBtn=document.getElementById("firstPageBtn");const prevPageBtn=document.getElementById("prevPageBtn");const nextPageBtn=document.getElementById("nextPageBtn");const lastPageBtn=document.getElementById("lastPageBtn");const pageInput=document.getElementById("pageInput");const pageSizeSelect=document.getElementById("pageSizeSelect");const pageInfo=document.getElementById("pageInfo");const staffDropdownBtn=document.getElementById("staffDropdownBtn");const staffDropdownMenu=document.getElementById("staffDropdownMenu");const noticeBox=document.getElementById("noticeBox");
function getStaffOptions(){return document.querySelectorAll(".staff-option")}
initSupabase().then(()=>{initPage()});
async function initSupabase(){try{popupCfgNote.textContent="Đang lấy cấu hình...";let url="",key="";try{const r=await fetch("/api/getConfig",{headers:{"x-internal-key":window.getInternalKey?window.getInternalKey():""}});if(r.ok){const c=await r.json();url=c.url||"";key=c.anon||c.key||""}}catch(e){}if((!url||!key)&&window.configReady){await window.configReady;if(typeof window.getConfig==="function"){url=url||window.getConfig("url");key=key||window.getConfig("anon")}}if(!url||!key){popupCfgNote.textContent="Thiếu cấu hình";return}supabaseClient=window.supabase.createClient(url,key);popupCfgNote.textContent="Sẵn sàng"}catch(e){popupCfgNote.textContent="Lỗi"}}
async function loadStaffFromSupabase(){if(!supabaseClient)return;const{data}=await supabaseClient.from(TABLE_NHAN_VIEN).select("ma_nv,id_nv,ten_nv").not("id_nv","is",null).order("ten_nv");staffRows=(data||[]).map(i=>({ma_nv:String(i.ma_nv||"").trim(),id_nv:String(i.id_nv||"").trim(),ten_nv:String(i.ten_nv||"").trim()}));renderStaffDropdown()}
function renderStaffDropdown(){staffDropdownMenu.innerHTML=`<label><input type="checkbox" class="staff-option" value="all" checked/> Tất cả nhân viên</label>`;staffRows.forEach(s=>{const l=document.createElement("label");l.innerHTML=`<input type="checkbox" class="staff-option" value="${s.ma_nv}" data-name="${s.ten_nv}"/> ${s.ten_nv}`;staffDropdownMenu.appendChild(l)});bindStaffOptionEvents();updateStaffButtonText()}
function bindStaffOptionEvents(){getStaffOptions().forEach(o=>{o.addEventListener("change",()=>{handleStaffChange(o);updateStaffButtonText();loadCustomersFromSupabase(1)})})} // 3. LOAD LẠI TỪ SERVER
function handleStaffChange(ch){const all=document.querySelector('.staff-option[value="all"]');const normals=Array.from(getStaffOptions()).filter(o=>o.value!=="all");if(ch.value==="all"&&ch.checked){normals.forEach(o=>o.checked=false);return}if(ch.value!=="all"&&ch.checked){all.checked=false}if(!normals.some(o=>o.checked)){all.checked=true}}
function getSelectedStaffList(){const sel=Array.from(getStaffOptions()).filter(o=>o.checked).map(o=>o.value);if(sel.length===0||sel.includes("all"))return[];return sel}
function updateStaffButtonText(){const opts=Array.from(getStaffOptions()).filter(o=>o.checked);if(opts.length===0||opts.some(o=>o.value==="all")){staffDropdownBtn.textContent="Tất cả nhân viên";return}staffDropdownBtn.textContent=opts.map(o=>o.dataset.name||o.value).join(", ")}
async function loadCustomersFromSupabase(page=1){if(!supabaseClient)return;currentPage=page;const from=(page-1)*pageSize;const to=from+pageSize-1;const kw=searchInput.value.trim();setCustomerLoading(true);let q=supabaseClient.from(TABLE_KHACH_HANG_VIEW).select("ma_kh,ten_kh,dien_thoai,congno,ma_nv,ngay_chat_cuoi,conversation_id",{count:"exact"}).order(sortField||"ma_kh",{ascending:sortDirection!=="desc"});const staffList=getSelectedStaffList();if(staffList.length>0){q=q.in("ma_nv",staffList)} // 2. LỌC TRƯỚC KHI PHÂN TRANG
if(kw){q=q.or(`ma_kh.ilike.%${kw}%,ten_kh.ilike.%${kw}%,dien_thoai.ilike.%${kw}%`)}q=q.range(from,to);const{data,error,count}=await q;if(error){customerBody.innerHTML=`<tr><td colspan=8>Lỗi: ${error.message}</td></tr>`;setCustomerLoading(false);return}totalRows=count||0;customers=(data||[]).map(i=>({ma_kh:i.ma_kh||"",ten_kh:i.ten_kh||"",sdt:i.dien_thoai||"",cong_no:i.congno||0,ma_nv:i.ma_nv||"",ngay_chat_cuoi:i.ngay_chat_cuoi,conversation_id:i.conversation_id}));renderCustomers();setCustomerLoading(false)}
function setCustomerLoading(l){isLoadingCustomers=l;customerBody.classList.toggle("loading",l);searchBtn.classList.toggle("loading",l)}
function renderCustomers(){if(customers.length===0){customerBody.innerHTML=`<tr><td colspan=8>Không có dữ liệu</td></tr>`;return}customerBody.innerHTML=customers.map(it=>{const staff=staffRows.find(s=>s.ma_nv===it.ma_nv);const staffName=staff?staff.ten_nv:"";return`<tr><td>${it.ma_kh}</td><td>${it.ten_kh}</td><td>${it.sdt}</td><td>${Number(it.cong_no).toLocaleString("vi-VN")}</td><td title="${staffName}"><select class="staff-cell-select" onchange="saveCustomerStaffAssignment('${it.ma_kh}',this.value)"><option value=""></option>${staffRows.map(s=>`<option value="${s.ma_nv}" ${s.ma_nv===it.ma_nv?"selected":""}>${s.ten_nv}</option>`).join("")}</select></td><td>${it.ngay_chat_cuoi?new Date(it.ngay_chat_cuoi).toLocaleDateString("vi-VN"):""}</td><td>${it.conversation_id||""}</td><td><button onclick="assignCustomer('${it.ma_kh}')">Gán KH</button></td></tr>`}).join("");updatePagination()}
async function saveCustomerStaffAssignment(maKh,maNv){if(!supabaseClient)return;const val=maNv||null;const{error}=await supabaseClient.from(TABLE_KHACH_HANG_UPDATE).update({ma_nv:val}).eq("ma_kh",maKh);if(error){showNotice("Lỗi lưu: "+error.message,"error");return}showNotice("Đã cập nhật nhân viên cho "+maKh);await loadCustomersFromSupabase(currentPage)}
function updatePagination(){const tp=Math.max(1,Math.ceil(totalRows/pageSize));const from=totalRows===0?0:(currentPage-1)*pageSize+1;const to=Math.min(currentPage*pageSize,totalRows);pageInfo.textContent=`${from} - ${to} trong ${totalRows}`;pageInput.value=currentPage;firstPageBtn.disabled=prevPageBtn.disabled=currentPage<=1;nextPageBtn.disabled=lastPageBtn.disabled=currentPage>=tp}
function getLoginUser(){try{return JSON.parse(localStorage.getItem(LOGIN_STORAGE_KEY))}catch(e){return null}}
async function initPage(){currentUser=getLoginUser();if(!currentUser){userInfo.textContent="Chưa đăng nhập";openLoginPopup();return}closeLoginPopup();userInfo.textContent=currentUser.ten_nv+" - "+currentUser.ma_nv;await loadStaffFromSupabase();await loadCustomersFromSupabase(1)}
function openLoginPopup(){loginPopup.classList.remove("hidden")}function closeLoginPopup(){loginPopup.classList.add("hidden")}
popupLoginBtn.addEventListener("click",async()=>{const ma=popupMaNvInput.value.trim();const pw=popupMatKhauInput.value.trim();if(!ma||!pw){popupLoginMessage.textContent="Nhập đủ";return}popupLoginBtn.disabled=true;const{data,error}=await supabaseClient.from(TABLE_NHAN_VIEN).select("ma_nv,ten_nv,mat_khau,hoat_dong").eq("ma_nv",ma).eq("mat_khau",pw).maybeSingle();popupLoginBtn.disabled=false;if(error||!data){popupLoginMessage.textContent="Sai";return}if(data.hoat_dong===false){popupLoginMessage.textContent="Khóa";return}currentUser={ma_nv:data.ma_nv,ten_nv:data.ten_nv};localStorage.setItem(LOGIN_STORAGE_KEY,JSON.stringify(currentUser));closeLoginPopup();initPage()});
logoutBtn.addEventListener("click",()=>{localStorage.removeItem(LOGIN_STORAGE_KEY);location.reload()});
searchBtn.addEventListener("click",()=>loadCustomersFromSupabase(1));searchInput.addEventListener("keydown",e=>{if(e.key==="Enter")loadCustomersFromSupabase(1)});refreshBtn.addEventListener("click",()=>loadCustomersFromSupabase(currentPage));
firstPageBtn.addEventListener("click",()=>loadCustomersFromSupabase(1));prevPageBtn.addEventListener("click",()=>{if(currentPage>1)loadCustomersFromSupabase(currentPage-1)});nextPageBtn.addEventListener("click",()=>{const tp=Math.max(1,Math.ceil(totalRows/pageSize));if(currentPage<tp)loadCustomersFromSupabase(currentPage+1)});lastPageBtn.addEventListener("click",()=>{const tp=Math.max(1,Math.ceil(totalRows/pageSize));loadCustomersFromSupabase(tp)});pageInput.addEventListener("keydown",e=>{if(e.key==="Enter")loadCustomersFromSupabase(Number(pageInput.value)||1)});pageSizeSelect.addEventListener("change",()=>{pageSize=Number(pageSizeSelect.value);loadCustomersFromSupabase(1)});
staffDropdownBtn.addEventListener("click",()=>staffDropdownMenu.classList.toggle("hidden"));document.addEventListener("click",e=>{if(!staffDropdownBtn.contains(e.target)&&!staffDropdownMenu.contains(e.target))staffDropdownMenu.classList.add("hidden")});
function showNotice(msg,type="ok"){noticeBox.textContent=msg;noticeBox.classList.remove("hidden");noticeBox.style.background=type==="error"?"#fef2f2":"#f0fdf4";setTimeout(()=>noticeBox.classList.add("hidden"),2500)}
function assignCustomer(maKh){showNotice("Đã gửi gán KH "+maKh)}
document.querySelectorAll(".sortable").forEach(th=>{th.addEventListener("click",()=>{const f=th.dataset.sort;if(sortField===f){sortDirection=sortDirection==="asc"?"desc":"asc"}else{sortField=f;sortDirection="asc"}loadCustomersFromSupabase(1)})});
</script>
</body>
</html>
