<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Danh sách khách hàng</title>

  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>
  <script src="./js/auth_token.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: 100%;
      height: 100vh;
      padding: 6px;
      background: #f3f4f6;
      overflow: hidden;
    }

    .content {
      width: 100%;
      height: calc(100vh - 12px);
      background: #ffffff;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.55fr) auto auto;
      gap: 6px;
      margin-bottom: 8px;
      align-items: center;
      position: relative;
      z-index: 30;
      background: #ffffff;
      flex: 0 0 auto;
    }

    .toolbar input {
      width: 100%;
      height: 34px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      background: #ffffff;
      color: #111827;
    }

    .toolbar input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    #searchBtn {
      height: 34px;
      min-width: 78px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      padding: 0 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    #searchBtn:hover {
      background: #1d4ed8;
    }

    #searchBtn.loading {
      opacity: 0.65;
      pointer-events: none;
    }

    #refreshBtn {
      height: 34px;
      min-width: 92px;
      border: none;
      background: #10b981;
      color: #ffffff;
      padding: 0 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    #refreshBtn:hover {
      background: #059669;
    }

    #refreshBtn.loading,
    #refreshBtn:disabled {
      opacity: 0.65;
      pointer-events: none;
      cursor: not-allowed;
    }

    .staff-dropdown {
      position: relative;
      width: 100%;
    }

    #staffDropdownBtn {
      width: 100%;
      height: 34px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      background: #ffffff;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #staffDropdownBtn:hover {
      border-color: #2563eb;
    }

    .staff-dropdown-menu {
      position: absolute;
      top: 38px;
      left: 0;
      width: 100%;
      min-width: 170px;
      max-height: 230px;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      padding: 6px;
      z-index: 1000;
    }

    .staff-dropdown-menu label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      border-radius: 6px;
    }

    .staff-dropdown-menu label:hover {
      background: #f3f4f6;
    }

    .staff-dropdown-menu input {
      width: auto;
      height: auto;
      margin: 0;
    }

    .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border-top: 1px solid #f3f4f6;
    }

    .customer-table {
      width: max-content;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
      margin-top: 0;
    }

    .customer-table th,
    .customer-table td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .customer-table th {
      background: #f9fafb;
      font-weight: 700;
      color: #111827;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .customer-table tr:hover td {
      background: #f9fafb;
    }

    .customer-table th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .customer-table th.sortable:hover {
      background: #eef2ff;
    }

    .sort-icon {
      margin-left: 4px;
      font-size: 11px;
      color: #2563eb;
    }

    .customer-table button {
      border: none;
      background: #2563eb;
      color: #ffffff;
      padding: 5px 9px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .customer-table button:hover {
      background: #1d4ed8;
    }

    .customer-table tbody {
      transition: opacity 0.12s ease;
    }

    .customer-table tbody.loading {
      opacity: 0.45;
      pointer-events: none;
    }

    .customer-table th.resizable {
      position: sticky;
      top: 0;
    }

    .col-resizer {
      position: absolute;
      top: 0;
      right: 0;
      width: 7px;
      height: 100%;
      cursor: col-resize;
      user-select: none;
      touch-action: none;
      z-index: 30;
    }

    .col-resizer::after {
      content: "";
      position: absolute;
      top: 20%;
      bottom: 20%;
      left: 3px;
      width: 1px;
      background: transparent;
    }

    .col-resizer:hover::after,
    .col-resizer.active::after {
      background: #2563eb;
    }

    body.resizing-column {
      cursor: col-resize;
      user-select: none;
    }

    .staff-cell-select {
      width: 100%;
      height: 30px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #ffffff;
      color: #111827;
      font-size: 13px;
      padding: 0 6px;
    }

    .staff-cell-select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .staff-cell-select.changed {
      border-color: #f97316;
      background: #fff7ed;
    }

    .staff-chip-editor {
      min-height: 38px;
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 4px 7px;
      cursor: pointer;
      overflow: visible;
    }

    .staff-chip-editor:hover,
    .staff-chip-editor.active {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .staff-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 145px;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 8px;
      background: #eef0f3;
      color: #111827;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }

    .staff-chip-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .staff-chip-remove {
      border: none;
      background: transparent;
      color: #4b5563;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 1px;
      font-weight: 800;
    }

    .staff-chip-remove:hover {
      color: #dc2626;
    }

    .staff-chip-placeholder {
      color: #6b7280;
      font-size: 13px;
      padding: 4px 2px;
    }

    .staff-chip-picker {
      position: fixed;
      z-index: 6500;
      width: 300px;
      max-width: calc(100vw - 24px);
      max-height: 320px;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.2);
      padding: 8px;
    }

    .staff-chip-picker-title {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      margin: 2px 4px 8px;
    }

    .staff-chip-picker label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 7px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
    }

    .staff-chip-picker label:hover {
      background: #f3f4f6;
    }

    .staff-chip-picker input {
      width: auto;
      height: auto;
      margin: 0;
    }


    .staff-chip-option {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      background: transparent;
      text-align: left;
      font-family: inherit;
    }

    .staff-chip-option:hover {
      background: #f3f4f6;
    }

    .staff-chip-option-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }

    .staff-chip-empty-option {
      padding: 10px;
      color: #6b7280;
      font-size: 13px;
    }

    .footer-actions {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #6b7280;
      flex-wrap: wrap;
      background: #ffffff;
      padding-top: 6px;
      padding-bottom: 2px;
      flex: 0 0 auto;
    }

    .page-actions,
    .user-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    #pageSizeSelect {
      height: 28px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      border-radius: 6px;
      padding: 0 8px;
      font-size: 12px;
      color: #111827;
    }

    .page-actions button {
      min-width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #374151;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .page-actions button:hover {
      background: #f3f4f6;
    }

    .page-actions button:disabled {
      color: #cbd5e1;
      cursor: not-allowed;
      background: transparent;
    }

    #pageInput {
      width: 48px;
      height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      text-align: center;
      font-size: 12px;
      outline: none;
    }

    #pageInput:focus {
      border-color: #2563eb;
    }

    #pageInfo {
      color: #374151;
      font-size: 12px;
      white-space: nowrap;
      min-width: 165px;
    }

    #userInfo {
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #logoutBtn {
      border: none;
      background: #ef4444;
      color: #ffffff;
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    #logoutBtn:hover {
      background: #dc2626;
    }

    .floating-save-bar {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5000;
      min-width: 320px;
      max-width: calc(100vw - 36px);
      background: #111827;
      color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .floating-save-bar b {
      display: block;
      font-size: 13px;
    }

    #saveMessage {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: #cbd5e1;
    }

    .floating-save-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .floating-save-actions button {
      border: none;
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    #saveStaffBtn {
      background: #22c55e;
      color: #ffffff;
    }

    #saveStaffBtn:hover {
      background: #16a34a;
    }

    #assignCustomerCodeBtn {
      background: #2563eb;
      color: #ffffff;
    }

    #assignCustomerCodeBtn:hover {
      background: #1d4ed8;
    }


    .row-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .customer-table button.assign-btn {
      background: #2563eb;
    }

    .customer-table button.assign-btn:hover {
      background: #1d4ed8;
    }

    .customer-table button.assign-btn.has-staff-dropdown::after {
      content: " ▾";
      font-size: 12px;
      font-weight: 900;
    }

    .zalo-chat-popover.assign-staff-dropdown {
      width: 260px;
      padding: 8px;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-chat-title,
    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-chooser-title {
      display: none;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-chooser {
      margin-bottom: 0;
      padding: 0;
      border: none;
      background: transparent;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-btn {
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-btn::after {
      content: "Chọn";
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
    }

    .zalo-chat-popover.assign-staff-dropdown .zalo-sender-btn.selected::after {
      content: "✓";
      color: #ffffff;
    }

    .customer-table button.zalo-chat-btn {
      background: #16a34a;
    }

    .customer-table button.zalo-chat-btn:hover {
      background: #15803d;
    }

    .customer-table button:disabled,
    .customer-table button.zalo-chat-btn:disabled,
    .customer-table button.assign-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.15);
    }

    .customer-table button.zalo-chat-btn:disabled:hover {
      background: #16a34a;
    }

    .zalo-chat-popover {
      position: fixed;
      z-index: 6000;
      width: 320px;
      max-width: calc(100vw - 24px);
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.2);
      padding: 10px;
    }

    .zalo-chat-title {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .zalo-sender-info {
      margin-bottom: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      font-size: 13px;
      font-weight: 700;
    }

    .zalo-sender-chooser {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }

    .zalo-sender-chooser-title {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
    }

    .zalo-sender-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .zalo-sender-btn {
      border: 1px solid #d1d5db;
      border-radius: 9px;
      padding: 8px 10px;
      background: #ffffff;
      color: #111827;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .zalo-sender-btn:hover {
      border-color: #16a34a;
      background: #f0fdf4;
    }

    .zalo-sender-btn.selected {
      border-color: #16a34a;
      background: #16a34a;
      color: #ffffff;
      box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.16);
    }

    .zalo-chat-popover textarea {
      width: 100%;
      min-height: 82px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      outline: none;
    }

    .zalo-chat-popover textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .zalo-attach-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .zalo-attach-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 8px;
      background: #eef2ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #c7d2fe;
      user-select: none;
    }

    .zalo-attach-btn:hover {
      background: #e0e7ff;
    }

    #zaloAttachmentName {
      font-size: 12px;
      color: #374151;
      max-width: 210px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #zaloAttachmentPreview {
      margin-top: 8px;
    }

    #zaloAttachmentPreview img,
    #zaloAttachmentPreview video {
      max-width: 180px;
      max-height: 130px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      display: block;
      background: #000000;
    }

    .zalo-file-preview {
      font-size: 12px;
      color: #374151;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #f9fafb;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .zalo-file-remove {
      border: none;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 7px;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .zalo-file-remove:hover {
      background: #fecaca;
    }

    .zalo-chat-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .zalo-chat-actions button {
      border: none;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .zalo-chat-send {
      background: #16a34a;
      color: #ffffff;
    }

    .zalo-chat-close {
      background: #e5e7eb;
      color: #111827;
    }


    .confirm-assign-modal {
      position: fixed;
      inset: 0;
      z-index: 7000;
      background: rgba(15, 23, 42, 0.48);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .confirm-assign-box {
      width: min(440px, 92vw);
      background: #ffffff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      padding: 18px;
      color: #111827;
    }

    .confirm-assign-title {
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .confirm-assign-message {
      font-size: 14px;
      line-height: 1.55;
      color: #374151;
    }

    .confirm-assign-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .confirm-assign-actions button {
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    #confirmAssignCancelBtn {
      background: #e5e7eb;
      color: #111827;
    }

    #confirmAssignOkBtn {
      background: #2563eb;
      color: #ffffff;
    }

    #confirmAssignOkBtn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .notice-box {
      position: fixed;
      right: 18px;
      bottom: 82px;
      z-index: 5001;
      width: 360px;
      max-width: calc(100vw - 36px);
      min-height: 70px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      padding: 12px;
      color: #111827;
      font-size: 13px;
    }

    .login-popup {
      position: fixed;
      inset: 0;
      background: rgba(7, 16, 37, 0.72);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-modal {
      width: min(380px, 92vw);
      background: #0f1830;
      color: #e6edff;
      border-radius: 16px;
      padding: 26px 22px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .login-modal h2 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.2;
    }

    .login-modal input,

    function getStaffOptions() {

    window.addEventListener("message", handleChatwootMessage);

    initSupabase().then(function () {
      requestChatwootContext();
      setTimeout(requestChatwootContext, 500);
      setTimeout(requestChatwootContext, 1200);

      initPage();
      enableColumnResize();
    });


    function getQueryParam(name) {
      const value = new URLSearchParams(window.location.search).get(name);
      if (!value || String(value).includes("{{")) {
        return null;
      }
      return value;
    }

    function tryParseJson(value) {
      if (typeof value !== "string") {
        return value;
      }

      let current = value;

      for (let i = 0; i < 4; i++) {
        if (typeof current !== "string") {
          return current;
        }

        const trimmed = current.trim();

        if (!trimmed || (!trimmed.startsWith("{") && !trimmed.startsWith("["))) {
          return current;
        }

        try {
          current = JSON.parse(trimmed);
        } catch (error) {
          return value;
        }
      }

      return current;
    }

    function getRawText(value) {
      if (typeof value === "string") {
        return value;
      }

      try {
        return JSON.stringify(value || {});
      } catch (error) {
        return "";
      }
    }

    function extractFirstMatch(text, regex) {
      const match = String(text || "").match(regex);
      return match && match[1] ? String(match[1]) : null;
    }

    function extractIdsFromRawChatwootMessage(rawData) {
      const raw = getRawText(rawData);

      if (!raw || (raw.indexOf("appContext") === -1 && raw.indexOf("conversation_id") === -1)) {
        return null;
      }

      chatwootContextRaw = raw;
      window.__CHATWOOT_APP_CONTEXT_RAW__ = raw;

      const conversationId =
        extractFirstMatch(raw, /["']conversation_id["']\s*:\s*["']?(\d+)["']?/i) ||
        extractFirstMatch(raw, /conversation_id=(\d+)/i);

      // Trong context Chatwoot của anh, contact nằm ở conversation.sender.id.
      // Regex này cố tình tìm sender.id, tránh lấy nhầm id message.
      const senderBlock = raw.match(/["']sender["']\s*:\s*\{[\s\S]{0,2000}?\}/i);
      const contactId = senderBlock
        ? extractFirstMatch(senderBlock[0], /["']id["']\s*:\s*["']?(\d+)["']?/i)
        : null;

      if (conversationId) {
        chatwootFallbackConversationId = String(conversationId);
        window.__CHATWOOT_CONVERSATION_ID__ = String(conversationId);
      }

      if (contactId) {
        chatwootFallbackContactId = String(contactId);
        window.__CHATWOOT_CONTACT_ID__ = String(contactId);
      }

      if (conversationId || contactId) {
        console.log("✅ BẮT ID TỪ RAW CHATWOOT MESSAGE:", {
          conversation_id: conversationId || null,
          contact_id: contactId || null
        });
      }

      return {
        conversation_id: conversationId || null,
        contact_id: contactId || null
      };
    }

    function extractChatwootContextFromMessage(rawData) {
      extractIdsFromRawChatwootMessage(rawData);

      const payload = tryParseJson(rawData);

      if (!payload || typeof payload !== "object") {
        return null;
      }

      if (payload.event === "appContext") {
        return payload.data || null;
      }

      if (payload.data && payload.data.event === "appContext") {
        return payload.data.data || null;
      }

      if (payload.conversation && typeof payload.conversation === "object") {
        return payload;
      }

      if (payload.data && payload.data.conversation && typeof payload.data.conversation === "object") {
        return payload.data;
      }

      return null;
    }

    function resolveWaitingChatwootContext() {
      const resolvers = chatwootContextReadyResolvers;
      chatwootContextReadyResolvers = [];

      resolvers.forEach(function (resolve) {
        resolve(chatwootContext);
      });
    }

    function handleChatwootMessage(event) {
      const context = extractChatwootContextFromMessage(event.data);

      if (!context) {
        // Nếu không parse được context nhưng regex đã lấy được conversation_id, vẫn cho các nút chạy.
        if (getCurrentConversationId()) {
          resolveWaitingChatwootContext();
        }
        return;
      }

      chatwootContext = context;
      window.__CHATWOOT_APP_CONTEXT__ = context;

      const conversationId = getCurrentConversationId();
      const contactId = getCurrentContactId();

      console.log("✅ CHATWOOT APP CONTEXT ĐÃ NHẬN:", {
        conversation_id: conversationId,
        contact_id: contactId,
        conversation_field: context && context.conversation ? context.conversation : null,
        context: context
      });

      resolveWaitingChatwootContext();
    }

    function requestChatwootContext() {
      try {
        window.parent.postMessage(CHATWOOT_FETCH_INFO_EVENT, "*");
      } catch (error) {
        console.warn("Không gửi được yêu cầu lấy Chatwoot context:", error);
      }
    }

    function waitForChatwootContext(timeoutMs = 1500) {
      if (getCurrentConversationId()) {
        return Promise.resolve(chatwootContext);
      }

      requestChatwootContext();

      return new Promise(function (resolve) {
        const timeout = setTimeout(function () {
          chatwootContextReadyResolvers = chatwootContextReadyResolvers.filter(function (item) {
            return item !== done;
          });
          resolve(chatwootContext);
        }, timeoutMs);

        function done(context) {
          clearTimeout(timeout);
          resolve(context);
        }

        chatwootContextReadyResolvers.push(done);

        setTimeout(requestChatwootContext, 250);
        setTimeout(requestChatwootContext, 700);
        setTimeout(requestChatwootContext, 1400);
        setTimeout(requestChatwootContext, 2400);
      });
    }

    function getCurrentConversationId() {
      const queryId = getQueryParam("conversation_id");
      if (queryId) {
        return String(queryId);
      }

      const ctx = chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null;
      const c = ctx && ctx.conversation ? ctx.conversation : null;

      // Chatwoot Dashboard App bản anh đang dùng trả ID hội thoại ở conversation.conversation_id.
      // Không dùng conversation.id làm ưu tiên vì trường đó có thể là ID message.
      if (c && c.conversation_id) {
        return String(c.conversation_id);
      }

      if (ctx && ctx.conversation_id) {
        return String(ctx.conversation_id);
      }

      if (ctx && ctx.message && ctx.message.conversation_id) {
        return String(ctx.message.conversation_id);
      }

      if (chatwootFallbackConversationId) {
        return String(chatwootFallbackConversationId);
      }

      if (window.__CHATWOOT_CONVERSATION_ID__) {
        return String(window.__CHATWOOT_CONVERSATION_ID__);
      }

      if (chatwootContextRaw) {
        const rawId = extractFirstMatch(chatwootContextRaw, /["']conversation_id["']\s*:\s*["']?(\d+)["']?/i);
        if (rawId) return String(rawId);
      }

      return null;
    }

    function getCurrentContactId() {
      const queryId = getQueryParam("contact_id");
      if (queryId) {
        return String(queryId);
      }

      const ctx = chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null;
      const c = ctx && ctx.conversation ? ctx.conversation : null;

      const contactId =
        (ctx && ctx.contact && ctx.contact.id) ||
        (c && c.sender && c.sender.id) ||
        (c && c.contact && c.contact.id) ||
        (c && c.meta && c.meta.sender && c.meta.sender.id) ||
        chatwootFallbackContactId ||
        window.__CHATWOOT_CONTACT_ID__ ||
        null;

      return contactId ? String(contactId) : null;
    }

    function normalizeNullableMaNv(value) {
      const raw = String(value || "").trim();
      return raw ? raw : null;
    }

    function showNotice(message, type = "ok", timeoutMs = 1800) {
      noticeBox.classList.remove("hidden");
      noticeBox.innerHTML = escapeHtml(message);

      if (type === "error") {
        noticeBox.style.borderColor = "#fecaca";
        noticeBox.style.background = "#fef2f2";
        noticeBox.style.color = "#991b1b";
      } else {
        noticeBox.style.borderColor = "#bbf7d0";
        noticeBox.style.background = "#f0fdf4";
        noticeBox.style.color = "#166534";
      }

      if (timeoutMs > 0) {
        setTimeout(function () {
          noticeBox.classList.add("hidden");
          noticeBox.innerHTML = "";
        }, timeoutMs);
      }
    }


    async function showAssignDebugStep(message, type = "ok", delayMs = 850) {
      showNotice("[DEBUG GÁN KH] " + message, type, Math.max(delayMs + 400, 1600));
      console.log("[DEBUG GÁN KH]", message);
      if (delayMs > 0) {
        await new Promise(function (resolve) {
          setTimeout(resolve, delayMs);
        });
      }
    }

    function getCustomerByMaKh(maKh) {
      return customers.find(function (item) {
        return String(item.ma_kh || "") === String(maKh || "");
      }) || null;
    }

    function getMaNvForCustomer(maKh) {
      const found = getCustomerByMaKh(maKh);
      return normalizeNullableMaNv(found ? found.ma_nv : null);
    }

    function readMaKhFromObject(obj) {
      if (!obj || typeof obj !== "object") {
        return null;
      }

      const candidates = [
        obj.ma_kh,
        obj.makh,
        obj.customer_code,
        obj.custom_attributes && obj.custom_attributes.ma_kh,
        obj.custom_attributes && obj.custom_attributes.makh,
        obj.additional_attributes && obj.additional_attributes.ma_kh,
        obj.additional_attributes && obj.additional_attributes.makh
      ];

      for (const value of candidates) {
        const text = String(value || "").trim();
        if (text) {
          return text;
        }
      }

      return null;
    }

    function getCurrentAssignedMaKh() {
      const queryMaKh = getQueryParam("current_ma_kh") || getQueryParam("assigned_ma_kh");
      if (queryMaKh) {
        return String(queryMaKh).trim();
      }

      const ctx = chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null;
      const c = ctx && ctx.conversation ? ctx.conversation : null;

      const candidates = [
        ctx && ctx.contact,
        ctx && ctx.sender,
        c && c.sender,
        c && c.contact,
        c && c.meta && c.meta.sender,
        c && c.meta && c.meta.contact,
        ctx
      ];

      for (const item of candidates) {
        const maKh = readMaKhFromObject(item);
        if (maKh) {
          return maKh;
        }
      }

      if (chatwootContextRaw) {
        const rawMaKh =
          extractFirstMatch(chatwootContextRaw, /["']ma_kh["']\s*:\s*["']([^"']+)["']/i) ||
          extractFirstMatch(chatwootContextRaw, /["']makh["']\s*:\s*["']([^"']+)["']/i);

        if (rawMaKh) {
          return String(rawMaKh).trim();
        }
      }

      return null;
    }

    async function buildWebhookPayload(action, maKh, maNv, extra) {
      const data = extra || {};

      const contextConversationId = data.conversation_id || data.chatwoot_conversation_id
        ? String(data.conversation_id || data.chatwoot_conversation_id)
        : null;

      if (!contextConversationId) {
        await waitForChatwootContext();
      }

      const conversationId = contextConversationId || getCurrentConversationId();
      const contactId = data.chatwoot_contact_id || getCurrentContactId();

      return {
        action: action,
        ma_kh: maKh,
        ma_nv: normalizeNullableMaNv(maNv),
        conversation_id: conversationId ? String(conversationId) : null,
        chatwoot_conversation_id: conversationId ? String(conversationId) : null,
        chatwoot_contact_id: contactId ? String(contactId) : null,
        source: data.source || "",
        ...data
      };
    }

    async function sendCustomerWebhook(action, maKh, maNv, extra, options) {
      const opts = options || {};
      const payload = await buildWebhookPayload(action, maKh, maNv, extra || {});

      if (opts.requireConversation && !payload.conversation_id) {
        console.error("Thiếu conversation_id khi gửi webhook:", {
          payload: payload,
          chatwootContext: chatwootContext,
          iframe_url: window.location.href,
          referrer: document.referrer
        });

        throw new Error("Chưa lấy được ID hội thoại từ Chatwoot appContext.");
      }

      const webhookUrl = opts.webhookUrl || UPDATE_STAFF_WEBHOOK_URL;
      console.log("SEND WEBHOOK PAYLOAD:", payload, "URL:", webhookUrl);

      const resp = await fetch(webhookUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const text = await resp.text();
      let result = {};

      try {
        result = text ? JSON.parse(text) : {};
      } catch (error) {
        result = { raw: text };
      }

      if (!resp.ok) {
        throw new Error(result.message || text || "Webhook lỗi");
      }

      return {
        payload: payload,
        result: result
      };
    }

    function getWebhookDisplayMessage(result, fallbackMessage) {
      if (result && result.message) {
        return result.message;
      }

      const raw = result && result.raw ? String(result.raw).trim() : "";

      if (!raw || raw === "Workflow was started") {
        return fallbackMessage;
      }

      return raw;
    }

      if (row) {

    function normalizeConversationId(value) {
      const text = String(value ?? "").trim();
      return text ? text : null;
    }

    function makeAssignmentId(maKh, idNv) {
      const cleanMaKh = String(maKh || "").trim();
      const cleanIdNv = normalizeKiotStaffId(idNv);
      return cleanMaKh && cleanIdNv ? cleanMaKh + "_" + cleanIdNv : "";
    }

    async function findAssignmentsByConversationId(conversationId) {
      const cid = normalizeConversationId(conversationId);

      if (!cid) {
        await showAssignDebugStep("Không có conversation_id để kiểm tra.", "error", 900);
        return [];
      }

      if (!SUPABASE_REST_URL || !SUPABASE_REST_ANON) {
        await showAssignDebugStep("Thiếu cấu hình Supabase REST URL/ANON nên không thể kiểm tra trùng. Dừng gán.", "error", 1200);
        throw new Error("Thiếu SUPABASE_REST_URL hoặc SUPABASE_REST_ANON khi kiểm tra conversation_id.");
      }

      const url =
        SUPABASE_REST_URL.replace(/\/$/, "") +
        "/rest/v1/" +
        TABLE_KHACH_HANG_NHANVIEN +
        "?select=id,ma_kh,id_nv,conversation_id,chatwoot_contact_id,hoat_dong" +
        "&conversation_id=eq." +
        encodeURIComponent(cid) +
        "&limit=100";

      await showAssignDebugStep("Bắt đầu kiểm tra table kv_khachhang_nhanvien với conversation_id = " + cid, "ok", 900);

      console.log("HTTP CHECK TẤT CẢ DÒNG TRÙNG HỘP THOẠI kv_khachhang_nhanvien:", {
        conversation_id: cid,
        url: url
      });

      const resp = await fetch(url, {
        method: "GET",
        headers: {
          apikey: SUPABASE_REST_ANON,
          Authorization: "Bearer " + SUPABASE_REST_ANON,
          Accept: "application/json"
        }
      });

      const text = await resp.text();

      if (!resp.ok) {
        console.warn("HTTP check conversation_id lỗi:", resp.status, text);
        await showAssignDebugStep("HTTP check Supabase lỗi " + resp.status + ". Dừng gán để tránh trùng hộp thoại.", "error", 1500);
        throw new Error("HTTP check conversation_id lỗi: " + resp.status + " - " + text);
      }

      let rows = [];

      try {
        rows = text ? JSON.parse(text) : [];
      } catch (error) {
        console.warn("Không parse được kết quả HTTP check conversation_id:", text);
        await showAssignDebugStep("Không đọc được kết quả Supabase. Dừng gán để tránh trùng hộp thoại.", "error", 1500);
        throw new Error("Không parse được kết quả HTTP check conversation_id.");
      }

      await showAssignDebugStep("HTTP check trả về " + rows.length + " dòng có conversation_id này.", rows.length > 0 ? "error" : "ok", 1000);

      const activeRows = rows
        .filter(function (row) {
          return row && row.hoat_dong !== false;
        })
        .map(function (row) {
          const staff = getStaffByIdNv(row.id_nv);
          const assignmentId = row.id || makeAssignmentId(row.ma_kh, row.id_nv);

          return {
            id: assignmentId,
            ma_kh: row.ma_kh || "",
            id_nv: normalizeKiotStaffId(row.id_nv),
            ten_nv: row.ten_nv || (staff ? staff.ten_nv : String(row.id_nv || "")),
            conversation_id: normalizeConversationId(row.conversation_id),
            chatwoot_contact_id: row.chatwoot_contact_id || null,
            hoat_dong: row.hoat_dong,
            raw: row
          };
        });

      if (rows.length !== activeRows.length) {
        await showAssignDebugStep("Bỏ qua " + (rows.length - activeRows.length) + " dòng hoat_dong=false. Còn " + activeRows.length + " dòng active.", "ok", 900);
      }

      console.log("KẾT QUẢ HTTP CHECK TẤT CẢ DÒNG TRÙNG HỘP THOẠI:", {
        conversation_id: cid,
        so_dong: activeRows.length,
        rows: activeRows
      });

      return activeRows;
    }

    async function findAssignmentByConversationId(conversationId) {
      const rows = await findAssignmentsByConversationId(conversationId);
      return rows.length > 0 ? rows[0] : null;
    }

    async function findAssignmentByCustomerAndStaff(maKh, idNv) {
      const cleanMaKh = String(maKh || "").trim();
      const cleanIdNv = normalizeKiotStaffId(idNv);

      if (!cleanMaKh || !cleanIdNv || !supabaseClient) {
        return null;
      }

      try {
        const { data, error } = await supabaseClient
          .from(TABLE_KHACH_HANG_NHANVIEN)
          .select("id, ma_kh, id_nv, conversation_id, chatwoot_contact_id, hoat_dong")
          .eq("ma_kh", cleanMaKh)
          .eq("id_nv", cleanIdNv)
          .eq("hoat_dong", true)
          .limit(1);

        if (error) {
          console.warn("Không kiểm tra được ma_kh + id_nv trong kv_khachhang_nhanvien:", error);
          return null;
        }

        if (!data || data.length === 0) {
          return null;
        }

        const row = data[0];
        const staff = getStaffByIdNv(row.id_nv);

        return {
          id: row.id,
          ma_kh: row.ma_kh || "",
          id_nv: normalizeKiotStaffId(row.id_nv),
          ten_nv: staff ? staff.ten_nv : String(row.id_nv || ""),
          conversation_id: normalizeConversationId(row.conversation_id),
          chatwoot_contact_id: row.chatwoot_contact_id || null,
          hoat_dong: row.hoat_dong
        };
      } catch (error) {
        console.warn("Lỗi khi kiểm tra ma_kh + id_nv trong kv_khachhang_nhanvien:", error);
        return null;
      }
    }

    async function showAssignConfirm(message, title = "Xác nhận thay đổi") {

    function chooseStaffForAssignCustomer(customer, staffList, buttonEl) {
      return new Promise(function (resolve) {
        currentZaloChatRow = null;
        resetZaloAttachment();
        zaloChatText.value = "";

        zaloChatTitle.textContent = "Chọn nhân viên gán KH - " + (customer.ma_kh || "");
        zaloSenderInfo.classList.add("hidden");
        zaloSenderInfo.textContent = "";
        zaloChatPopover.classList.add("assign-staff-dropdown");

        zaloSenderChooser.innerHTML = `
          <div class="zalo-sender-chooser-title">Chọn nhân viên phụ trách hội thoại này:</div>
          <div class="zalo-sender-buttons">
            ${staffList.map(function (staff) {
              return `
                <button
                  type="button"
                  class="zalo-sender-btn"
                  data-id-nv="${escapeHtml(staff.id_nv)}"
                >${escapeHtml(staff.ten_nv || staff.id_nv)}</button>
              `;
            }).join("")}
          </div>
        `;

        setZaloChatMode("choose_sender");
        zaloChatPopover.classList.remove("hidden");
        positionZaloPopover(buttonEl);

        zaloSenderChooser.querySelectorAll(".zalo-sender-btn").forEach(function (btn) {
          btn.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();

            zaloSenderChooser.querySelectorAll(".zalo-sender-btn").forEach(function (otherBtn) {
              otherBtn.classList.remove("selected");
            });

            });

            if (!selectedStaff) {
              showNotice("Không tìm thấy nhân viên đã chọn.", "error", 2200);
              return;
            }

            setTimeout(function () {
              closeZaloChat();
              resolve(selectedStaff);
            }, 120);
          });
        });
      });
    }

    async function assignCustomerToChatwoot(maKh, buttonEl) {
      const row = getCustomerByMaKh(maKh) || { ma_kh: maKh };
      const staffList = buildAssignedStaffListForCustomer(row.ma_kh || maKh);

      if (staffList.length === 0) {
        showNotice("Khách này chưa được gán nhân viên phụ trách.", "error", 2600);
        return;
      }

      let selectedStaff = null;

      if (staffList.length === 1) {
        selectedStaff = staffList[0];
      } else {
        if (buttonEl) {
          buttonEl.textContent = "Chọn NV...";
        }

        selectedStaff = await chooseStaffForAssignCustomer(row, staffList, buttonEl);

        if (!selectedStaff) {
          if (buttonEl) {
            buttonEl.disabled = false;
            buttonEl.textContent = "Gán KH";
          }
          return;
        }
      }

      await runAssignCustomerToChatwoot(maKh, buttonEl, selectedStaff, staffList);
    }

    async function runAssignCustomerToChatwoot(maKh, buttonEl, selectedStaff, staffList) {
      const row = getCustomerByMaKh(maKh) || { ma_kh: maKh };
      const selectedIdNv = normalizeKiotStaffId(selectedStaff && selectedStaff.id_nv);
      const selectedTenNv = String((selectedStaff && (selectedStaff.ten_nv || selectedStaff.id_nv)) || "").trim();
      const selectedMaNv = String((selectedStaff && selectedStaff.ma_nv) || "").trim();

      const allIdNvList = Array.from(new Set((staffList || []).map(function (staff) {
        return normalizeKiotStaffId(staff.id_nv);
      }).filter(Boolean)));

      const allTenNvList = (staffList || []).map(function (staff) {
        return staff.ten_nv || staff.id_nv;
      }).filter(Boolean);

      // ma_nv/id_nv_list là toàn bộ nhân viên của khách.
      // selected_id_nv mới là nhân viên được chọn cho hộp thoại hiện tại.
      const maNv = allIdNvList;
      const newAssignmentId = makeAssignmentId(maKh, selectedIdNv);

      if (buttonEl) {
        buttonEl.disabled = true;
        buttonEl.textContent = "Đang gán...";
      }

      try {
        await waitForChatwootContext();

        const conversationId = normalizeConversationId(getCurrentConversationId());
        const contactId = getCurrentContactId();

        if (!conversationId) {
          throw new Error("Chưa lấy được conversation_id từ Chatwoot appContext.");
        }

        if (!selectedIdNv) {
          throw new Error("Chưa chọn được nhân viên phụ trách để gán KH.");
        }

        await showAssignDebugStep(
          "Đang gán ID mới: " + newAssignmentId + " / conversation_id: " + conversationId,
          "ok",
          1000
        );

        let action = "gan_makh";
        let oldConversationId = null;
        let oldMaKh = null;
        let oldIdNv = null;
        let existingAssignmentId = null;
        let selectedAssignmentId = null;
        let oldAssignmentId = null;
        let actionReason = "gan_hoi_thoai_moi";
        let conflictType = "";

        // Lớp chặn 1: kiểm tra đúng cặp ma_kh + id_nv trong kv_khachhang_nhanvien.
        // Nếu cặp này đã có chính conversation_id hiện tại thì coi là sửa chính dòng đó.
        // Nếu cặp này đang có conversation_id khác thì hỏi trước khi đổi hộp thoại cho cặp này.
        const selectedAssignment = await findAssignmentByCustomerAndStaff(maKh, selectedIdNv);

        if (selectedAssignment && selectedAssignment.conversation_id) {
          selectedAssignmentId = selectedAssignment.id || makeAssignmentId(maKh, selectedIdNv);

          if (normalizeConversationId(selectedAssignment.conversation_id) === conversationId) {
            action = "sua_gan_makh";
            actionReason = "sua_chinh_id_hien_tai";
          } else {
            const ok = await showAssignConfirm(
              `Mã KH <b>${escapeHtml(maKh)}</b> với nhân viên
               <b>${escapeHtml(selectedTenNv || selectedAssignment.ten_nv || selectedIdNv)}</b>
               đang có hộp thoại khác:
               <b>${escapeHtml(selectedAssignment.conversation_id)}</b>.<br><br>
               Bạn có muốn đổi sang hộp thoại hiện tại
               <b>${escapeHtml(conversationId)}</b> không?`,
              "Cặp KH + nhân viên đã có hộp thoại"
            );

            if (!ok) {
              if (buttonEl) {
                buttonEl.disabled = false;
                buttonEl.textContent = staffList && staffList.length > 1 ? "Chọn NV... ▾" : "Gán KH";
              }
              return;
            }

            action = "sua_gan_makh";
            actionReason = "sua_hoi_thoai_cua_chinh_id";
            conflictType = "ma_kh_id_nv_da_co_hoi_thoai_khac";
            oldConversationId = selectedAssignment.conversation_id;
            oldAssignmentId = selectedAssignmentId;
          }
        }

        // Lớp chặn 2: kiểm tra TẤT CẢ dòng đang dùng conversation_id hiện tại.
        // Không được lấy 1 dòng đầu tiên, vì 1 conversation_id có thể đang bị trùng nhiều dòng.
        // Nếu có bất kỳ dòng nào có id khác newAssignmentId => hội thoại đã gán cho cặp KH + NV khác.
        const existingAssignments = await findAssignmentsByConversationId(conversationId);

        if (existingAssignments.length > 0) {
          await showAssignDebugStep(
            "Tìm thấy hộp thoại " + conversationId + " trong bảng. Danh sách ID: " +
              existingAssignments.map(function (item) {
                return item.id || makeAssignmentId(item.ma_kh, item.id_nv);
              }).join(", "),
            "error",
            1500
          );
        } else {
          await showAssignDebugStep("Không tìm thấy hộp thoại này trong bảng. Có thể gán mới.", "ok", 900);
        }

        const conflictRows = existingAssignments.filter(function (item) {
          const oldId = String(item.id || makeAssignmentId(item.ma_kh, item.id_nv) || "").trim();
          return oldId && oldId !== newAssignmentId;
        });

        if (conflictRows.length > 0) {
          await showAssignDebugStep(
            "Tìm thấy ID khác new_id. new_id = " + newAssignmentId +
              " / ID khác = " + conflictRows.map(function (item) {
                return item.id || makeAssignmentId(item.ma_kh, item.id_nv);
              }).join(", "),
            "error",
            1800
          );
        } else if (existingAssignments.length > 0) {
          await showAssignDebugStep("Có hộp thoại nhưng tất cả ID đều giống new_id. Đây là sửa chính dòng hiện tại.", "ok", 1200);
        }

        console.log("SO SÁNH TẤT CẢ ID ĐANG DÙNG HỘP THOẠI:", {
          conversation_id: conversationId,
          new_id: newAssignmentId,
          total_rows: existingAssignments.length,
          conflict_rows: conflictRows
        });

        if (conflictRows.length > 0) {
          const conflict = conflictRows[0];
          const existingMaKh = String(conflict.ma_kh || "").trim();
          const existingIdNv = normalizeKiotStaffId(conflict.id_nv);
          const existingTenNv = String(conflict.ten_nv || existingIdNv || "").trim();
          const existingId = conflict.id || makeAssignmentId(existingMaKh, existingIdNv);

          const conflictListHtml = conflictRows.slice(0, 5).map(function (row) {
            const rowId = row.id || makeAssignmentId(row.ma_kh, row.id_nv);
            return `• <b>${escapeHtml(rowId || "Không rõ")}</b> — ${escapeHtml(row.ma_kh || "")}/${escapeHtml(row.ten_nv || row.id_nv || "")}`;
          }).join("<br>");

          await showAssignDebugStep("Chuẩn bị mở popup xác nhận vì hộp thoại bị trùng với ID khác.", "error", 900);

          const ok = await showAssignConfirm(
            `Cuộc hội thoại <b>${escapeHtml(conversationId)}</b> đã được gán cho dòng khác rồi.<br><br>
             Dòng đang giữ hội thoại:<br>
             ${conflictListHtml}<br><br>
             Bạn có muốn chuyển sang:<br>
             ID mới: <b>${escapeHtml(newAssignmentId)}</b><br>
             Mã KH: <b>${escapeHtml(maKh)}</b><br>
             Nhân viên: <b>${escapeHtml(selectedTenNv || selectedIdNv)}</b> không?`,
            "Hội thoại đã được gán"
          );

          if (!ok) {
            if (buttonEl) {
              buttonEl.disabled = false;
              buttonEl.textContent = staffList && staffList.length > 1 ? "Chọn NV... ▾" : "Gán KH";
            }
            await showAssignDebugStep("Anh bấm Cancel: dừng code, không gửi webhook.", "error", 1000);
            return;
          }

          await showAssignDebugStep("Anh bấm OK: đi tiếp với action sửa gán mã KH.", "ok", 1000);

          action = "sua_gan_makh";
          actionReason = "sua_hoi_thoai_da_co";
          conflictType = "conversation_id_da_gan_cho_id_khac";
          oldMaKh = existingMaKh || null;
          oldIdNv = existingIdNv || null;
          oldAssignmentId = existingId || null;
          existingAssignmentId = existingId || null;
        } else if (existingAssignments.length > 0) {
          // Có conversation_id nhưng tất cả dòng đều là chính newAssignmentId => đang sửa chính dòng đó.
          action = "sua_gan_makh";
          actionReason = "sua_chinh_id_hien_tai";
          existingAssignmentId = existingAssignments[0].id || newAssignmentId;
        }

        await showAssignDebugStep("Chuẩn bị gửi webhook với action = " + action, "ok", 900);

        const response = await sendCustomerWebhook(
          action,
          maKh,
          maNv,
          {
            source: "assign_customer_button",
            conversation_id: conversationId,
            chatwoot_conversation_id: conversationId,
            chatwoot_contact_id: contactId,
            old_conversation_id: oldConversationId,
            old_ma_kh: oldMaKh,
            old_id_nv: oldIdNv,
            selected_assignment_id: selectedAssignmentId,
            existing_assignment_id: existingAssignmentId,
            checked_table: TABLE_KHACH_HANG_NHANVIEN,
            checked_existing_ma_kh: oldMaKh,
            old_assignment_id: oldAssignmentId,
            new_assignment_id: newAssignmentId,
            action_reason: actionReason,
            conflict_type: conflictType,

            // Danh sách toàn bộ nhân viên phụ trách khách hàng.
            ma_nv: allIdNvList,
            id_nv_list: allIdNvList,
            ma_nv_list: allIdNvList,
            ten_nv_list: allTenNvList,

            // Nhân viên được chọn làm đại diện cho lần gán hội thoại này.
            selected_id_nv: selectedIdNv,
            selected_ma_nv: selectedMaNv,
            selected_ten_nv: selectedTenNv
          },
          { requireConversation: true, webhookUrl: UPDATE_CHATWOOT_WEBHOOK_URL }
        );

        const result = response && response.result ? response.result : {};

        // Cập nhật lại dữ liệu trên dòng hiện tại để Zalo chat dùng được ngay sau khi gán.
        markAssignButtonDone(buttonEl, row, conversationId, contactId);

        showNotice(
          getWebhookDisplayMessage(
            result,
            action === "sua_gan_makh"
              ? "Đã gửi yêu cầu sửa gán KH: " + maKh + " / NV: " + selectedTenNv
              : "Đã gửi yêu cầu gán KH: " + maKh + " / NV: " + selectedTenNv
          )
        );
      } catch (error) {
        console.error("Lỗi gán KH:", error);

        if (buttonEl) {
          buttonEl.disabled = false;
          buttonEl.textContent = "Gán KH";
        }

        showNotice("Lỗi gán KH: " + (error.message || JSON.stringify(error)), "error", 3500);
      }
    }

    function showConfirmAssignModal(data) {

    async function confirmChangeAssignMaKh() {
      if (!pendingConfirmAssign) {
        return;
      }

      if (pendingConfirmAssign.confirmOnly) {
        const resolve = pendingConfirmAssign.resolve;
        pendingConfirmAssign = null;
        confirmAssignModal.classList.add("hidden");
        confirmAssignOkBtn.disabled = false;
        confirmAssignOkBtn.textContent = "Đồng ý thay đổi";
        confirmAssignCancelBtn.textContent = "Hủy";

        if (resolve) {
          resolve(true);
        }
        return;
      }

      confirmAssignOkBtn.disabled = true;
      confirmAssignOkBtn.textContent = "Đang đổi...";

      try {
        const response = await sendCustomerWebhook(
          "sua_gan_makh",
          pendingConfirmAssign.new_ma_kh,
          pendingConfirmAssign.ma_nv,
          {
            confirm: true,
            old_ma_kh: pendingConfirmAssign.old_ma_kh,
            conversation_id: pendingConfirmAssign.conversation_id,
            chatwoot_conversation_id: pendingConfirmAssign.chatwoot_conversation_id,
            chatwoot_contact_id: pendingConfirmAssign.chatwoot_contact_id,
            source: "confirm_change_assign"
          },
          { requireConversation: true, webhookUrl: UPDATE_CHATWOOT_WEBHOOK_URL }
        );

        const assignedRow = getCustomerByMaKh(pendingConfirmAssign.new_ma_kh);
        markAssignButtonDone(
          pendingConfirmAssign.buttonEl,
          assignedRow,
          pendingConfirmAssign.conversation_id || pendingConfirmAssign.chatwoot_conversation_id,
          pendingConfirmAssign.chatwoot_contact_id
        );

        const result = response && response.result ? response.result : {};
        showNotice(getWebhookDisplayMessage(result, "Đã gửi yêu cầu đổi mã KH sang " + pendingConfirmAssign.new_ma_kh));
        closeConfirmAssignModal();
      } catch (error) {
        console.error("Lỗi đổi mã KH:", error);
        showNotice("Lỗi đổi mã KH: " + (error.message || JSON.stringify(error)), "error", 3500);
      } finally {
        confirmAssignOkBtn.disabled = false;
        confirmAssignOkBtn.textContent = "Đồng ý thay đổi";
      }
    }

      const rect = buttonEl && buttonEl.getBoundingClientRect
        ? buttonEl.getBoundingClientRect()
        : { left: 12, bottom: 12 };

      const left = Math.min(rect.left, window.innerWidth - 340);
      const top = Math.min(rect.bottom + 8, window.innerHeight - 220);

      zaloChatPopover.style.left = Math.max(8, left) + "px";
      zaloChatPopover.style.top = Math.max(8, top) + "px";
    }

    function setZaloChatMode(mode) {
      const attachRow = document.querySelector(".zalo-attach-row");
      const actionsRow = document.querySelector(".zalo-chat-actions");

      if (mode === "choose_sender") {
        zaloChatText.classList.add("hidden");
        if (attachRow) attachRow.classList.add("hidden");
        if (actionsRow) actionsRow.classList.add("hidden");
        zaloSenderInfo.classList.add("hidden");
        zaloSenderChooser.classList.remove("hidden");
        return;
      }

      zaloChatText.classList.remove("hidden");
      if (attachRow) attachRow.classList.remove("hidden");
      if (actionsRow) actionsRow.classList.remove("hidden");

    function openZaloChat(maKh, buttonEl) {
      const customer = getCustomerByMaKh(maKh);

      if (!customer || !customer.conversation_id) {
        showNotice("Khách này chưa có hội thoại Zalo.", "error", 2200);
        return;
      }

      const staffList = getCustomerStaffRows(customer.ma_kh || maKh)
        .map(function (staff) {
          return {
            id_nv: normalizeKiotStaffId(staff.id_nv),
            ma_nv: String(staff.ma_nv || "").trim(),
            ten_nv: String(staff.ten_nv || staff.id_nv || "").trim()
          };
        })
        .filter(function (staff) {
          return staff.id_nv !== "";
        });

      if (staffList.length === 0) {
        showNotice("Khách này chưa được gán nhân viên phụ trách.", "error", 2600);
        return;
      }

      if (staffList.length === 1) {
        openZaloChatWithSender(customer, staffList, staffList[0], buttonEl);
        return;
      }

      openZaloSenderChooser(customer, staffList, buttonEl);
    }

    function resetZaloAttachment() {
      if (zaloAttachmentPreviewUrl) {
        URL.revokeObjectURL(zaloAttachmentPreviewUrl);
        zaloAttachmentPreviewUrl = "";
      }

      if (zaloAttachmentInput) {
        zaloAttachmentInput.value = "";
      }

      if (zaloAttachmentName) {
        zaloAttachmentName.textContent = "";
      }

      if (zaloAttachmentPreview) {
        zaloAttachmentPreview.innerHTML = "";
      }

      if (zaloAttachmentRemoveBtn) {
        zaloAttachmentRemoveBtn.classList.add("hidden");
      }
    }

    function handleZaloAttachmentChanged() {
      const file = zaloAttachmentInput && zaloAttachmentInput.files
        ? zaloAttachmentInput.files[0]
        : null;

      if (!file) {
        resetZaloAttachment();
        return;
      }

      const maxSizeMb = 50;
      const maxBytes = maxSizeMb * 1024 * 1024;

      if (file.size > maxBytes) {
        showNotice("File quá lớn. Tạm giới hạn " + maxSizeMb + "MB.", "error", 3000);
        resetZaloAttachment();
        return;
      }

      if (zaloAttachmentName) {
        zaloAttachmentName.textContent = file.name;
      }

      if (zaloAttachmentRemoveBtn) {
        zaloAttachmentRemoveBtn.classList.remove("hidden");
      }

      if (zaloAttachmentPreviewUrl) {
        URL.revokeObjectURL(zaloAttachmentPreviewUrl);
      }

      zaloAttachmentPreviewUrl = URL.createObjectURL(file);

      if (file.type.startsWith("image/")) {
        zaloAttachmentPreview.innerHTML = `
          <img src="${zaloAttachmentPreviewUrl}" alt="Ảnh đã chọn">
        `;
        return;
      }

      if (file.type.startsWith("video/")) {
        zaloAttachmentPreview.innerHTML = `
          <video src="${zaloAttachmentPreviewUrl}" controls></video>
        `;
        return;
      }

      zaloAttachmentPreview.innerHTML = `
        <div class="zalo-file-preview">
          📎 ${escapeHtml(file.name)}
        </div>
      `;
    }

    async function sendZaloChatMessage() {
      if (!currentZaloChatRow) {
        return;
      }

      if (!currentZaloChatRow.selected_id_nv) {
        showNotice("Chưa chọn nhân viên/hộp thư gửi.", "error", 2200);
        return;
      }

      const message = zaloChatText.value.trim();
      const file = zaloAttachmentInput && zaloAttachmentInput.files
        ? zaloAttachmentInput.files[0]
        : null;

      if (!message && !file) {
        showNotice("Chưa nhập nội dung hoặc chọn file.", "error", 1800);
        return;
      }

      zaloChatSendBtn.disabled = true;
      zaloChatSendBtn.textContent = "Đang gửi...";

      try {
        const formData = new FormData();

        formData.append("action", "zalo_chat");
        formData.append("source", "zalo_chat_button");
        formData.append("ma_kh", currentZaloChatRow.ma_kh || "");
        formData.append("ten_kh", currentZaloChatRow.ten_kh || "");
        formData.append("sdt", currentZaloChatRow.sdt || "");
        formData.append("conversation_id", currentZaloChatRow.conversation_id || "");
        formData.append("chatwoot_conversation_id", currentZaloChatRow.conversation_id || "");
        formData.append("chatwoot_contact_id", currentZaloChatRow.chatwoot_contact_id || "");
        formData.append("message", message || "");

        // ma_nv tạm thời là mảng ID nhân viên KiotViet đang phụ trách khách.
        formData.append("ma_nv", JSON.stringify(currentZaloChatRow.ma_nv || []));
        formData.append("id_nv_list", JSON.stringify(currentZaloChatRow.id_nv_list || currentZaloChatRow.ma_nv || []));
        formData.append("ten_nv_list", JSON.stringify(currentZaloChatRow.ten_nv_list || []));

        // Nhân viên/hộp thư được chọn để gửi tin.
        formData.append("selected_id_nv", currentZaloChatRow.selected_id_nv || "");
        formData.append("selected_ma_nv", currentZaloChatRow.selected_ma_nv || "");
        formData.append("selected_ten_nv", currentZaloChatRow.selected_ten_nv || "");

        if (file) {
          formData.append("attachment", file, file.name);
          formData.append("attachment_name", file.name);
          formData.append("attachment_type", file.type || "");
          formData.append("attachment_size", String(file.size || 0));

          if (file.type.startsWith("image/")) {
            formData.append("attachment_kind", "image");
          } else if (file.type.startsWith("video/")) {
            formData.append("attachment_kind", "video");
          } else {
            formData.append("attachment_kind", "file");
          }
        } else {
          formData.append("attachment_kind", "text");
        }

        const resp = await fetch(ZALO_CHAT_WEBHOOK_URL, {
          method: "POST",
          body: formData
        });

        const text = await resp.text();
        let result = {};

        try {
          result = text ? JSON.parse(text) : {};
        } catch (error) {
          result = { raw: text };
        }

        if (!resp.ok) {
          throw new Error(result.message || text || "Webhook lỗi");
        }

        console.log("ĐÃ GỬI WEBHOOK ZALO CHAT:", {
          ma_kh: currentZaloChatRow.ma_kh,
          ma_nv: currentZaloChatRow.ma_nv,
          selected_id_nv: currentZaloChatRow.selected_id_nv,
          selected_ten_nv: currentZaloChatRow.selected_ten_nv
        });

        showNotice(getWebhookDisplayMessage(result, "Đã gửi Zalo chat cho " + currentZaloChatRow.ma_kh));
        closeZaloChat();
      } catch (error) {
        console.error("Lỗi gửi Zalo chat:", error);
        showNotice("Lỗi gửi Zalo chat: " + (error.message || JSON.stringify(error)), "error", 3500);
      } finally {
        zaloChatSendBtn.disabled = false;
        zaloChatSendBtn.textContent = "Gửi";
      }
    }

    async function initSupabase() {
      try {
        popupCfgNote.textContent = "Đang lấy cấu hình Supabase...";

        let supabaseUrl = "";
        let supabaseAnon = "";

        try {
          const resp = await fetch("/api/getConfig", {
            headers: {
              "x-internal-key": window.getInternalKey ? window.getInternalKey() : ""
            }
          });

          if (resp.ok) {
            const cfg = await resp.json();
            supabaseUrl = cfg.url || "";
            supabaseAnon = cfg.anon || cfg.key || "";
          }
        } catch (error) {
          console.warn("Không gọi được /api/getConfig trực tiếp:", error);
        }

        if ((!supabaseUrl || !supabaseAnon) && window.configReady) {
          await window.configReady;

          if (typeof window.getConfig === "function") {
            const urlValue = window.getConfig("url");
            const anonValue = window.getConfig("anon");

            if (typeof urlValue === "string") {
              supabaseUrl = supabaseUrl || urlValue;
            }

            if (typeof anonValue === "string") {
              supabaseAnon = supabaseAnon || anonValue;
            }
          }
        }

        if (!supabaseUrl || !supabaseAnon) {
          popupCfgNote.textContent = "Thiếu cấu hình Supabase";
          popupLoginMessage.textContent = "Chưa lấy được Supabase URL hoặc anon key.";
          return;
        }

        SUPABASE_REST_URL = supabaseUrl;
        SUPABASE_REST_ANON = supabaseAnon;

        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnon);

        popupCfgNote.textContent = "Sẵn sàng đăng nhập";
        popupLoginMessage.textContent = "";
      } catch (error) {
        console.error("Lỗi initSupabase:", error);
        popupCfgNote.textContent = "Lỗi cấu hình Supabase";
        popupLoginMessage.textContent = error.message || "Không lấy được cấu hình.";
      }
    }


    function normalizeKiotStaffId(value) {
      if (value === null || value === undefined) {
        return "";
      }

      if (typeof value === "number") {
        if (!Number.isFinite(value)) {
          return "";
        }

        if (Number.isInteger(value)) {
          return String(value);
        }

        return String(value).trim().replace(/\.0$/, "");
      }

      return String(value || "").trim().replace(/\.0$/, "");
    }

    async function loadStaffFromSupabase() {
      if (!supabaseClient) {
        return;
      }

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, id_nv, ten_nv")
        .not("id_nv", "is", null)
        .not("ma_nv", "is", null)
        .order("ten_nv", { ascending: true });

      if (error) {
        console.error("Lỗi tải nhân viên:", error);

        if (typeof showNotice === "function") {
          showNotice("Lỗi tải nhân viên: " + (error.message || JSON.stringify(error)), "error", 3500);
        }

        return;
      }

      staffRows = (data || [])
        .map(function (item) {
          const maNv = String(item.ma_nv || "").trim();
          const idNv = normalizeKiotStaffId(item.id_nv);

          return {
            // ma_nv là mã đăng nhập / mã nội bộ để lưu vào kv_khachhang.ma_nv.
            ma_nv: maNv,

            // id_nv là ID nhân viên KiotViet, chỉ dùng để lọc và gửi kèm webhook.
            id_nv: idNv,

            ten_nv: String(item.ten_nv || maNv || idNv || "").trim()
          };
        })
        .filter(function (item) {
          // Chỉ hiện nhân viên đã có cả mã đăng nhập ma_nv và ID KiotViet id_nv.
          return item.ma_nv !== "" && item.id_nv !== "";
        });

      renderStaffDropdown();

      if (customers.length > 0) {
        renderCustomers();
      }
    }
