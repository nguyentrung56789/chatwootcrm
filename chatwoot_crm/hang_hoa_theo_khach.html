<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hàng hóa theo khách</title>

  <link rel="stylesheet" href="./css/hang_hoa_theo_khach.css" />

  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>
</head>

<body>
  <div class="app">
    <main class="content">
      <div class="topbar">
        <div class="title-line">
          <b>hàng hóa</b>
          <span id="statusText">đang khởi tạo...</span>
        </div>

        <div class="topbar-actions">
          <input id="searchInput" type="search" placeholder="tìm hàng..." />
          <button id="reloadBtn" type="button" class="reload-btn">↻ làm mới</button>
        </div>
      </div>

      <div id="messageBox" class="message hidden"></div>

      <div id="tableWrap" class="table-wrap hidden">
        <table id="dataTable">
          <colgroup>
            <col data-col="ma_hang" style="width: 130px;" />
            <col data-col="ten_hang" style="width: 300px;" />
            <col data-col="so_luong" style="width: 130px;" />
          </colgroup>

          <thead>
            <tr>
              <th class="sortable resizable" data-sort="ma_hang">
                <div class="th-inner">
                  <span class="th-title">mã hàng</span>
                  <span class="sort-icon"></span>
                  <span class="col-resizer" data-col="ma_hang"></span>
                </div>
              </th>

              <th class="sortable resizable" data-sort="ten_hang">
                <div class="th-inner">
                  <span class="th-title">tên hàng</span>
                  <span class="sort-icon"></span>
                  <span class="col-resizer" data-col="ten_hang"></span>
                </div>
              </th>

              <th class="sortable resizable right" data-sort="so_luong">
                <div class="th-inner">
                  <span class="th-title">số lượng</span>
                  <span class="sort-icon"></span>
                  <span class="col-resizer" data-col="so_luong"></span>
                </div>
              </th>
            </tr>
          </thead>

          <tbody id="detailBody"></tbody>
        </table>
      </div>

      <div id="footerInfo" class="footer hidden"></div>
    </main>
  </div>

  <script src="./js/hang_hoa_theo_khach_no_login.js"></script>
</body>
</html>
