<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hàng hóa đã mua</title>

  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>
  <script src="./js/auth_token.js"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    .app {
      width: 100%;
      height: 100vh;
      padding: 4px;
      background: #f3f4f6;
      overflow: hidden;
    }

    .content {
      width: 100%;
      height: calc(100vh - 8px);
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
      min-height: 30px;
    }

    .customer-summary {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .title {
      font-size: 14px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
      line-height: 1.1;
    }

    .status {
      font-size: 12px;
      color: #4b5563;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.1;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }



    .search-input {
      width: min(260px, 28vw);
      height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      padding: 0 9px;
      font-size: 12px;
      color: #111827;
      outline: none;
      background: #ffffff;
    }

    .search-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    th.sortable:hover {
      background: #eef2ff;
    }

    .sort-icon {
      display: inline-block;
      min-width: 12px;
      margin-left: 4px;
      color: #2563eb;
      font-size: 11px;
    }

    .reload-btn,
    .logout-btn {
      height: 28px;
      border: none;
      border-radius: 7px;
      color: #ffffff;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .reload-btn {
      background: #2563eb;
    }

    .reload-btn:hover {
      background: #1d4ed8;
    }

    .logout-btn {
      background: #ef4444;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .reload-btn:disabled,
    .logout-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      flex: 0 0 auto;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #374151;
      font-size: 12px;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .message.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .message.ok {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #166534;
    }

    .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
      font-size: 13px;
      background: #ffffff;
    }

    th, td {
      padding: 7px 9px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #f9fafb;
      font-weight: 800;
      color: #111827;
    }

    tr:hover td {
      background: #f9fafb;
    }

    .right { text-align: right; }

    .footer {
      flex: 0 0 auto;
      margin-top: 5px;
      font-size: 11px;
      color: #6b7280;
    }

    .login-popup {
      position: fixed;
      inset: 0;
      background: rgba(7, 16, 37, 0.72);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-modal {
      width: min(380px, 92vw);
      background: #0f1830;
      color: #e6edff;
      border-radius: 16px;
      padding: 26px 22px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .login-modal h2 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.2;
    }

    .login-modal input,
    .login-modal button {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      font-size: 15px;
    }

    .login-modal input {
      margin: 6px 0;
      border: 1px solid #233043;
      background: #071526;
      color: #e6edff;
      outline: none;
    }

    .login-modal input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.15);
    }

    #popupLoginBtn {
      margin-top: 10px;
      border: 0;
      background: #2dd4bf;
      color: #042023;
      font-weight: 700;
      cursor: pointer;
    }

    #popupLoginBtn:hover {
      background: #5eead4;
    }

    #popupLoginBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-message {
      min-height: 18px;
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 14px;
    }

    .login-note {
      margin-top: 8px;
      color: #9aa7c7;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      .app { padding: 3px; }

      .content {
        height: calc(100vh - 6px);
        padding: 5px;
        border-radius: 8px;
      }

      .title { font-size: 13px; }

      .customer-summary {
        gap: 6px;
      }

      .status {
        font-size: 11px;
      }

      .search-input {
        width: 150px;
        height: 30px;
        font-size: 12px;
      }

      .reload-btn,
      .logout-btn {
        height: 30px;
        padding: 0 9px;
        font-size: 12px;
      }

      table {
        min-width: 560px;
        font-size: 12px;
      }

      th, td { padding: 7px; }
    }
  </style>
</head>

<body>
  <div id="loginPopup" class="login-popup hidden">
    <div class="login-modal">
      <h2>🔐 Đăng nhập</h2>

      <input id="popupMaNvInput" type="text" placeholder="Mã nhân viên hoặc số điện thoại" autocomplete="username" />
      <input id="popupMatKhauInput" type="password" placeholder="Mật khẩu" autocomplete="current-password" />

      <button id="popupLoginBtn" type="button">Đăng nhập</button>

      <div class="login-message" id="popupLoginMessage"></div>
      <div class="login-note" id="popupCfgNote">Đang khởi tạo cấu hình...</div>
    </div>
  </div>

  <div class="app">
    <main class="content">
      <div class="header">
        <div class="customer-summary">
          <span class="title">Hàng hóa</span>
          <span id="statusText" class="status">Đang khởi tạo...</span>
        </div>

        <div class="header-actions">
          <input id="searchInput" type="text" class="search-input" placeholder="Tìm hàng..." />
          <button id="reloadBtn" type="button" class="reload-btn">↻ Làm mới</button>
          <button id="logoutBtn" type="button" class="logout-btn">Đăng xuất</button>
        </div>
      </div>

      <div id="messageBox" class="message">
        Đang kiểm tra dữ liệu...
      </div>

      <div id="tableWrap" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th class="sortable" data-sort="ma_hang">Mã hàng <span class="sort-icon"></span></th>
              <th class="sortable" data-sort="ten_hang">Tên hàng <span class="sort-icon"></span></th>
              <th class="sortable right" data-sort="so_luong">Tổng số lượng <span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>

      <div id="footerInfo" class="footer hidden"></div>
    </main>
  </div>

  <script>
    const LOGIN_STORAGE_KEY = "chatwoot_crm_user";
    const VIEW_HANG_HOA_THEO_KHACH = "sql_hanghoa_theokhach";
    const TABLE_NHAN_VIEN = getConfiguredTableName("index", "kv_nhan_vien");
    const MAX_ROWS = 500;
    const CHATWOOT_FETCH_INFO_EVENT = "chatwoot-dashboard-app:fetch-info";

    let currentUser = getLoginUser();
    let supabaseClient = null;
    let SUPABASE_REST_URL = "";
    let SUPABASE_REST_ANON = "";

    let chatwootContext = null;
    let chatwootContextRaw = "";
    let chatwootContextReadyResolvers = [];
    let allHangHoaRows = [];
    let currentMakh = "";
    let searchKeyword = "";
    let sortField = "so_luong";
    let sortDirection = "desc";

    const loginPopup = document.getElementById("loginPopup");
    const popupMaNvInput = document.getElementById("popupMaNvInput");
    const popupMatKhauInput = document.getElementById("popupMatKhauInput");
    const popupLoginBtn = document.getElementById("popupLoginBtn");
    const popupLoginMessage = document.getElementById("popupLoginMessage");
    const popupCfgNote = document.getElementById("popupCfgNote");

    const searchInput = document.getElementById("searchInput");
    const reloadBtn = document.getElementById("reloadBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusText = document.getElementById("statusText");
    const messageBox = document.getElementById("messageBox");
    const tableWrap = document.getElementById("tableWrap");
    const detailBody = document.getElementById("detailBody");
    const footerInfo = document.getElementById("footerInfo");

    window.addEventListener("message", handleChatwootMessage);

    reloadBtn.addEventListener("click", function () {
      loadByMakh();
    });

    searchInput.addEventListener("input", function () {
      searchKeyword = searchInput.value.trim().toLowerCase();
      renderCurrentRows();
    });

    document.querySelectorAll("th.sortable").forEach(function (th) {
      th.addEventListener("click", function () {
        const field = th.dataset.sort;
        if (!field) return;

        if (sortField === field) {
          sortDirection = sortDirection === "asc" ? "desc" : "asc";
        } else {
          sortField = field;
          sortDirection = field === "so_luong" ? "desc" : "asc";
        }

        renderCurrentRows();
      });
    });

    logoutBtn.addEventListener("click", function () {
      localStorage.removeItem(LOGIN_STORAGE_KEY);
      currentUser = null;
      clearData();
      openLoginPopup();
    });

    popupLoginBtn.addEventListener("click", loginFromPopup);

    popupMatKhauInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        loginFromPopup();
      }
    });

    init();

    async function init() {
      await initSupabase();

      requestChatwootContext();
      setTimeout(requestChatwootContext, 300);
      setTimeout(requestChatwootContext, 900);
      setTimeout(requestChatwootContext, 1600);

      if (!supabaseClient) {
        statusText.textContent = "Lỗi cấu hình";
        hideTable("Chưa lấy được Supabase URL hoặc anon key.", true);
        openLoginPopup();
        return;
      }

      if (!currentUser) {
        statusText.textContent = "Chưa đăng nhập";
        hideTable("Vui lòng đăng nhập để xem hàng hóa đã mua.", false);
        openLoginPopup();
        return;
      }

      closeLoginPopup();
      await loadByMakh();
    }

    function getConfiguredTableName(configName, fallbackTable) {
      try {
        if (typeof window.getConfig === "function") {
          const cfg = window.getConfig(configName);
          if (cfg && typeof cfg === "object" && cfg.table) {
            return cfg.table;
          }
        }
      } catch (error) {
        console.warn("Không lấy được cấu hình bảng:", configName, error);
      }

      return fallbackTable;
    }

    async function initSupabase() {
      try {
        popupCfgNote.textContent = "Đang lấy cấu hình Supabase.";

        let supabaseUrl = "";
        let supabaseAnon = "";

        try {
          const resp = await fetch("/api/getConfig", {
            headers: {
              "x-internal-key": window.getInternalKey ? window.getInternalKey() : ""
            }
          });

          if (resp.ok) {
            const cfg = await resp.json();
            supabaseUrl = cfg.url || "";
            supabaseAnon = cfg.anon || cfg.key || "";
          }
        } catch (error) {
          console.warn("Không gọi được /api/getConfig trực tiếp:", error);
        }

        if ((!supabaseUrl || !supabaseAnon) && window.configReady) {
          await window.configReady;

          if (typeof window.getConfig === "function") {
            const urlValue = window.getConfig("url");
            const anonValue = window.getConfig("anon");

            if (typeof urlValue === "string") {
              supabaseUrl = supabaseUrl || urlValue;
            }

            if (typeof anonValue === "string") {
              supabaseAnon = supabaseAnon || anonValue;
            }
          }
        }

        if (!supabaseUrl || !supabaseAnon) {
          popupCfgNote.textContent = "Thiếu cấu hình Supabase";
          popupLoginMessage.textContent = "Chưa lấy được Supabase URL hoặc anon key.";
          return;
        }

        SUPABASE_REST_URL = supabaseUrl;
        SUPABASE_REST_ANON = supabaseAnon;
        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnon);

        popupCfgNote.textContent = "Sẵn sàng đăng nhập";
        popupLoginMessage.textContent = "";
      } catch (error) {
        console.error("Lỗi initSupabase:", error);
        popupCfgNote.textContent = "Lỗi cấu hình Supabase";
        popupLoginMessage.textContent = error.message || "Không lấy được cấu hình.";
      }
    }

    async function loginFromPopup() {
      const maNv = popupMaNvInput.value.trim();
      const matKhau = popupMatKhauInput.value.trim();

      popupLoginMessage.textContent = "";

      if (!maNv || !matKhau) {
        popupLoginMessage.textContent = "Vui lòng nhập mã nhân viên và mật khẩu.";
        return;
      }

      if (!supabaseClient) {
        popupLoginMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      popupLoginBtn.disabled = true;
      popupLoginBtn.textContent = "Đang đăng nhập...";

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, mat_khau, ten_nv, dien_thoai, hoat_dong, admin")
        .or(`ma_nv.eq.${escapeSupabaseOrValue(maNv)},dien_thoai.eq.${escapeSupabaseOrValue(maNv)}`)
        .eq("mat_khau", matKhau)
        .maybeSingle();

      popupLoginBtn.disabled = false;
      popupLoginBtn.textContent = "Đăng nhập";

      if (error) {
        console.error("Lỗi đăng nhập:", error);
        popupLoginMessage.textContent = "Lỗi kiểm tra đăng nhập.";
        return;
      }

      if (!data) {
        popupLoginMessage.textContent = "Sai mã nhân viên hoặc mật khẩu.";
        return;
      }

      if (data.hoat_dong === false) {
        popupLoginMessage.textContent = "Tài khoản đã bị khóa.";
        return;
      }

      currentUser = {
        ma_nv: data.ma_nv,
        ten_nv: data.ten_nv,
        admin: data.admin === true,
        login_at: new Date().toISOString()
      };

      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(currentUser));

      popupMaNvInput.value = "";
      popupMatKhauInput.value = "";
      popupLoginMessage.textContent = "";

      closeLoginPopup();
      await loadByMakh();
    }

    async function loadByMakh() {
      if (!currentUser) {
        statusText.textContent = "Chưa đăng nhập";
        hideTable("Vui lòng đăng nhập để xem hàng hóa đã mua.", false);
        openLoginPopup();
        return;
      }

      setLoading(true);

      try {
        let makh =
          getQueryParam("makh") ||
          getQueryParam("ma_kh") ||
          getQueryParam("ma_khach_hang");

        if (!makh) {
          await waitForChatwootContext(1800);
          makh = getMakhFromChatwootContext();
        }

        if (!makh) {
          statusText.textContent = "Thiếu makh";
          hideTable("Không lấy được mã khách hàng từ URL hoặc Chatwoot custom_attributes.", false);
          return;
        }

        statusText.textContent = "Mã khách: " + makh;
        await loadHangHoaTheoKhach(makh);
      } catch (error) {
        statusText.textContent = "Lỗi tải dữ liệu";
        hideTable("Lỗi tải dữ liệu: " + getErrorMessage(error), true);
      } finally {
        setLoading(false);
      }
    }

    async function loadHangHoaTheoKhach(makh) {
      const { data, error } = await supabaseClient
        .from(VIEW_HANG_HOA_THEO_KHACH)
        .select("ma_hang, ten_hang, so_luong")
        .eq("makh", makh)
        .order("so_luong", { ascending: false })
        .limit(MAX_ROWS);

      if (error) {
        throw error;
      }

      allHangHoaRows = data || [];
      currentMakh = makh;
      renderCurrentRows();
    }

    function renderCurrentRows() {
      const rows = getFilteredAndSortedRows();
      renderHangHoa(rows, currentMakh, allHangHoaRows.length);
    }

    function getFilteredAndSortedRows() {
      const keyword = String(searchKeyword || "").trim().toLowerCase();

      let rows = allHangHoaRows.slice();

      if (keyword) {
        rows = rows.filter(function (item) {
          return String(item.ma_hang || "").toLowerCase().includes(keyword) ||
            String(item.ten_hang || "").toLowerCase().includes(keyword);
        });
      }

      rows.sort(function (a, b) {
        let va = a[sortField];
        let vb = b[sortField];

        if (sortField === "so_luong") {
          va = Number(va || 0);
          vb = Number(vb || 0);
        } else {
          va = String(va || "").toLowerCase();
          vb = String(vb || "").toLowerCase();
        }

        if (va < vb) return sortDirection === "asc" ? -1 : 1;
        if (va > vb) return sortDirection === "asc" ? 1 : -1;
        return 0;
      });

      updateSortIcons();
      return rows;
    }

    function updateSortIcons() {
      document.querySelectorAll("th.sortable").forEach(function (th) {
        const icon = th.querySelector(".sort-icon");
        if (!icon) return;
        icon.textContent = th.dataset.sort === sortField
          ? (sortDirection === "asc" ? "▲" : "▼")
          : "";
      });
    }

    function renderHangHoa(rows, makh, totalBeforeFilter) {
      if (!allHangHoaRows.length) {
        hideTable("Không tìm thấy hàng hóa đã mua của mã khách: " + makh, false);
        return;
      }

      if (!rows.length) {
        detailBody.innerHTML = `
          <tr>
            <td colspan="3">Không có mặt hàng khớp với từ khóa tìm kiếm.</td>
          </tr>
        `;
        tableWrap.classList.remove("hidden");
        footerInfo.classList.remove("hidden");
        footerInfo.textContent = "0 / " + totalBeforeFilter + " mặt hàng";
        statusText.textContent = "KH: " + makh + " · 0 / " + totalBeforeFilter + " mặt hàng";
        return;
      }

      detailBody.innerHTML = rows.map(function (item) {
        return `
          <tr>
            <td>${escapeHtml(item.ma_hang)}</td>
            <td>${escapeHtml(item.ten_hang)}</td>
            <td class="right">${escapeHtml(formatNumber(item.so_luong))}</td>
          </tr>
        `;
      }).join("");

      messageBox.className = "message ok hidden";
      messageBox.textContent = "";

      const totalText = searchKeyword
        ? rows.length + " / " + totalBeforeFilter + " mặt hàng"
        : rows.length + " mặt hàng";

      statusText.textContent = "KH: " + makh + " · " + totalText;

      tableWrap.classList.remove("hidden");
      footerInfo.classList.remove("hidden");
      footerInfo.textContent = totalText;
    }

    function clearData() {
      allHangHoaRows = [];
      currentMakh = "";
      searchKeyword = "";
      if (searchInput) searchInput.value = "";
      detailBody.innerHTML = "";
      tableWrap.classList.add("hidden");
      footerInfo.classList.add("hidden");
      footerInfo.textContent = "";
      statusText.textContent = "Chưa đăng nhập";
      messageBox.className = "message";
      messageBox.classList.remove("hidden");
      messageBox.textContent = "Vui lòng đăng nhập để xem hàng hóa đã mua.";
    }

    function hideTable(message, isError) {
      detailBody.innerHTML = "";
      tableWrap.classList.add("hidden");
      footerInfo.classList.add("hidden");
      footerInfo.textContent = "";

      messageBox.className = isError ? "message error" : "message";
      messageBox.classList.remove("hidden");
      messageBox.textContent = message || "";
    }

    function setLoading(isLoading) {
      reloadBtn.disabled = isLoading;
      reloadBtn.textContent = isLoading ? "Đang tải..." : "↻ Làm mới";
    }

    function openLoginPopup() {
      loginPopup.classList.remove("hidden");
      setTimeout(function () {
        popupMaNvInput.focus();
      }, 100);
    }

    function closeLoginPopup() {
      loginPopup.classList.add("hidden");
    }

    function getLoginUser() {
      try {
        const raw = localStorage.getItem(LOGIN_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function getQueryParam(name) {
      const value = new URLSearchParams(window.location.search).get(name);

      if (!value || String(value).includes("{{")) {
        return "";
      }

      return String(value).trim();
    }

    function getMakhFromChatwootContext() {
      const ctx = window.__CHATWOOT_APP_CONTEXT__ || chatwootContext || null;
      const c = ctx && ctx.conversation ? ctx.conversation : null;

      const candidates = [
        ctx && ctx.contact && ctx.contact.custom_attributes,
        ctx && ctx.sender && ctx.sender.custom_attributes,

        c && c.sender && c.sender.custom_attributes,
        c && c.contact && c.contact.custom_attributes,

        c && c.meta && c.meta.sender && c.meta.sender.custom_attributes,
        c && c.meta && c.meta.contact && c.meta.contact.custom_attributes,

        ctx && ctx.conversation && ctx.conversation.sender && ctx.conversation.sender.custom_attributes,
        ctx && ctx.conversation && ctx.conversation.contact && ctx.conversation.contact.custom_attributes
      ];

      for (const attrs of candidates) {
        if (!attrs || typeof attrs !== "object") {
          continue;
        }

        const makh =
          attrs.makh ||
          attrs.ma_kh ||
          attrs.maKH ||
          attrs.ma_khach_hang ||
          attrs["mã khách hàng"] ||
          attrs["ma khach hang"] ||
          attrs.customer_code ||
          "";

        if (String(makh).trim()) {
          return String(makh).trim();
        }
      }

      if (chatwootContextRaw) {
        const rawMakh =
          extractFirstMatch(chatwootContextRaw, /["']makh["']\s*:\s*["']([^"']+)["']/i) ||
          extractFirstMatch(chatwootContextRaw, /["']ma_kh["']\s*:\s*["']([^"']+)["']/i) ||
          extractFirstMatch(chatwootContextRaw, /["']ma_khach_hang["']\s*:\s*["']([^"']+)["']/i) ||
          extractFirstMatch(chatwootContextRaw, /["']mã khách hàng["']\s*:\s*["']([^"']+)["']/i);

        if (rawMakh) {
          return String(rawMakh).trim();
        }
      }

      return "";
    }

    function handleChatwootMessage(event) {
      chatwootContextRaw = getRawText(event.data);
      window.__CHATWOOT_APP_CONTEXT_RAW__ = chatwootContextRaw;

      const context = extractChatwootContextFromMessage(event.data);

      if (context) {
        chatwootContext = context;
        window.__CHATWOOT_APP_CONTEXT__ = context;
      }

      resolveWaitingChatwootContext();
    }

    function extractChatwootContextFromMessage(rawData) {
      const payload = tryParseJson(rawData);

      if (!payload || typeof payload !== "object") {
        return null;
      }

      if (payload.event === "appContext") {
        return payload.data || null;
      }

      if (payload.data && payload.data.event === "appContext") {
        return payload.data.data || null;
      }

      if (payload.conversation && typeof payload.conversation === "object") {
        return payload;
      }

      if (payload.data && payload.data.conversation && typeof payload.data.conversation === "object") {
        return payload.data;
      }

      return null;
    }

    function requestChatwootContext() {
      try {
        window.parent.postMessage(CHATWOOT_FETCH_INFO_EVENT, "*");
      } catch (error) {
        console.warn("Không gửi được yêu cầu lấy Chatwoot context:", error);
      }
    }

    function waitForChatwootContext(timeoutMs) {
      if (chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || chatwootContextRaw) {
        return Promise.resolve(chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null);
      }

      requestChatwootContext();

      return new Promise(function (resolve) {
        const timer = setTimeout(function () {
          resolve(chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null);
        }, timeoutMs || 1500);

        chatwootContextReadyResolvers.push(function (context) {
          clearTimeout(timer);
          resolve(context || null);
        });
      });
    }

    function resolveWaitingChatwootContext() {
      const resolvers = chatwootContextReadyResolvers;
      chatwootContextReadyResolvers = [];

      resolvers.forEach(function (resolve) {
        resolve(chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null);
      });
    }

    function tryParseJson(value) {
      if (typeof value !== "string") {
        return value;
      }

      let current = value;

      for (let i = 0; i < 4; i++) {
        if (typeof current !== "string") {
          return current;
        }

        const text = current.trim();

        if (!text || (!text.startsWith("{") && !text.startsWith("["))) {
          return value;
        }

        try {
          current = JSON.parse(text);
        } catch (error) {
          return value;
        }
      }

      return current;
    }

    function getRawText(value) {
      if (typeof value === "string") {
        return value;
      }

      try {
        return JSON.stringify(value || {});
      } catch (error) {
        return "";
      }
    }

    function extractFirstMatch(text, regex) {
      const match = String(text || "").match(regex);
      return match && match[1] ? String(match[1]) : null;
    }

    function escapeSupabaseOrValue(value) {
      return String(value || "").replaceAll(",", "\\,").replaceAll(")", "\\)").replaceAll("(", "\\(");
    }

    function formatNumber(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toLocaleString("vi-VN") : "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getErrorMessage(error) {
      if (!error) {
        return "Không rõ lỗi";
      }

      if (error.message) {
        return error.message;
      }

      try {
        return JSON.stringify(error);
      } catch (e) {
        return String(error);
      }
    }
  </script>
</body>
