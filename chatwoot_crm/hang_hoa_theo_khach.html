<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chi tiết đơn hàng</title>

  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: 100%;
      height: 100vh;
      padding: 8px;
      background: #f3f4f6;
      overflow: hidden;
    }

    .content {
      width: 100%;
      height: calc(100vh - 16px);
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }

    .status {
      margin-top: 2px;
      font-size: 13px;
      color: #374151;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reload-btn {
      height: 32px;
      border: none;
      border-radius: 7px;
      background: #2563eb;
      color: #ffffff;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .reload-btn:hover {
      background: #1d4ed8;
    }

    .reload-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      flex: 0 0 auto;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .message.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .message.ok {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #166534;
    }

    .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    table {
      width: max-content;
      min-width: 900px;
      border-collapse: collapse;
      font-size: 13px;
      background: #ffffff;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #f9fafb;
      font-weight: 800;
      color: #111827;
    }

    tr:hover td {
      background: #f9fafb;
    }

    .right {
      text-align: right;
    }

    .footer {
      flex: 0 0 auto;
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      .app {
        padding: 5px;
      }

      .content {
        height: calc(100vh - 10px);
        padding: 7px;
        border-radius: 8px;
      }

      .title {
        font-size: 14px;
      }

      .reload-btn {
        height: 30px;
        padding: 0 9px;
        font-size: 12px;
      }

      table {
        min-width: 780px;
        font-size: 12px;
      }

      th,
      td {
        padding: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <main class="content">
      <div class="header">
        <div>
          <div class="title">Chi tiết đơn hàng</div>
          <div id="statusText" class="status">Đang lấy mã khách từ Chatwoot...</div>
        </div>

        <button id="reloadBtn" type="button" class="reload-btn">↻ Làm mới</button>
      </div>

      <div id="messageBox" class="message">
        Đang kiểm tra custom_attributes.makh...
      </div>

      <div id="tableWrap" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>Mã HĐ</th>
              <th>Ngày</th>
              <th>Mã hàng</th>
              <th>Tên hàng</th>
              <th class="right">Số lượng</th>
              <th class="right">Đơn giá</th>
              <th class="right">Thành tiền</th>
            </tr>
          </thead>

          <tbody id="detailBody"></tbody>
        </table>
      </div>

      <div id="footerInfo" class="footer hidden"></div>
    </main>
  </div>

  <script>
    const TABLE_DON_HANG = "don_hang";
    const TABLE_CHI_TIET = "don_hang_chitiet";

    const CHATWOOT_FETCH_INFO_EVENT = "chatwoot-dashboard-app:fetch-info";

    let supabaseClient = null;
    let chatwootContext = null;
    let chatwootContextRaw = "";
    let chatwootContextReadyResolvers = [];

    const reloadBtn = document.getElementById("reloadBtn");
    const statusText = document.getElementById("statusText");
    const messageBox = document.getElementById("messageBox");
    const tableWrap = document.getElementById("tableWrap");
    const detailBody = document.getElementById("detailBody");
    const footerInfo = document.getElementById("footerInfo");

    window.addEventListener("message", handleChatwootMessage);

    reloadBtn.addEventListener("click", function () {
      loadByChatwootMakh();
    });

    init();

    async function init() {
      try {
        await initSupabaseClient();

        requestChatwootContext();
        setTimeout(requestChatwootContext, 300);
        setTimeout(requestChatwootContext, 900);
        setTimeout(requestChatwootContext, 1600);
        setTimeout(requestChatwootContext, 2600);

        await loadByChatwootMakh();
      } catch (error) {
        statusText.textContent = "Lỗi khởi tạo";
        hideTable("Lỗi khởi tạo: " + getErrorMessage(error), true);
      }
    }

    async function initSupabaseClient() {
      let supabaseUrl = "";
      let supabaseAnon = "";

      try {
        const resp = await fetch("/api/getConfig", {
          headers: {
            "x-internal-key": window.getInternalKey ? window.getInternalKey() : ""
          }
        });

        if (resp.ok) {
          const cfg = await resp.json();
          supabaseUrl = cfg.url || "";
          supabaseAnon = cfg.anon || cfg.key || "";
        }
      } catch (error) {
        console.warn("Không gọi được /api/getConfig trực tiếp:", error);
      }

      if ((!supabaseUrl || !supabaseAnon) && window.configReady) {
        await window.configReady;

        if (typeof window.getConfig === "function") {
          const urlValue = window.getConfig("url");
          const anonValue = window.getConfig("anon");

          if (typeof urlValue === "string") {
            supabaseUrl = supabaseUrl || urlValue;
          }

          if (typeof anonValue === "string") {
            supabaseAnon = supabaseAnon || anonValue;
          }
        }
      }

      if (!supabaseUrl || !supabaseAnon) {
        throw new Error("Chưa lấy được Supabase URL hoặc anon key từ /api/getConfig hoặc config.js");
      }

      supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnon);
    }

    async function loadByChatwootMakh() {
      setLoading(true);

      try {
        await waitForChatwootContext(3000);

        const makh = getMakhFromChatwootContext();

        if (!makh) {
          statusText.textContent = "Không có makh";
          hideTable("Contact Chatwoot chưa có custom_attributes.makh. Bảng đang được ẩn.", false);
          return;
        }

        statusText.textContent = "Mã khách: " + makh;

        await loadDetailsByMakh(makh);
      } catch (error) {
        statusText.textContent = "Lỗi tải dữ liệu";
        hideTable("Lỗi tải dữ liệu: " + getErrorMessage(error), true);
      } finally {
        setLoading(false);
      }
    }

    async function loadDetailsByMakh(makh) {
      /*
        don_hang_chitiet không có makh.
        Vì vậy phải:
        1) Lọc don_hang theo ma_kh = makh để lấy ma_hd.
        2) Lấy don_hang_chitiet theo danh sách ma_hd đó.
      */

      const orders = await fetchAllRows(function (from, to) {
        return supabaseClient
          .from(TABLE_DON_HANG)
          .select("ma_hd, ngay")
          .eq("ma_kh", makh)
          .not("ma_hd", "is", null)
          .order("ngay", { ascending: false })
          .range(from, to);
      });

      const orderRows = orders || [];

      const maHdList = [...new Set(
        orderRows
          .map(function (item) {
            return String(item.ma_hd || "").trim();
          })
          .filter(Boolean)
      )];

      if (maHdList.length === 0) {
        hideTable("Không tìm thấy hóa đơn nào của mã khách: " + makh, false);
        return;
      }

      const ngayMap = {};

      orderRows.forEach(function (item) {
        const maHd = String(item.ma_hd || "").trim();

        if (maHd && !ngayMap[maHd]) {
          ngayMap[maHd] = item.ngay || null;
        }
      });

      const allDetails = [];
      const chunks = chunkArray(maHdList, 150);

      for (const chunk of chunks) {
        const details = await fetchAllRows(function (from, to) {
          return supabaseClient
            .from(TABLE_CHI_TIET)
            .select("ma_hd, ma_h, ten_h, so_luong, don_gia, thanh_tien")
            .in("ma_hd", chunk)
            .order("ma_hd", { ascending: false })
            .range(from, to);
        });

        allDetails.push(...details);
      }

      allDetails.forEach(function (item) {
        const maHd = String(item.ma_hd || "").trim();
        item.ngay = ngayMap[maHd] || null;
      });

      allDetails.sort(function (a, b) {
        const ta = a.ngay ? new Date(a.ngay).getTime() : 0;
        const tb = b.ngay ? new Date(b.ngay).getTime() : 0;

        if (tb !== ta) {
          return tb - ta;
        }

        return String(b.ma_hd || "").localeCompare(String(a.ma_hd || ""));
      });

      renderDetails(allDetails, makh, maHdList.length);
    }

    async function fetchAllRows(queryBuilderFn) {
      const pageSize = 1000;
      let from = 0;
      let allRows = [];

      while (true) {
        const to = from + pageSize - 1;
        const { data, error } = await queryBuilderFn(from, to);

        if (error) {
          throw error;
        }

        const rows = data || [];
        allRows = allRows.concat(rows);

        if (rows.length < pageSize) {
          break;
        }

        from += pageSize;
      }

      return allRows;
    }

    function renderDetails(rows, makh, orderCount) {
      if (!rows.length) {
        hideTable("Có hóa đơn của mã khách " + makh + " nhưng chưa có dòng chi tiết.", false);
        return;
      }

      detailBody.innerHTML = rows.map(function (item) {
        return `
          <tr>
            <td>${escapeHtml(item.ma_hd)}</td>
            <td>${escapeHtml(formatDateTime(item.ngay))}</td>
            <td>${escapeHtml(item.ma_h)}</td>
            <td>${escapeHtml(item.ten_h)}</td>
            <td class="right">${escapeHtml(formatNumber(item.so_luong))}</td>
            <td class="right">${escapeHtml(formatMoney(item.don_gia))}</td>
            <td class="right">${escapeHtml(formatMoney(item.thanh_tien))}</td>
          </tr>
        `;
      }).join("");

      messageBox.className = "message ok";
      messageBox.textContent = "Đã lọc theo custom_attributes.makh = " + makh;

      tableWrap.classList.remove("hidden");
      footerInfo.classList.remove("hidden");
      footerInfo.textContent =
        "Tìm thấy " + rows.length + " dòng chi tiết từ " + orderCount + " hóa đơn.";
    }

    function hideTable(message, isError) {
      detailBody.innerHTML = "";
      tableWrap.classList.add("hidden");
      footerInfo.classList.add("hidden");
      footerInfo.textContent = "";

      messageBox.className = isError ? "message error" : "message";
      messageBox.textContent = message || "";
    }

    function setLoading(isLoading) {
      reloadBtn.disabled = isLoading;
      reloadBtn.textContent = isLoading ? "Đang tải..." : "↻ Làm mới";
    }

    function getMakhFromChatwootContext() {
      const ctx = window.__CHATWOOT_APP_CONTEXT__ || chatwootContext || null;
      const c = ctx && ctx.conversation ? ctx.conversation : null;

      const candidates = [
        ctx && ctx.contact && ctx.contact.custom_attributes,
        ctx && ctx.sender && ctx.sender.custom_attributes,

        c && c.sender && c.sender.custom_attributes,
        c && c.contact && c.contact.custom_attributes,

        c && c.meta && c.meta.sender && c.meta.sender.custom_attributes,
        c && c.meta && c.meta.contact && c.meta.contact.custom_attributes,

        ctx && ctx.conversation && ctx.conversation.sender && ctx.conversation.sender.custom_attributes,
        ctx && ctx.conversation && ctx.conversation.contact && ctx.conversation.contact.custom_attributes
      ];

      for (const attrs of candidates) {
        if (!attrs || typeof attrs !== "object") {
          continue;
        }

        const makh =
          attrs.makh ||
          attrs.ma_kh ||
          attrs.maKH ||
          attrs.customer_code ||
          "";

        if (String(makh).trim()) {
          return String(makh).trim();
        }
      }

      if (chatwootContextRaw) {
        const rawMakh =
          extractFirstMatch(chatwootContextRaw, /["']makh["']\s*:\s*["']([^"']+)["']/i) ||
          extractFirstMatch(chatwootContextRaw, /["']ma_kh["']\s*:\s*["']([^"']+)["']/i);

        if (rawMakh) {
          return String(rawMakh).trim();
        }
      }

      return "";
    }

    function handleChatwootMessage(event) {
      chatwootContextRaw = getRawText(event.data);
      window.__CHATWOOT_APP_CONTEXT_RAW__ = chatwootContextRaw;

      const context = extractChatwootContextFromMessage(event.data);

      if (!context) {
        resolveWaitingChatwootContext();
        return;
      }

      chatwootContext = context;
      window.__CHATWOOT_APP_CONTEXT__ = context;

      resolveWaitingChatwootContext();
    }

    function extractChatwootContextFromMessage(rawData) {
      const payload = tryParseJson(rawData);

      if (!payload || typeof payload !== "object") {
        return null;
      }

      if (payload.event === "appContext") {
        return payload.data || null;
      }

      if (payload.data && payload.data.event === "appContext") {
        return payload.data.data || null;
      }

      if (payload.conversation && typeof payload.conversation === "object") {
        return payload;
      }

      if (payload.data && payload.data.conversation && typeof payload.data.conversation === "object") {
        return payload.data;
      }

      return null;
    }

    function requestChatwootContext() {
      try {
        window.parent.postMessage(CHATWOOT_FETCH_INFO_EVENT, "*");
      } catch (error) {
        console.warn("Không gửi được yêu cầu lấy Chatwoot context:", error);
      }
    }

    function waitForChatwootContext(timeoutMs) {
      if (chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || chatwootContextRaw) {
        return Promise.resolve(chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null);
      }

      requestChatwootContext();

      return new Promise(function (resolve) {
        const timer = setTimeout(function () {
          resolve(chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null);
        }, timeoutMs || 2000);

        chatwootContextReadyResolvers.push(function (context) {
          clearTimeout(timer);
          resolve(context || null);
        });
      });
    }

    function resolveWaitingChatwootContext() {
      const resolvers = chatwootContextReadyResolvers;
      chatwootContextReadyResolvers = [];

      resolvers.forEach(function (resolve) {
        resolve(chatwootContext || window.__CHATWOOT_APP_CONTEXT__ || null);
      });
    }

    function tryParseJson(value) {
      if (typeof value !== "string") {
        return value;
      }

      let current = value;

      for (let i = 0; i < 4; i++) {
        if (typeof current !== "string") {
          return current;
        }

        const text = current.trim();

        if (!text || (!text.startsWith("{") && !text.startsWith("["))) {
          return value;
        }

        try {
          current = JSON.parse(text);
        } catch (error) {
          return value;
        }
      }

      return current;
    }

    function getRawText(value) {
      if (typeof value === "string") {
        return value;
      }

      try {
        return JSON.stringify(value || {});
      } catch (error) {
        return "";
      }
    }

    function extractFirstMatch(text, regex) {
      const match = String(text || "").match(regex);
      return match && match[1] ? String(match[1]) : null;
    }

    function chunkArray(array, size) {
      const result = [];

      for (let i = 0; i < array.length; i += size) {
        result.push(array.slice(i, i + size));
      }

      return result;
    }

    function formatDateTime(value) {
      if (!value) {
        return "";
      }

      const d = new Date(value);

      if (isNaN(d.getTime())) {
        return "";
      }

      return d.toLocaleString("vi-VN", {
        day: "2-digit",
        month: "2-digit",
        year: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatNumber(value) {
      const number = Number(value || 0);

      return Number.isFinite(number)
        ? number.toLocaleString("vi-VN")
        : "";
    }

    function formatMoney(value) {
      const number = Number(value || 0);

      return Number.isFinite(number)
        ? number.toLocaleString("vi-VN")
        : "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getErrorMessage(error) {
      if (!error) {
        return "Không rõ lỗi";
      }

      if (error.message) {
        return error.message;
      }

      try {
        return JSON.stringify(error);
      } catch (e) {
        return String(error);
      }
    }
  </script>
</body>
</html>
