<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hàng hóa đã mua</title>

  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/cod_config.js"></script>
  <script src="./js/auth_token.js"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    .app {
      width: 100%;
      height: 100vh;
      padding: 8px;
      background: #f3f4f6;
      overflow: hidden;
    }

    .content {
      width: 100%;
      height: calc(100vh - 16px);
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }

    .status {
      margin-top: 2px;
      font-size: 13px;
      color: #374151;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .reload-btn,
    .logout-btn {
      height: 32px;
      border: none;
      border-radius: 7px;
      color: #ffffff;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .reload-btn {
      background: #2563eb;
    }

    .reload-btn:hover {
      background: #1d4ed8;
    }

    .logout-btn {
      background: #ef4444;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .reload-btn:disabled,
    .logout-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      flex: 0 0 auto;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .message.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .message.ok {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #166534;
    }

    .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 650px;
      border-collapse: collapse;
      font-size: 13px;
      background: #ffffff;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #f9fafb;
      font-weight: 800;
      color: #111827;
    }

    tr:hover td {
      background: #f9fafb;
    }

    .right {
      text-align: right;
    }

    .footer {
      flex: 0 0 auto;
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    .login-popup {
      position: fixed;
      inset: 0;
      background: rgba(7, 16, 37, 0.72);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-modal {
      width: min(380px, 92vw);
      background: #0f1830;
      color: #e6edff;
      border-radius: 16px;
      padding: 26px 22px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .login-modal h2 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.2;
    }

    .login-modal input,
    .login-modal button {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      font-size: 15px;
    }

    .login-modal input {
      margin: 6px 0;
      border: 1px solid #233043;
      background: #071526;
      color: #e6edff;
      outline: none;
    }

    .login-modal input:focus {
      border-color: #2dd4bf;
      box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.15);
    }

    #popupLoginBtn {
      margin-top: 10px;
      border: 0;
      background: #2dd4bf;
      color: #042023;
      font-weight: 700;
      cursor: pointer;
    }

    #popupLoginBtn:hover {
      background: #5eead4;
    }

    #popupLoginBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-message {
      min-height: 18px;
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 14px;
    }

    .login-note {
      margin-top: 8px;
      color: #9aa7c7;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      .app { padding: 5px; }

      .content {
        height: calc(100vh - 10px);
        padding: 7px;
        border-radius: 8px;
      }

      .title { font-size: 14px; }

      .reload-btn,
      .logout-btn {
        height: 30px;
        padding: 0 9px;
        font-size: 12px;
      }

      table {
        min-width: 560px;
        font-size: 12px;
      }

      th, td { padding: 6px; }
    }
  </style>
</head>

<body>
  <div id="loginPopup" class="login-popup hidden">
    <div class="login-modal">
      <h2>🔐 Đăng nhập</h2>

      <input id="popupMaNvInput" type="text" placeholder="Mã nhân viên / số điện thoại" autocomplete="username" />
      <input id="popupMatKhauInput" type="password" placeholder="Mật khẩu" autocomplete="current-password" />

      <button id="popupLoginBtn">Đăng nhập</button>

      <div class="login-message" id="popupLoginMessage"></div>
      <div class="login-note" id="popupCfgNote">Đang khởi tạo cấu hình...</div>
    </div>
  </div>

  <div class="app">
    <main class="content">
      <div class="header">
        <div>
          <div class="title">Hàng hóa đã mua</div>
          <div id="statusText" class="status">Đang khởi tạo...</div>
        </div>

        <div class="header-actions">
          <button id="reloadBtn" type="button" class="reload-btn">↻ Làm mới</button>
          <button id="logoutBtn" type="button" class="logout-btn">Đăng xuất</button>
        </div>
      </div>

      <div id="messageBox" class="message">
        Vui lòng đăng nhập để xem dữ liệu.
      </div>

      <div id="tableWrap" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>Mã hàng</th>
              <th>Tên hàng</th>
              <th class="right">Tổng số lượng</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>

      <div id="footerInfo" class="footer hidden"></div>
    </main>
  </div>

  <script>
    const LOGIN_STORAGE_KEY = "chatwoot_crm_user";
    const TABLE_NHAN_VIEN = getConfiguredTableName("index", "kv_nhan_vien");
    const VIEW_HANGHOA_THEO_KHACH = "sql_hanghoa_theokhach";
    const MAX_ROWS = 500;

    let currentUser = getLoginUser();
    let supabaseClient = null;
    let SUPABASE_REST_URL = "";
    let SUPABASE_REST_ANON = "";

    const loginPopup = document.getElementById("loginPopup");
    const popupMaNvInput = document.getElementById("popupMaNvInput");
    const popupMatKhauInput = document.getElementById("popupMatKhauInput");
    const popupLoginBtn = document.getElementById("popupLoginBtn");
    const popupLoginMessage = document.getElementById("popupLoginMessage");
    const popupCfgNote = document.getElementById("popupCfgNote");

    const reloadBtn = document.getElementById("reloadBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusText = document.getElementById("statusText");
    const messageBox = document.getElementById("messageBox");
    const tableWrap = document.getElementById("tableWrap");
    const detailBody = document.getElementById("detailBody");
    const footerInfo = document.getElementById("footerInfo");

    popupLoginBtn.addEventListener("click", loginFromPopup);

    popupMatKhauInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        loginFromPopup();
      }
    });

    reloadBtn.addEventListener("click", function () {
      if (!currentUser) {
        openLoginPopup();
        return;
      }

      loadByMakh();
    });

    logoutBtn.addEventListener("click", function () {
      localStorage.removeItem(LOGIN_STORAGE_KEY);
      currentUser = null;
      detailBody.innerHTML = "";
      tableWrap.classList.add("hidden");
      footerInfo.classList.add("hidden");
      footerInfo.textContent = "";
      statusText.textContent = "Chưa đăng nhập";
      messageBox.className = "message";
      messageBox.textContent = "Vui lòng đăng nhập để xem dữ liệu.";
      openLoginPopup();
    });

    init();

    async function init() {
      await initSupabase();

      if (!supabaseClient) {
        statusText.textContent = "Lỗi cấu hình";
        hideTable("Lỗi khởi tạo: Chưa lấy được Supabase URL hoặc anon key từ /api/getConfig hoặc config.js", true);
        openLoginPopup();
        return;
      }

      if (!currentUser) {
        statusText.textContent = "Chưa đăng nhập";
        hideTable("Vui lòng đăng nhập để xem dữ liệu.", false);
        openLoginPopup();
        return;
      }

      closeLoginPopup();
      showUserInfo();
      await loadByMakh();
    }

    async function initSupabase() {
      try {
        popupCfgNote.textContent = "Đang lấy cấu hình Supabase.";

        let supabaseUrl = "";
        let supabaseAnon = "";

        try {
          const resp = await fetch("/api/getConfig", {
            headers: {
              "x-internal-key": window.getInternalKey ? window.getInternalKey() : ""
            }
          });

          if (resp.ok) {
            const cfg = await resp.json();
            supabaseUrl = cfg.url || "";
            supabaseAnon = cfg.anon || cfg.key || "";
          }
        } catch (error) {
          console.warn("Không gọi được /api/getConfig trực tiếp:", error);
        }

        if ((!supabaseUrl || !supabaseAnon) && window.configReady) {
          await window.configReady;

          if (typeof window.getConfig === "function") {
            const urlValue = window.getConfig("url");
            const anonValue = window.getConfig("anon");

            if (typeof urlValue === "string") {
              supabaseUrl = supabaseUrl || urlValue;
            }

            if (typeof anonValue === "string") {
              supabaseAnon = supabaseAnon || anonValue;
            }
          }
        }

        if (!supabaseUrl || !supabaseAnon) {
          popupCfgNote.textContent = "Thiếu cấu hình Supabase";
          popupLoginMessage.textContent = "Chưa lấy được Supabase URL hoặc anon key.";
          return;
        }

        SUPABASE_REST_URL = supabaseUrl;
        SUPABASE_REST_ANON = supabaseAnon;

        supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnon);

        popupCfgNote.textContent = "Sẵn sàng đăng nhập";
        popupLoginMessage.textContent = "";
      } catch (error) {
        console.error("Lỗi initSupabase:", error);
        popupCfgNote.textContent = "Lỗi cấu hình Supabase";
        popupLoginMessage.textContent = error.message || "Không lấy được cấu hình.";
      }
    }

    async function loginFromPopup() {
      const maNv = popupMaNvInput.value.trim();
      const matKhau = popupMatKhauInput.value.trim();

      popupLoginMessage.textContent = "";

      if (!maNv || !matKhau) {
        popupLoginMessage.textContent = "Vui lòng nhập mã nhân viên và mật khẩu.";
        return;
      }

      if (!supabaseClient) {
        popupLoginMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      popupLoginBtn.disabled = true;
      popupLoginBtn.textContent = "Đang đăng nhập...";

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, mat_khau, ten_nv, dien_thoai, hoat_dong, admin")
        .or(`ma_nv.eq.${escapePostgrestValue(maNv)},dien_thoai.eq.${escapePostgrestValue(maNv)}`)
        .eq("mat_khau", matKhau)
        .maybeSingle();

      popupLoginBtn.disabled = false;
      popupLoginBtn.textContent = "Đăng nhập";

      if (error) {
        console.error("Lỗi đăng nhập:", error);
        popupLoginMessage.textContent = "Lỗi kiểm tra đăng nhập.";
        return;
      }

      if (!data) {
        popupLoginMessage.textContent = "Sai mã nhân viên hoặc mật khẩu.";
        return;
      }

      if (data.hoat_dong === false) {
        popupLoginMessage.textContent = "Tài khoản đã bị khóa.";
        return;
      }

      currentUser = {
        ma_nv: data.ma_nv,
        ten_nv: data.ten_nv,
        admin: data.admin === true,
        login_at: new Date().toISOString()
      };

      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(currentUser));

      popupMaNvInput.value = "";
      popupMatKhauInput.value = "";
      popupLoginMessage.textContent = "";

      closeLoginPopup();
      showUserInfo();
      await loadByMakh();
    }

    async function loadByMakh() {
      setLoading(true);

      try {
        const makh = getQueryParam("makh") || getQueryParam("ma_kh");

        if (!makh) {
          statusText.textContent = "Thiếu makh";
          hideTable("Link chưa truyền makh. Cần dùng: hang_hoa_theo_khach.html?makh={{contact.custom_attributes.makh}}", false);
          return;
        }

        statusText.textContent = "Mã khách: " + makh;

        await loadHangHoaByMakh(makh);
      } catch (error) {
        statusText.textContent = "Lỗi tải dữ liệu";
        hideTable("Lỗi tải dữ liệu: " + getErrorMessage(error), true);
      } finally {
        setLoading(false);
      }
    }

    async function loadHangHoaByMakh(makh) {
      const { data, error } = await supabaseClient
        .from(VIEW_HANGHOA_THEO_KHACH)
        .select("ma_hang, ten_hang, so_luong")
        .eq("makh", makh)
        .order("so_luong", { ascending: false })
        .limit(MAX_ROWS);

      if (error) {
        throw error;
      }

      renderDetails(data || [], makh);
    }

    function renderDetails(rows, makh) {
      if (!rows.length) {
        hideTable("Không tìm thấy hàng hóa đã mua của mã khách: " + makh, false);
        return;
      }

      detailBody.innerHTML = rows.map(function (item) {
        return `
          <tr>
            <td>${escapeHtml(item.ma_hang)}</td>
            <td>${escapeHtml(item.ten_hang)}</td>
            <td class="right">${escapeHtml(formatNumber(item.so_luong))}</td>
          </tr>
        `;
      }).join("");

      messageBox.className = "message ok";
      messageBox.textContent = "Đã lọc theo makh = " + makh;

      tableWrap.classList.remove("hidden");
      footerInfo.classList.remove("hidden");
      footerInfo.textContent =
        "Tìm thấy " + rows.length + " dòng hàng hóa. Đăng nhập: " +
        ((currentUser && (currentUser.ten_nv || currentUser.ma_nv)) || "");
    }

    function hideTable(message, isError) {
      detailBody.innerHTML = "";
      tableWrap.classList.add("hidden");
      footerInfo.classList.add("hidden");
      footerInfo.textContent = "";

      messageBox.className = isError ? "message error" : "message";
      messageBox.textContent = message || "";
    }

    function setLoading(isLoading) {
      reloadBtn.disabled = isLoading;
      reloadBtn.textContent = isLoading ? "Đang tải..." : "↻ Làm mới";
    }

    function getConfiguredTableName(configName, fallbackTable) {
      try {
        if (typeof window.getConfig === "function") {
          const cfg = window.getConfig(configName);

          if (cfg && typeof cfg === "object" && cfg.table) {
            return cfg.table;
          }
        }
      } catch (error) {
        console.warn("Không lấy được cấu hình bảng:", configName, error);
      }

      return fallbackTable;
    }

    function getLoginUser() {
      try {
        const raw = localStorage.getItem(LOGIN_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function openLoginPopup() {
      loginPopup.classList.remove("hidden");

      setTimeout(function () {
        popupMaNvInput.focus();
      }, 100);
    }

    function closeLoginPopup() {
      loginPopup.classList.add("hidden");
    }

    function showUserInfo() {
      statusText.textContent = "Đăng nhập: " + (currentUser.ten_nv || currentUser.ma_nv) + " - " + currentUser.ma_nv;
    }

    function getQueryParam(name) {
      const value = new URLSearchParams(window.location.search).get(name);

      if (!value || String(value).includes("{{")) {
        return "";
      }

      return String(value).trim();
    }

    function escapePostgrestValue(value) {
      return String(value || "").replace(/[,()]/g, "");
    }

    function formatNumber(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toLocaleString("vi-VN") : "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getErrorMessage(error) {
      if (!error) return "Không rõ lỗi";
      if (error.message) return error.message;

      try {
        return JSON.stringify(error);
      } catch (e) {
        return String(error);
      }
    }
  </script>
</body>
</html>
