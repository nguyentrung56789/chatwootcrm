<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Danh sách khách hàng</title>

  <!-- CHỈ LẤY KEY TỪ internal_key.js -->
  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .hidden {
      display: none !important;
    }

    .app {
      min-height: 100vh;
      padding: 12px;
    }

    .content {
      background: #ffffff;
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      min-height: calc(100vh - 24px);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar input {
      height: 38px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    #searchInput {
      width: 360px;
      max-width: 100%;
    }

    #searchBtn {
      height: 38px;
      border: none;
      background: #2563eb;
      color: white;
      padding: 0 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    #searchBtn:hover {
      background: #1d4ed8;
    }

    .staff-dropdown {
      position: relative;
    }

    #staffDropdownBtn {
      height: 38px;
      width: 280px;
      max-width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      color: #111827;
    }

    .staff-dropdown-menu {
      position: absolute;
      top: 44px;
      left: 0;
      width: 280px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
      padding: 8px;
      z-index: 1000;
    }

    .staff-dropdown-menu label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .staff-dropdown-menu label:hover {
      background: #f3f4f6;
      border-radius: 6px;
    }

    .staff-dropdown-menu input {
      width: auto;
      height: auto;
    }

    .customer-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .customer-table th,
    .customer-table td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
    }

    .customer-table th {
      background: #f9fafb;
      font-weight: 600;
    }

    .customer-table th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .customer-table th.sortable:hover {
      background: #eef2ff;
    }

    .sort-icon {
      margin-left: 4px;
      font-size: 12px;
      color: #2563eb;
    }

    .customer-table button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .customer-table button:hover {
      background: #1d4ed8;
    }

    .footer-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    #logoutBtn {
      border: none;
      background: #ef4444;
      color: white;
      padding: 5px 9px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    #logoutBtn:hover {
      background: #dc2626;
    }

    .login-popup {
      position: fixed;
      inset: 0;
      background: rgba(7, 16, 37, 0.78);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-modal {
      width: min(420px, 92vw);
      background: #0f1830;
      color: #e6edff;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .45);
      text-align: center;
    }

    .login-modal h2 {
      margin: 0 0 16px;
      font-size: 26px;
    }

    .login-modal input,
    .login-modal button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
    }

    .login-modal input {
      margin: 6px 0;
      border: 1px solid #233043;
      background: #071526;
      color: #e6edff;
      outline: none;
    }

    .login-modal input:focus {
      border-color: #2dd4bf;
    }

    #popupLoginBtn {
      margin-top: 10px;
      border: 0;
      background: #2dd4bf;
      color: #042023;
      font-weight: 700;
      cursor: pointer;
    }

    #popupLoginBtn:hover {
      background: #5eead4;
    }

    #popupLoginBtn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .login-message {
      min-height: 18px;
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 14px;
    }

    .login-note {
      margin-top: 8px;
      color: #9aa7c7;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <!-- POPUP LOGIN -->
  <div id="loginPopup" class="login-popup hidden">
    <div class="login-modal">
      <h2>🔐 Đăng nhập</h2>

      <input
        id="popupMaNvInput"
        type="text"
        placeholder="Mã nhân viên"
        autocomplete="username"
      />

      <input
        id="popupMatKhauInput"
        type="password"
        placeholder="Mật khẩu"
        autocomplete="current-password"
      />

      <button id="popupLoginBtn">Đăng nhập</button>

      <div class="login-message" id="popupLoginMessage"></div>
      <div class="login-note" id="popupCfgNote">Đang khởi tạo cấu hình...</div>
    </div>
  </div>

  <!-- NỘI DUNG CHÍNH -->
  <div class="app">
    <main class="content">

      <div class="toolbar">
        <input
          id="searchInput"
          type="text"
          placeholder="Tìm mã KH, tên KH, số điện thoại..."
        />

        <div class="staff-dropdown">
          <button id="staffDropdownBtn" type="button">
            Tất cả nhân viên
          </button>

          <div id="staffDropdownMenu" class="staff-dropdown-menu hidden">
            <label>
              <input type="checkbox" class="staff-option" value="all" checked />
              Tất cả nhân viên
            </label>

            <label>
              <input type="checkbox" class="staff-option" value="NV01" />
              NV01
            </label>

            <label>
              <input type="checkbox" class="staff-option" value="NV02" />
              NV02
            </label>

            <label>
              <input type="checkbox" class="staff-option" value="NV03" />
              NV03
            </label>
          </div>
        </div>

        <button id="searchBtn">Tìm kiếm</button>
      </div>

      <table class="customer-table">
        <thead>
          <tr>
            <th class="sortable" data-sort="ma_kh">Mã KH <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="ten_kh">Tên khách hàng <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="sdt">Số điện thoại <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="cong_no">Công nợ <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="ma_nv">Nhân viên <span class="sort-icon"></span></th>
            <th>Thao tác</th>
          </tr>
        </thead>

        <tbody id="customerBody">
          <tr>
            <td colspan="6">Vui lòng đăng nhập để xem dữ liệu.</td>
          </tr>
        </tbody>
      </table>

      <div class="footer-actions">
        <span id="userInfo">Chưa đăng nhập</span>
        <button id="logoutBtn">Đăng xuất</button>
      </div>

    </main>
  </div>

  <script>
    const LOGIN_STORAGE_KEY = "chatwoot_crm_user";

    const TABLE_NHAN_VIEN = "kv_nhan_vien";
    const TABLE_KHACH_HANG = "kv_khachhang";

    let currentUser = getLoginUser();
    let sortField = "";
    let sortDirection = "asc";
    let supabaseClient = null;

    const loginPopup = document.getElementById("loginPopup");
    const popupMaNvInput = document.getElementById("popupMaNvInput");
    const popupMatKhauInput = document.getElementById("popupMatKhauInput");
    const popupLoginBtn = document.getElementById("popupLoginBtn");
    const popupLoginMessage = document.getElementById("popupLoginMessage");
    const popupCfgNote = document.getElementById("popupCfgNote");

    const userInfo = document.getElementById("userInfo");
    const logoutBtn = document.getElementById("logoutBtn");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const customerBody = document.getElementById("customerBody");

    const staffDropdownBtn = document.getElementById("staffDropdownBtn");
    const staffDropdownMenu = document.getElementById("staffDropdownMenu");
    const staffOptions = document.querySelectorAll(".staff-option");

    let customers = [
      {
        ma_kh: "KH017434",
        ten_kh: "Nguyễn Văn A",
        sdt: "0904398366",
        cong_no: 1250000,
        ma_nv: "NV01"
      },
      {
        ma_kh: "KH000002",
        ten_kh: "Trần Thị B",
        sdt: "0912345678",
        cong_no: 0,
        ma_nv: "NV02"
      },
      {
        ma_kh: "KH000003",
        ten_kh: "Lê Văn C",
        sdt: "0988888888",
        cong_no: 350000,
        ma_nv: "NV03"
      },
      {
        ma_kh: "KH000004",
        ten_kh: "Phạm Thị D",
        sdt: "0977777777",
        cong_no: 2500000,
        ma_nv: "NV01"
      }
    ];

    initSupabase().then(function () {
      initPage();
    });

    async function initSupabase() {
      try {
        popupCfgNote.textContent = "Đang lấy cấu hình Supabase...";

        if (window.configReady) {
          await window.configReady;
        }

        let supabaseUrl = "";
        let supabaseAnon = "";

        if (typeof window.getConfig === "function") {
          supabaseUrl = window.getConfig("url") || "";
          supabaseAnon = window.getConfig("anon") || "";
        }

        console.log("SUPABASE CONFIG:", {
          url: supabaseUrl,
          hasAnon: !!supabaseAnon
        });

        if (!supabaseUrl || !supabaseAnon) {
          popupCfgNote.textContent = "Thiếu cấu hình Supabase";
          return;
        }

        supabaseClient = window.supabase.createClient(
          supabaseUrl,
          supabaseAnon
        );

        popupCfgNote.textContent = "Sẵn sàng đăng nhập";
      } catch (error) {
        console.error("Lỗi initSupabase:", error);
        popupCfgNote.textContent = "Lỗi cấu hình Supabase";
      }
    }

    function getLoginUser() {
      const raw = localStorage.getItem(LOGIN_STORAGE_KEY);

      if (!raw) {
        return null;
      }

      try {
        return JSON.parse(raw);
      } catch (error) {
        localStorage.removeItem(LOGIN_STORAGE_KEY);
        return null;
      }
    }

    function initPage() {
      currentUser = getLoginUser();

      if (!currentUser) {
        userInfo.textContent = "Chưa đăng nhập";
        customerBody.innerHTML = `
          <tr>
            <td colspan="6">Vui lòng đăng nhập để xem dữ liệu.</td>
          </tr>
        `;

        openLoginPopup();
        return;
      }

      closeLoginPopup();
      showUserInfo();
      updateStaffButtonText();
      renderCustomers();
    }

    function openLoginPopup() {
      loginPopup.classList.remove("hidden");

      setTimeout(function () {
        popupMaNvInput.focus();
      }, 100);
    }

    function closeLoginPopup() {
      loginPopup.classList.add("hidden");
    }

    function showUserInfo() {
      userInfo.textContent = `${currentUser.ten_nv || currentUser.ma_nv} - ${currentUser.ma_nv}`;
    }

    popupLoginBtn.addEventListener("click", loginFromPopup);

    popupMatKhauInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        loginFromPopup();
      }
    });

    logoutBtn.addEventListener("click", function () {
      localStorage.removeItem(LOGIN_STORAGE_KEY);
      currentUser = null;

      userInfo.textContent = "Chưa đăng nhập";

      customerBody.innerHTML = `
        <tr>
          <td colspan="6">Vui lòng đăng nhập để xem dữ liệu.</td>
        </tr>
      `;

      openLoginPopup();
    });

    async function loginFromPopup() {
      const maNv = popupMaNvInput.value.trim();
      const matKhau = popupMatKhauInput.value.trim();

      popupLoginMessage.textContent = "";

      if (!maNv || !matKhau) {
        popupLoginMessage.textContent = "Vui lòng nhập mã nhân viên và mật khẩu.";
        return;
      }

      if (!supabaseClient) {
        popupLoginMessage.textContent = "Supabase chưa sẵn sàng.";
        return;
      }

      popupLoginBtn.disabled = true;
      popupLoginBtn.textContent = "Đang đăng nhập...";

      const { data, error } = await supabaseClient
        .from(TABLE_NHAN_VIEN)
        .select("ma_nv, mat_khau, ten_nv")
        .eq("ma_nv", maNv)
        .eq("mat_khau", matKhau)
        .maybeSingle();

      popupLoginBtn.disabled = false;
      popupLoginBtn.textContent = "Đăng nhập";

      if (error) {
        console.error("Lỗi đăng nhập:", error);
        popupLoginMessage.textContent = "Lỗi kiểm tra đăng nhập.";
        return;
      }

      if (!data) {
        popupLoginMessage.textContent = "Sai mã nhân viên hoặc mật khẩu.";
        return;
      }

      currentUser = {
        ma_nv: data.ma_nv,
        ten_nv: data.ten_nv,
        admin: true,
        login_at: new Date().toISOString()
      };

      localStorage.setItem(
        LOGIN_STORAGE_KEY,
        JSON.stringify(currentUser)
      );

      popupMaNvInput.value = "";
      popupMatKhauInput.value = "";
      popupLoginMessage.textContent = "";

      closeLoginPopup();
      showUserInfo();
      updateStaffButtonText();
      renderCustomers();
    }

    searchInput.addEventListener("input", renderCustomers);
    searchBtn.addEventListener("click", renderCustomers);

    staffDropdownBtn.addEventListener("click", function () {
      staffDropdownMenu.classList.toggle("hidden");
    });

    document.addEventListener("click", function (event) {
      const isClickInside =
        staffDropdownBtn.contains(event.target) ||
        staffDropdownMenu.contains(event.target);

      if (!isClickInside) {
        staffDropdownMenu.classList.add("hidden");
      }
    });

    staffOptions.forEach(function (option) {
      option.addEventListener("change", function () {
        handleStaffChange(option);
        updateStaffButtonText();
        renderCustomers();
      });
    });

    document.querySelectorAll(".sortable").forEach(function (th) {
      th.addEventListener("click", function () {
        const field = th.dataset.sort;

        if (sortField === field) {
          sortDirection = sortDirection === "asc" ? "desc" : "asc";
        } else {
          sortField = field;
          sortDirection = "asc";
        }

        updateSortIcons();
        renderCustomers();
      });
    });

    function handleStaffChange(changedOption) {
      const allOption = document.querySelector('.staff-option[value="all"]');

      const normalOptions = Array.from(staffOptions).filter(function (option) {
        return option.value !== "all";
      });

      if (changedOption.value === "all" && changedOption.checked) {
        normalOptions.forEach(function (option) {
          option.checked = false;
        });
        return;
      }

      if (changedOption.value !== "all" && changedOption.checked) {
        allOption.checked = false;
      }

      const hasAnyNormalChecked = normalOptions.some(function (option) {
        return option.checked;
      });

      if (!hasAnyNormalChecked) {
        allOption.checked = true;
      }
    }

    function getSelectedStaffList() {
      const selected = Array.from(staffOptions)
        .filter(function (option) {
          return option.checked;
        })
        .map(function (option) {
          return option.value.toLowerCase();
        });

      if (selected.length === 0 || selected.includes("all")) {
        return [];
      }

      return selected;
    }

    function updateStaffButtonText() {
      const selected = Array.from(staffOptions)
        .filter(function (option) {
          return option.checked;
        })
        .map(function (option) {
          return option.value;
        });

      if (selected.length === 0 || selected.includes("all")) {
        staffDropdownBtn.textContent = "Tất cả nhân viên";
        return;
      }

      staffDropdownBtn.textContent = selected.join(", ");
    }

    function renderCustomers() {
      if (!currentUser) {
        return;
      }

      const keyword = searchInput.value.trim().toLowerCase();
      const staffList = getSelectedStaffList();

      let list = customers;

      if (!currentUser.admin) {
        list = list.filter(function (item) {
          return String(item.ma_nv || "").toLowerCase() === String(currentUser.ma_nv || "").toLowerCase();
        });
      }

      const filtered = list.filter(function (item) {
        const maKh = String(item.ma_kh || "").toLowerCase();
        const tenKh = String(item.ten_kh || "").toLowerCase();
        const sdt = String(item.sdt || "").toLowerCase();
        const maNv = String(item.ma_nv || "").toLowerCase();

        const textKhachHang = [
          maKh,
          tenKh,
          sdt,
          maNv
        ].join(" ");

        const matchKeyword =
          keyword === "" ||
          textKhachHang.includes(keyword);

        const matchStaff =
          staffList.length === 0 ||
          staffList.some(function (staff) {
            return maNv === staff;
          });

        return matchKeyword && matchStaff;
      });

      if (sortField) {
        filtered.sort(function (a, b) {
          let valueA = a[sortField];
          let valueB = b[sortField];

          if (sortField === "cong_no") {
            valueA = Number(valueA || 0);
            valueB = Number(valueB || 0);
          } else {
            valueA = String(valueA || "").toLowerCase();
            valueB = String(valueB || "").toLowerCase();
          }

          if (valueA < valueB) {
            return sortDirection === "asc" ? -1 : 1;
          }

          if (valueA > valueB) {
            return sortDirection === "asc" ? 1 : -1;
          }

          return 0;
        });
      }

      if (filtered.length === 0) {
        customerBody.innerHTML = `
          <tr>
            <td colspan="6">Không có dữ liệu.</td>
          </tr>
        `;
        return;
      }

      customerBody.innerHTML = filtered.map(function (item) {
        return `
          <tr>
            <td>${item.ma_kh || ""}</td>
            <td>${item.ten_kh || ""}</td>
            <td>${item.sdt || ""}</td>
            <td>${formatMoney(item.cong_no)}</td>
            <td>${item.ma_nv || ""}</td>
            <td>
              <button onclick="viewCustomer('${item.ma_kh}')">
                Xem
              </button>
            </td>
          </tr>
        `;
      }).join("");
    }

    function updateSortIcons() {
      document.querySelectorAll(".sortable").forEach(function (th) {
        const icon = th.querySelector(".sort-icon");
        const field = th.dataset.sort;

        if (!icon) {
          return;
        }

        if (field === sortField) {
          icon.textContent = sortDirection === "asc" ? "▲" : "▼";
        } else {
          icon.textContent = "";
        }
      });
    }

    function formatMoney(value) {
      const number = Number(value || 0);
      return number.toLocaleString("vi-VN");
    }

    function viewCustomer(maKh) {
      alert("Xem khách hàng: " + maKh);
    }
  </script>
</body>
</html>
